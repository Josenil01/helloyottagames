<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
    <title>Expresso da Matematica</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #f59e0b;
            --success: #22c55e;
            --danger: #ef4444;
            --sky: #87ceeb;
            --ground: #4ade80;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: "Baloo 2", cursive;
            background: var(--sky);
            overflow: hidden;
            color: #1e293b;
            user-select: none;
        }

        /* Cenario Animado */
        .scenery {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(to bottom, #87ceeb 0%, #e0f2fe 100%);
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: move linear infinite;
        }

        .grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background: var(--ground);
            border-top: 8px solid #22c55e;
        }

        @keyframes move {
            from { transform: translateX(110vw); }
            to { transform: translateX(-20vw); }
        }

        /* Layout Principal */
        .container {
            max-width: 900px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* HUD */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            z-index: 10;
        }

        .stat-badge {
            background: #1e293b;
            color: white;
            padding: 5px 15px;
            border-radius: 999px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
        }

        /* Jogo - Area do Trem */
        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .train-display {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            min-height: 120px;
            flex-wrap: wrap;
        }

        .svg-icon { width: 80px; height: 80px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.15)); }

        .wagon {
            background: var(--primary);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 12px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 6px solid #1d4ed8;
            position: relative;
            animation: bounce 2s infinite ease-in-out;
        }

        .wagon.op { background: #64748b; border-bottom-color: #334155; width: 60px; height: 60px; font-size: 1.5rem; }

        .wagon.target {
            background: rgba(255, 255, 255, 0.3);
            border: 3px dashed var(--primary);
            border-bottom-width: 3px;
            color: transparent;
        }

        .wagon.target.filled {
            background: var(--success);
            border: none;
            border-bottom: 6px solid #16a34a;
            color: white;
            transition: all 0.3s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Alternativas */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .opt-btn {
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 20px;
            padding: 15px;
            font-size: 2.2rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            color: var(--primary);
            box-shadow: 0 8px 0 #cbd5e1;
            position: relative;
        }

        .opt-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #cbd5e1; }
        
        /* Efeito de voo */
        .flying-num {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            font-size: 2.2rem;
            color: var(--primary);
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 20px;
            width: 80px;
            height: 80px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Timer Bar */
        .timer-container {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.3);
            border-radius: 6px;
            overflow: hidden;
            margin: 10px 0;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--success), var(--secondary), var(--danger));
        }

        /* Telas */
        .screen { display: none; height: 100%; flex-direction: column; text-align: center; justify-content: center; align-items: center; }
        .screen.active { display: flex; }

        .btn-large {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 8px 0 #d97706;
            margin: 10px;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }

        .lvl-btn {
            aspect-ratio: 1;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            background: white;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .lvl-btn:disabled { opacity: 0.5; }

        /* Modal de Resultado */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 320px;
            width: 90%;
        }
    </style>
</head>
<body>

    <div class="scenery" id="scenery"></div>

    <div class="container">
        <!-- TELA INICIAL -->
        <div id="screen-home" class="screen active">
            <h1 style="font-size: 3.5rem; margin: 0; text-shadow: 2px 2px white;">🚂 Expresso</h1>
            <h2 style="margin: 0; color: var(--primary); text-shadow: 1px 1px white;">da Matematica</h2>
            <div id="home-train" class="train-display" style="margin: 40px 0;"></div>
            <button class="btn-large" onclick="changeScreen('levels')">VAMOS LA!</button>
            <p id="total-stars">⭐ 0/36</p>
        </div>

        <!-- TELA DE NIVEIS -->
        <div id="screen-levels" class="screen" style="justify-content: flex-start; padding-top: 40px;">
            <div class="hud" style="width: 100%;">
                <button class="stat-badge" onclick="changeScreen('home')" style="cursor:pointer">🏠 Inicio</button>
                <div class="stat-badge" id="lvl-star-count">⭐ 0</div>
            </div>
            <h2 style="margin: 20px 0;">Proxima Estacao?</h2>
            <div class="level-grid" id="level-grid"></div>
        </div>

        <!-- TELA DE JOGO -->
        <div id="screen-game" class="screen">
            <div class="hud" style="width: 100%;">
                <button class="stat-badge" onclick="changeScreen('levels')" style="cursor:pointer">✖</button>
            </div>

            <div class="timer-container">
                <div class="timer-bar" id="timer-bar"></div>
            </div>

            <div class="game-area">
                <div class="train-display" id="active-train">
                    <!-- Gerado via JS: Engine + Wagons -->
                </div>

                <div class="options-grid" id="options">
                    <!-- Opcoes aqui -->
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE RESULTADO -->
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 id="result-title">Incrivel!</h2>
            <div id="result-stars" style="font-size: 2.5rem; margin: 15px 0;">⭐⭐⭐</div>
            <p id="result-msg">Voce chegou na estacao!</p>
            <button id="modal-next-btn" class="btn-large" onclick="handleModalAction()">CONTINUAR</button>
        </div>
    </div>

    <script src="../utils/audio.js"></script>
    <script src="../utils/score.js"></script>
    <script src="../utils/elapsed.js"></script>
    <script src="../utils/progress.js"></script>
    <script src="../utils/stars.js"></script>
    <script src="../utils/shuffle.js"></script>
    <script src="../utils/rand.js"></script>
    <script src="main.js"></script>
</body>
</html>
