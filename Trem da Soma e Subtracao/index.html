<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trem da Soma e Subtracao</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font-family: "Baloo 2", cursive; background: linear-gradient(140deg, #fde68a, #86efac); color: #1f2937; }
      .home { position: fixed; top: 12px; left: 12px; text-decoration: none; background: #fffffff0; padding: 8px 12px; border-radius: 999px; font-size: 1.4rem; }
      .wrap { max-width: 900px; margin: 0 auto; padding: 64px 16px 20px; }
      .card { background: #ffffffde; border-radius: 24px; border: 3px solid #fff; padding: 16px; box-shadow: 0 14px 30px #00000024; }
      .center { text-align: center; }
      .big { font-size: clamp(2rem, 7vw, 3.6rem); }
      .mid { font-size: clamp(1.2rem, 4vw, 2rem); }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 10px; }
      .lvl, .opt { border: none; border-radius: 14px; padding: 12px 8px; font-family: inherit; font-size: 1.5rem; cursor: pointer; }
      .lvl { background: #f1f5f9; border: 2px solid #cbd5e1; }
      .lvl[disabled] { opacity: .35; }
      .opt { color: #fff; background: linear-gradient(145deg, #60a5fa, #2563eb); box-shadow: 0 8px 16px #1d4ed855; }
      .hud { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
      .chip { background: #1f2937; color: #fff; border-radius: 999px; padding: 4px 10px; font-size: 1.1rem; }
      .fb { min-height: 30px; text-align: center; font-size: 1.4rem; }
    </style>
  </head>
  <body>
    <a class="home" href="../index.html">🏠</a>
    <main class="wrap"><section id="app" class="card"></section></main>
    <script>
      const LEVELS = [[1, '+', 1], [2, '+', 1], [3, '+', 1], [4, '+', 1], [5, '+', 2], [6, '+', 3], [8, '-', 2], [9, '-', 3], [7, '+', 5], [12, '-', 4], [9, '+', 8], [15, '-', 6]];
      const SKEY = 'g1-train-v2';
      const app = document.getElementById('app');
      let state = 'cover', i = 0, tries = 0, score = 0;
      const pg = load();

      function load() {
        const b = { unlocked: 1, stars: Array(LEVELS.length).fill(0) };
        try {
          const d = JSON.parse(localStorage.getItem(SKEY));
          if (!d) return b;
          return { unlocked: Math.min(LEVELS.length, Math.max(1, Number(d.unlocked || 1))), stars: Array.isArray(d.stars) ? d.stars.slice(0, LEVELS.length).map((x) => Number(x || 0)) : b.stars };
        } catch { return b; }
      }
      function save() { localStorage.setItem(SKEY, JSON.stringify(pg)); }
      function medal() { const t = pg.stars.reduce((a, b) => a + b, 0), m = LEVELS.length * 3; return t >= m * 0.85 ? '🥇' : t >= m * 0.6 ? '🥈' : '🥉'; }
      function mkOptions(ans) { const s = new Set([ans]); while (s.size < 3) s.add(Math.max(0, ans + (Math.floor(Math.random() * 7) - 3))); return [...s].sort(() => Math.random() - 0.5); }
      function earnedByTry(n) { return n === 1 ? 3 : n === 2 ? 2 : 1; }

      function render() { if (state === 'cover') return cover(); if (state === 'select') return select(); play(); }
      function cover() {
        app.innerHTML = `<p class="center big">🚂➕➖</p><p class="center big">${medal()}</p><p class="center"><button id="go" class="lvl" style="font-size:2.2rem">▶️</button></p>`;
        document.getElementById('go').onclick = () => { state = 'select'; render(); };
      }
      function select() {
        app.innerHTML = `<p class="center mid">🚂 ⭐ ${pg.stars.reduce((a,b)=>a+b,0)}/${LEVELS.length*3}</p><div class="grid">${LEVELS.map((_, k) => `<button class="lvl" data-k="${k}" ${k + 1 > pg.unlocked ? 'disabled' : ''}>${k + 1}<br>${'⭐'.repeat(pg.stars[k] || 0) || '▫️'}</button>`).join('')}</div><p class="center" style="margin-top:10px"><button id="back" class="lvl">◀️</button></p>`;
        app.querySelectorAll('.lvl[data-k]').forEach((b) => b.onclick = () => { i = Number(b.dataset.k); tries = 0; state = 'play'; render(); });
        document.getElementById('back').onclick = () => { state = 'cover'; render(); };
      }
      function play() {
        const [a, op, b] = LEVELS[i], ans = op === '+' ? a + b : a - b;
        app.innerHTML = `<div class="hud"><span class="chip">${i + 1}/${LEVELS.length}</span><span class="chip">⭐ ${pg.stars[i] || 0}</span><span class="chip">🏅 ${score}</span></div><p class="center big">${a} ${op} ${b} = ?</p><div class="grid">${mkOptions(ans).map((n) => `<button class="opt" data-n="${n}">${n}</button>`).join('')}</div><div id="fb" class="fb"></div><p class="center" style="margin-top:10px"><button id="menu" class="lvl">📚</button></p>`;
        app.querySelectorAll('.opt').forEach((btn) => btn.onclick = () => {
          tries += 1;
          const n = Number(btn.dataset.n), fb = document.getElementById('fb');
          if (n === ans) {
            const e = earnedByTry(tries);
            pg.stars[i] = Math.max(pg.stars[i], e);
            pg.unlocked = Math.max(pg.unlocked, Math.min(LEVELS.length, i + 2));
            save();
            score += 8 + e;
            fb.textContent = '✅ ' + '⭐'.repeat(e);
            setTimeout(() => { state = 'select'; render(); }, 600);
          } else fb.textContent = '❌';
        });
        document.getElementById('menu').onclick = () => { state = 'select'; render(); };
      }
      render();
    </script>
  </body>
</html>
