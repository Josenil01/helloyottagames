<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
  <title>Matemática Pirata!</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fontes Divertidas -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- React e ReactDOM -->
  <script src="../vendor/react@18.3.1.production.min.js" crossorigin></script>
  <script src="../vendor/react-dom@18.3.1.production.min.js" crossorigin></script>

  <!-- Babel -->
  
    <script src="../utils/audio.js"></script>
    <script src="../utils/score.js"></script>
    <script src="../utils/elapsed.js"></script>
    <script src="../utils/progress.js"></script>
    <script src="../utils/stars.js"></script>
    <script src="../utils/shuffle.js"></script>
    <script src="../utils/rand.js"></script>
    <script src="../vendor/babel@7.26.10.min.js"></script>

  <style>
    body {
      font-family: 'Fredoka', sans-serif;
      user-select: none;
    }
    
    @keyframes coinJump {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.2); }
      100% { transform: translateY(0) scale(1); }
    }
    .coin-anim {
      animation: coinJump 0.6s ease-out forwards;
    }

    /* Ondas do mar em CSS */
    .sea-bg {
      background: linear-gradient(180deg, #4299E1 0%, #2B6CB0 100%);
      position: relative;
    }
    .sea-line {
      position: absolute;
      background: rgba(255,255,255,0.15);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-sky-200 selection:bg-none overflow-hidden">
  <div id="root"></div>

  <script type="text/babel" src="main.js"></script>
</body>
</html>
