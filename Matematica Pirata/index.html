<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
  <title>MatemÃ¡tica Pirata!</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fontes Divertidas -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- React e ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Fredoka', sans-serif;
      user-select: none;
    }
    
    /* AnimaÃ§Ãµes Personalizadas */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px) rotate(-5deg); }
      75% { transform: translateX(8px) rotate(5deg); }
    }
    .shake-anim {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop-anim {
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes coinJump {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.2); }
      100% { transform: translateY(0) scale(1); }
    }
    .coin-anim {
      animation: coinJump 0.6s ease-out forwards;
    }

    /* Ondas do mar em CSS */
    .sea-bg {
      background: linear-gradient(180deg, #4299E1 0%, #2B6CB0 100%);
      position: relative;
    }
    .sea-line {
      position: absolute;
      background: rgba(255,255,255,0.15);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-sky-200 selection:bg-none overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- DADOS DO JOGO ---
    const LEVELS = [
      { id: 1, n1: 4, n2: 4, op: '+', answer: 8, options: [8, 6, 2], emoji: 'â˜ ï¸', unknown: 'answer' },
      { id: 2, n1: 3, n2: 2, op: '+', answer: 5, options: [4, 5, 6], emoji: 'ðŸª™', unknown: 'answer' },
      { id: 3, n1: 5, n2: 1, op: '-', answer: 4, options: [3, 4, 5], emoji: 'ðŸ’Ž', unknown: 'answer' },
      { id: 4, n1: 2, n2: 5, op: '+', answer: 7, options: [7, 8, 9], emoji: 'ðŸ¦œ', unknown: 'answer' },
      { id: 5, n1: 6, n2: 3, op: '-', answer: 3, options: [2, 3, 4], emoji: 'âš“', unknown: 'answer' },
      { id: 6, n1: 4, n2: 5, op: '+', answer: 9, options: [9, 8, 10], emoji: 'ðŸ™', unknown: 'answer' },
      { id: 7, n1: 8, n2: 4, op: '-', answer: 4, options: [2, 4, 6], emoji: 'â›µ', unknown: 'answer' },
      { id: 8, n1: 7, n2: 3, op: '+', answer: 10, options: [9, 10, 11], emoji: 'ðŸ’£', unknown: 'answer' },
      { id: 9, n1: 9, n2: 2, op: '-', answer: 7, options: [6, 7, 8], emoji: 'ðŸ—¡ï¸', unknown: 'answer' },
      { id: 10, n1: 5, n2: 5, op: '+', answer: 10, options: [10, 5, 0], emoji: 'ðŸ‘‘', unknown: 'answer' },
      
      // MECÃ‚NICA 11: Parcela Oculta (Ãlgebra Inicial)
      { id: 11, n1: 3, n2: 5, op: '+', answer: 8, options: [5, 4, 6], emoji: 'ðŸ¦œ', unknown: 'n2' },
      { id: 12, n1: 9, n2: 4, op: '-', answer: 5, options: [9, 8, 10], emoji: 'ðŸ’Ž', unknown: 'n1' },

      // MECÃ‚NICA 12: Dezenas e Unidades atÃ© 20 (Base 10 / BaÃºs = 10)
      { id: 13, n1: 12, n2: 4, op: '+', answer: 16, options: [16, 14, 15], emoji: 'ðŸª™', unknown: 'answer' },
      { id: 14, n1: 15, n2: 3, op: '-', answer: 12, options: [12, 13, 11], emoji: 'ðŸ’£', unknown: 'answer' },
      { id: 15, n1: 10, n2: 8, op: '+', answer: 18, options: [18, 17, 19], emoji: 'ðŸ‘‘', unknown: 'answer' }
    ];

    function App() {
      // Estados
      const [gameState, setGameState] = useState('cover'); // cover, playing, complete
      const [currentPhaseIndex, setCurrentPhaseIndex] = useState(0);
      const [coins, setCoins] = useState(0);
      
      const [draggedOption, setDraggedOption] = useState(null);
      const [isSuccess, setIsSuccess] = useState(false);
      const [shakeWrong, setShakeWrong] = useState(false);
      const [animateCoin, setAnimateCoin] = useState(false);
      const [wrongAnswers, setWrongAnswers] = useState([]);

      const level = LEVELS[currentPhaseIndex];

      const startGame = () => {
        setGameState('playing');
        setCurrentPhaseIndex(0);
        setCoins(0);
        resetTurn();
      };

      const resetTurn = () => {
        setIsSuccess(false);
        setWrongAnswers([]);
        setDraggedOption(null);
      };

      // --- LÃ³gica de ValidaÃ§Ã£o ---
      const checkAnswer = (value) => {
        if (isSuccess || wrongAnswers.includes(value)) return;

        // O valor correto agora depende de qual parcela estÃ¡ oculta (n1, n2 ou answer)
        const expectedValue = level[level.unknown || 'answer'];

        if (value === expectedValue) {
          // Acertou!
          setIsSuccess(true);
          setCoins(prev => prev + 1);
          setAnimateCoin(true);
          setTimeout(() => setAnimateCoin(false), 600);

          setTimeout(() => {
            if (currentPhaseIndex + 1 < LEVELS.length) {
              setCurrentPhaseIndex(prev => prev + 1);
              resetTurn();
            } else {
              setGameState('complete');
            }
          }, 2000); // 2 segundos para ver a animaÃ§Ã£o de sucesso
        } else {
          // Errou
          setWrongAnswers(prev => [...prev, value]);
          setShakeWrong(true);
          setTimeout(() => setShakeWrong(false), 400);
        }
      };

      // --- Drag & Drop ---
      const handleDragStart = (e, value) => {
        setDraggedOption(value);
        e.dataTransfer.setData('text/plain', value);
      };

      const handleDragOver = (e) => {
        e.preventDefault();
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const value = parseInt(e.dataTransfer.getData('text/plain'));
        if (!isNaN(value)) {
          checkAnswer(value);
        }
      };

      // Componente que desenha as grelhas com as carinhas/icones
      const RenderVisualItems = ({ count, emoji }) => {
        // MecÃ¢nica 12: Agrupamento em Dezenas (BaÃºs)
        if (count >= 10) {
          const tens = Math.floor(count / 10);
          const ones = count % 10;
          return (
            <div className="flex flex-col items-center justify-center w-full h-full p-2 gap-1 md:gap-2 relative">
              <div className="flex gap-1 md:gap-2">
                {Array.from({ length: tens }).map((_, i) => (
                  <span key={`t-${i}`} className="text-4xl md:text-6xl lg:text-7xl drop-shadow-md pop-anim" style={{animationDelay: `${i * 0.05}s`}} title="1 BaÃº = 10">
                    ðŸ§°
                  </span>
                ))}
              </div>
              {ones > 0 && (
                <div className="flex flex-wrap justify-center gap-1 md:gap-2 max-w-[90%]">
                  {Array.from({ length: ones }).map((_, i) => (
                    <span key={`o-${i}`} className="text-2xl md:text-4xl lg:text-5xl drop-shadow-md pop-anim" style={{animationDelay: `${(tens + i) * 0.05}s`}}>
                      {emoji}
                    </span>
                  ))}
                </div>
              )}
              {/* Dica visual do nÃºmero para ajudar na Base 10 */}
              <div className="absolute top-2 right-2 text-xs md:text-sm font-bold text-gray-400 bg-gray-100 rounded-full px-2 border-2 border-gray-200">
                {count}
              </div>
            </div>
          );
        }

        // Grade normal para quantidades < 10
        return (
          <div className={`grid gap-1 md:gap-2 place-items-center w-full h-full p-2 ${
            count <= 4 ? 'grid-cols-2 grid-rows-2' : 
            count <= 6 ? 'grid-cols-3 grid-rows-2' : 
            'grid-cols-3 grid-rows-3'
          }`}>
            {Array.from({ length: count }).map((_, i) => (
              <span key={i} className="text-3xl md:text-5xl lg:text-6xl drop-shadow-md pop-anim" style={{animationDelay: `${i * 0.05}s`}}>
                {emoji}
              </span>
            ))}
          </div>
        );
      };

      // Componente: Caixa de Soltar (Dropzone) DinÃ¢mica
      const Dropzone = () => {
        const expectedValue = level[level.unknown || 'answer'];
        return (
          <div 
            className={`rounded-3xl border-4 md:border-8 w-28 h-28 md:w-48 md:h-48 lg:w-64 lg:h-64 shadow-xl flex items-center justify-center transition-all ${
              isSuccess ? 'bg-green-400 border-green-600 pop-anim' : 'bg-white border-indigo-900 border-dashed'
            } ${shakeWrong ? 'shake-anim border-red-500 bg-red-50' : ''}`}
            onDragOver={handleDragOver}
            onDrop={handleDrop}
          >
            {isSuccess ? (
              <span className="text-[5rem] md:text-[8rem] lg:text-[10rem] font-black text-white drop-shadow-lg leading-none">
                {expectedValue}
              </span>
            ) : (
              <span className="text-indigo-200 text-[4rem] md:text-[6rem] opacity-40 font-black animate-pulse">?</span>
            )}
          </div>
        );
      };

      // Componente: Caixa EstÃ¡tica (Exibe o que jÃ¡ Ã© conhecido)
      const StaticBox = ({ value }) => (
        <div className="bg-white rounded-3xl border-4 md:border-8 border-indigo-900 w-28 h-28 md:w-48 md:h-48 lg:w-64 lg:h-64 shadow-xl flex items-center justify-center overflow-hidden">
          <RenderVisualItems count={value} emoji={level.emoji} />
        </div>
      );

      // ------------------------------------------------------------------------
      // TELA 1: CAPA
      // ------------------------------------------------------------------------
      if (gameState === 'cover') {
        return (
          <div className="min-h-screen bg-sky-300 flex flex-col items-center justify-center p-4 relative overflow-hidden">
            <a href="../../index.html" className="absolute top-4 left-4 text-blue-100 hover:text-blue-300 font-bold bg-blue-900/80 hover:bg-blue-800 px-4 py-2 rounded-full transition-colors z-20 border-2 border-blue-400">â—€ Voltar</a>
            {/* DecoraÃ§Ã£o Fundo */}
            <div className="absolute top-10 left-10 text-8xl opacity-50">â˜ï¸</div>
            <div className="absolute top-20 right-20 text-8xl opacity-50">â˜ï¸</div>
            
            {/* Mar */}
            <div className="absolute bottom-0 left-0 right-0 h-1/3 sea-bg flex items-end justify-center pb-10">
              <div className="text-8xl md:text-[10rem] animate-pulse">â›µ</div>
            </div>

            <div className="bg-white/95 p-10 rounded-[3rem] shadow-2xl flex flex-col items-center text-center z-10 max-w-lg w-full border-8 border-indigo-900 mb-20">
              <div className="text-8xl mb-4">ðŸ´â€â˜ ï¸</div>
              <h1 className="text-5xl font-black text-indigo-900 mb-2 tracking-tight leading-tight uppercase">
                MatemÃ¡tica<br/><span className="text-4xl text-sky-500">Pirata!</span>
              </h1>
              <p className="text-gray-600 mb-8 text-xl font-bold">Vamos contar o tesouro?</p>
              
              <button 
                onClick={startGame}
                className="w-full py-5 px-8 bg-yellow-400 hover:bg-yellow-500 text-indigo-900 rounded-3xl text-3xl font-black transition-all transform hover:scale-105 shadow-[0_8px_0_rgb(180,83,9)] hover:shadow-[0_4px_0_rgb(180,83,9)] hover:translate-y-1 active:shadow-none active:translate-y-2 uppercase"
              >
                Jogar!
              </button>
            </div>
          </div>
        );
      }

      // ------------------------------------------------------------------------
      // TELA 3: FINAL
      // ------------------------------------------------------------------------
      if (gameState === 'complete') {
        return (
          <div className="min-h-screen bg-sky-300 flex flex-col items-center justify-center p-4 relative overflow-hidden">
            <div className="bg-white/95 p-10 rounded-[3rem] shadow-2xl flex flex-col items-center text-center z-10 max-w-lg w-full border-8 border-indigo-900">
              <div className="text-8xl mb-4 pop-anim">ðŸ‘‘</div>
              <h1 className="text-5xl font-black text-indigo-900 mb-2 tracking-tight uppercase">
                ParabÃ©ns!
              </h1>
              <p className="text-gray-600 mb-6 text-xl font-bold">Conseguiste resolver tudo!</p>
              
              <div className="bg-yellow-100 border-4 border-yellow-400 rounded-3xl p-6 mb-8 w-full flex flex-col items-center">
                <span className="text-gray-500 font-bold uppercase mb-2">Tesouro Arrecadado</span>
                <div className="flex items-center text-6xl font-black text-yellow-600">
                  <span className="mr-4">ðŸ’°</span> x{coins}
                </div>
              </div>

              <button 
                onClick={startGame}
                className="w-full py-5 px-8 bg-indigo-600 hover:bg-indigo-700 text-white rounded-3xl text-2xl font-black transition-all transform hover:scale-105 shadow-[0_8px_0_rgb(49,46,129)] hover:shadow-[0_4px_0_rgb(49,46,129)] hover:translate-y-1 active:shadow-none active:translate-y-2 uppercase"
              >
                Jogar Novamente
              </button>
            </div>
          </div>
        );
      }

      // ------------------------------------------------------------------------
      // TELA 2: JOGABILIDADE (LAYOUT BASEADO NA IMAGEM)
      // ------------------------------------------------------------------------
      return (
        <div className="h-screen w-full flex flex-col relative bg-sky-200">
          
          {/* Nuvens de fundo decorativas */}
          <div className="absolute top-8 left-[10%] text-white opacity-80" style={{fontSize: '8rem'}}>â˜ï¸</div>
          <div className="absolute top-4 right-[20%] text-white opacity-80" style={{fontSize: '10rem'}}>â˜ï¸</div>

          {/* CABEÃ‡ALHO */}
          <div className="w-full flex justify-between items-center p-6 md:p-8 z-10">
            <h2 className="text-3xl md:text-4xl font-black text-indigo-900 tracking-wide">
              Fase {currentPhaseIndex < 9 ? `0${level.id}` : level.id}
            </h2>
            
            {/* Contador de Moedas */}
            <div className="flex items-center text-3xl md:text-4xl font-black text-yellow-400 drop-shadow-sm">
              <span className={`mr-2 transition-all ${animateCoin ? 'text-yellow-500 scale-125' : ''}`}>
                x{coins}
              </span>
              <span className={`text-5xl md:text-6xl ${animateCoin ? 'coin-anim' : ''}`}>ðŸ’°</span>
            </div>
          </div>

          {/* ÃREA DA EQUAÃ‡ÃƒO (CENTRO DO CÃ‰U) */}
          <div className="flex-1 flex items-center justify-center z-10 w-full px-2 mt-[-5vh]">
            <div className="flex flex-row items-center justify-center gap-2 md:gap-6 w-full max-w-5xl">
              
              {/* Caixa 1: N1 */}
              {(level.unknown === 'n1') ? <Dropzone /> : <StaticBox value={level.n1} />}

              {/* Operador matemÃ¡tico */}
              <div className="text-5xl md:text-7xl lg:text-9xl font-black text-indigo-900 drop-shadow-md pb-2">
                {level.op}
              </div>

              {/* Caixa 2: N2 */}
              {(level.unknown === 'n2') ? <Dropzone /> : <StaticBox value={level.n2} />}

              {/* Sinal de Igual */}
              <div className="text-5xl md:text-7xl lg:text-9xl font-black text-indigo-900 drop-shadow-md pb-2">
                =
              </div>

              {/* Caixa 3: Resposta */}
              {(level.unknown === 'answer' || !level.unknown) ? <Dropzone /> : <StaticBox value={level.answer} />}

            </div>
          </div>

          {/* ÃREA DO MAR (BOTÃ•ES DE OPÃ‡Ã•ES NA PARTE INFERIOR) */}
          <div className="h-[35vh] md:h-[40vh] w-full sea-bg flex items-center justify-center relative shadow-[inset_0_10px_20px_rgba(0,0,0,0.1)] border-t-[6px] border-[#81e6d9]/30">
            
            {/* Detalhes das ondas no mar */}
            <div className="sea-line w-32 h-2 top-8 left-10"></div>
            <div className="sea-line w-48 h-2 top-20 right-20"></div>
            <div className="sea-line w-24 h-2 bottom-12 left-1/4"></div>
            <div className="sea-line w-64 h-2 bottom-8 right-1/3"></div>

            <div className="flex flex-row justify-center gap-4 md:gap-8 lg:gap-12 w-full max-w-4xl px-4 z-10 relative mt-4 md:mt-8">
              {level.options.map((opt, i) => {
                const isWrong = wrongAnswers.includes(opt);
                
                // Usando a cor baseada na imagem (um roxo/magenta escuro)
                let btnClass = "bg-[#6A045E] hover:bg-[#8B0A7A] border-b-[8px] md:border-b-[12px] border-[#4A0241] text-white cursor-grab active:cursor-grabbing hover:-translate-y-2 hover:shadow-2xl";
                
                if (isWrong) {
                  btnClass = "bg-gray-400 text-gray-200 border-b-[8px] md:border-b-[12px] border-gray-500 opacity-50 cursor-not-allowed transform translate-y-4";
                } else if (isSuccess) {
                  btnClass = "bg-[#6A045E] border-[#4A0241] opacity-50 cursor-not-allowed";
                }

                return (
                  <button
                    key={i}
                    draggable={!isWrong && !isSuccess}
                    onDragStart={(e) => handleDragStart(e, opt)}
                    onClick={() => checkAnswer(opt)} // Permite o clique como alternativa ao arrasto
                    disabled={isWrong || isSuccess}
                    className={`w-32 h-32 md:w-48 md:h-48 lg:w-56 lg:h-56 rounded-[2rem] md:rounded-[2.5rem] flex items-center justify-center transition-all duration-300 shadow-xl ${btnClass}`}
                  >
                    <span className="text-[5rem] md:text-[7rem] lg:text-[8rem] font-black drop-shadow-md leading-none mt-2">
                      {opt}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
