<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canhões de Ouro - Matemática!</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../styles/game-viewport.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="../vendor/react@18.3.1.production.min.js" crossorigin></script>
  <script src="../vendor/react-dom@18.3.1.production.min.js" crossorigin></script>
  
    <script src="../utils/audio.js"></script>
    <script src="../utils/score.js"></script>
    <script src="../utils/elapsed.js"></script>
    <script src="../utils/progress.js"></script>
    <script src="../utils/stars.js"></script>
    <script src="../utils/shuffle.js"></script>
    <script src="../utils/rand.js"></script>
    <script src="../vendor/babel@7.26.10.min.js"></script>

  <style>
    body { font-family: 'Fredoka', sans-serif; user-select: none; }

    .sea-bg {
      background: linear-gradient(180deg, #4299E1 0%, #2B6CB0 100%);
    }

    .cannon-ball {
      position: fixed;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle at 30% 30%, #4b5563, #000);
      border-radius: 50%;
      z-index: 100;
      pointer-events: none;
      display: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    @keyframes recoil {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-20px); }
    }
    .cannon-recoil { animation: recoil 0.3s ease-in-out; }

    @keyframes barrel-explode {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5) rotate(20deg); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }
    .explode { animation: barrel-explode 0.5s ease-out forwards; }

    /* Scrollbar personalizada para o mapa de níveis */
    .custom-scroll::-webkit-scrollbar { width: 8px; }
    .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
  </style>
</head>
<body class="bg-sky-200 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel" src="main.js"></script>
</body>
</html>
