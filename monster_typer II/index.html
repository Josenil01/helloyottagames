<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
    <title>Monster Typer - Teclado Monstros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html { overflow-x: hidden; max-width: 100vw; }
        :root {
            --forest-green: #4ade80;
            --monster-yellow: #facc15;
            --ui-brown: #5d4037;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #1e293b;
            margin: 0;
            overflow: hidden;
            user-select: none;
            max-width: 100vw;
        }
        .font-game {
            font-family: 'Luckiest Guy', cursive;
        }
        
        /* CenÃ¡rio de Fundo */
        .game-bg {
            background: linear-gradient(to bottom, #7dd3fc 0%, #7dd3fc 60%, #4ade80 60%, #22c55e 100%);
            position: relative;
            overflow: hidden;
        }

        /* Elementos UI Estilizados */
        .wood-panel {
            background: #8b4513;
            border: 4px solid #5d4037;
            border-radius: 15px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3);
        }

        /* Barra de Tempo Vertical (Inspirada na Imagem) */
        .vertical-timer-container {
            width: 30px;
            height: 300px;
            background: #3e2723;
            border-radius: 20px;
            padding: 4px;
            position: relative;
            border: 3px solid #5d4037;
        }
        .timer-fill {
            width: 100%;
            background: linear-gradient(to top, #facc15, #fbbf24);
            border-radius: 15px;
            transition: height 0.1s linear;
            position: absolute;
            bottom: 4px;
            left: 0;
            right: 0;
            margin: 0 4px;
        }

        /* Word Box */
        .word-display-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 40px;
            padding: 20px 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
        }

        .letter-slot {
            display: inline-block;
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0 5px;
            color: #fff;
            text-shadow: 3px 3px 0px #000;
            transition: all 0.2s;
        }
        .letter-correct { color: #ef4444; } /* Cor vermelha conforme a imagem */
        .letter-pending { color: #ffffff; }

        /* AnimaÃ§Ãµes */
        @keyframes monster-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }
        .monster-anim { animation: monster-bounce 2s infinite ease-in-out; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake-ui { animation: shake 0.3s ease-in-out; }

        .star-marker {
            position: absolute;
            left: -40px;
            width: 35px;
            height: 35px;
            background: #facc15;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            border: 2px solid #854d0e;
        }

        .screen { display: none; }
        .active-screen { display: flex; }

        @media (max-width: 640px) {
            .vertical-timer-container { height: 180px; width: 22px; }
            .word-display-box { padding: 12px 20px; }
            #monster-svg { width: 180px; height: 180px; }
        }
    </style>
</head>
<body class="h-screen h-dvh flex items-center justify-center overflow-hidden">

    <!-- TELA DE INÃCIO -->
    <div id="screen-start" class="screen active-screen flex-col items-center justify-center w-full h-full bg-teal-600">
            <a href="../../index.html" class="absolute top-4 left-4 text-teal-100 hover:text-teal-300 font-bold bg-teal-700/80 hover:bg-teal-800 px-4 py-2 rounded-full transition-colors z-20 border-2 border-teal-300">â—€ Voltar</a>
        <h1 class="text-7xl font-game text-white mb-12 drop-shadow-lg text-center">MONSTER TYPER<br><span class="text-yellow-300">TECLADO MONSTROS</span></h1>
        
        <div class="mb-12 monster-anim">
            <!-- SVG do Monstro Tartaruga (Simulado) -->
            <svg width="200" height="200" viewBox="0 0 200 200">
                <circle cx="100" cy="120" r="70" fill="#15803d" />
                <path d="M40 120 Q100 20 160 120" fill="#166534" />
                <circle cx="70" cy="110" r="15" fill="white" />
                <circle cx="70" cy="110" r="7" fill="#3b82f6" />
                <circle cx="130" cy="110" r="15" fill="white" />
                <circle cx="130" cy="110" r="7" fill="#3b82f6" />
                <rect x="80" y="30" width="40" height="30" rx="10" fill="#ef4444" />
                <circle cx="90" cy="40" r="4" fill="white" opacity="0.6" />
            </svg>
        </div>

        <button onclick="startGame()" class="bg-yellow-400 hover:bg-yellow-500 text-teal-900 font-game text-5xl px-16 py-6 rounded-full shadow-[0_10px_0_#a16207] transform transition active:translate-y-2 active:shadow-none">
            JOGAR!
        </button>
    </div>

    <!-- TELA DO JOGO -->
    <div id="screen-game" class="screen w-full h-full game-bg flex-col items-center justify-between p-8">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-start">
            <div class="flex flex-col gap-2">
                <div class="wood-panel px-6 py-2 flex items-center gap-4 text-white">
                    <div class="bg-amber-900 rounded-full w-12 h-12 flex items-center justify-center font-game text-2xl border-2 border-yellow-500" id="ui-level">1</div>
                    <div class="w-48 h-6 bg-gray-800 rounded-full overflow-hidden border-2 border-amber-900">
                        <div id="score-bar" class="h-full bg-yellow-400 transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
                <div class="wood-panel px-4 py-1 text-center text-white font-game text-xl self-start">
                    PONTOS: <span id="ui-score">0</span>
                </div>
            </div>

            <button onclick="pauseGame()" class="wood-panel p-3 text-yellow-400 hover:scale-110 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>

        <!-- Centro: Monstro -->
        <div id="monster-container" class="monster-anim relative">
            <svg id="monster-svg" width="320" height="320" viewBox="0 0 200 200">
                <!-- Sombra -->
                <ellipse cx="100" cy="170" rx="80" ry="20" fill="rgba(0,0,0,0.2)" />
                <!-- Corpo -->
                <path d="M30 140 C 30 60, 170 60, 170 140 L 160 160 L 40 160 Z" fill="#16a34a" stroke="#14532d" stroke-width="4"/>
                <path d="M50 140 Q 100 80 150 140" fill="#15803d" />
                <!-- Olhos -->
                <g id="monster-eyes">
                    <circle cx="75" cy="115" r="18" fill="white" />
                    <circle cx="75" cy="115" r="8" fill="#2563eb" id="eye-l" />
                    <circle cx="125" cy="115" r="18" fill="white" />
                    <circle cx="125" cy="115" r="8" fill="#2563eb" id="eye-r" />
                </g>
                <!-- Cogumelo -->
                <path d="M85 70 Q 100 30 115 70" fill="#ef4444" stroke="#991b1b" stroke-width="2" />
                <circle cx="95" cy="55" r="4" fill="white" opacity="0.5" />
                <circle cx="108" cy="62" r="3" fill="white" opacity="0.5" />
                <!-- PÃ©s -->
                <rect x="50" y="155" width="25" height="15" rx="5" fill="#16a34a" />
                <rect x="125" y="155" width="25" height="15" rx="5" fill="#16a34a" />
            </svg>
        </div>

        <!-- Barra Lateral de Tempo -->
        <div class="absolute right-10 top-1/2 -translate-y-1/2 flex flex-col items-center">
            <div class="vertical-timer-container">
                <div id="timer-fill" class="timer-fill" style="height: 100%;"></div>
                <!-- Marcadores de Estrela -->
                <div class="star-marker" style="top: 10%;"></div>
                <div class="star-marker" style="top: 50%;"></div>
                <div class="star-marker" style="top: 85%;"></div>
            </div>
        </div>

        <!-- Bottom: Word Area -->
        <div class="mb-12">
            <div id="word-container" class="word-display-box font-game">
                <!-- Letras serÃ£o inseridas aqui via JS -->
            </div>
        </div>

    </div>

    <!-- MODAL FEEDBACK -->
    <div id="modal-feedback" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="wood-panel p-12 text-center max-w-sm border-yellow-500 border-8">
            <h2 id="feedback-title" class="text-5xl font-game text-yellow-400 mb-4">MUITO BEM!</h2>
            <div class="text-7xl mb-6">ðŸŒŸðŸŒŸðŸŒŸ</div>
            <p id="feedback-msg" class="text-white text-xl font-bold mb-8">VocÃª Ã© um mestre dos monstros!</p>
            <button onclick="nextLevel()" class="bg-green-500 text-white font-game text-3xl px-12 py-4 rounded-full border-b-8 border-green-700 active:border-0 transform active:translate-y-2">
                PRÃ“XIMO
            </button>
        </div>
    </div>

    <script>
        const WORDS = [
    "RADIO", "GATO", "CASA", "BOLA", "DADO", 
    "FOGO", "LAGO", "MESA", "SAPO", "URSO",
    "ZEBRA", "NAVIO", "PIANO", "FRUTA", "HORTA",
    "AMIGO", "BANCO", "CARRO", "DENTE", "ESCOLA",
    "FESTA", "GELO", "HARPA", "ILHA", "JOGO",
    "KILO", "LIVRO", "MACA", "NOITE", "OURO",
    "PORTA", "QUEIJO", "ROUPA", "SAPATO", "TERRA",
    "UVA", "VENTO", "XADREZ", "YOGA", "ZERO",
    "ALMA", "BRACO", "CORPO", "DOCE", "ERVA",
    "FILHO", "GRAO", "HORA", "INDIO", "JARRO",
    "LATA", "MEIA", "NUVEM", "OLHO", "PEIXE",
    "RATO", "SONO", "TELA", "URUBU", "VIDA",
    "XALE", "ARROZ", "BALAO", "COPO", "DICA",
    "EIXO", "FACA", "GIRAFA", "HOTEL", "ITEM",
    "JOIA", "LEITE", "MALA", "NOME", "OLEO",
    "PAIXAO", "QUADRO", "RUA", "SALTO", "TORRE",
    "UNIAO", "VALE", "WEB", "XAROPE", "AGUA",
    "BOLSA", "CAIXA", "DONO", "ELMO", "FORNO",
    "GOTA", "HINO", "IATE", "JUIZO", "LAMA",
    "MURO", "NAVE", "OPCAO", "PRATO", "QUEDA"
];

        let currentWord = "";
        let typedIndex = 0;
        let score = 0;
        let level = 1;
        let timeLeft = 100;
        let timerActive = false;
        let gameActive = false;
        let timerInterval;

        const screenStart = document.getElementById('screen-start');
        const screenGame = document.getElementById('screen-game');
        const wordContainer = document.getElementById('word-container');
        const timerFill = document.getElementById('timer-fill');
        const uiScore = document.getElementById('ui-score');
        const uiLevel = document.getElementById('ui-level');
        const scoreBar = document.getElementById('score-bar');
        const monsterSvg = document.getElementById('monster-svg');
        const modalFeedback = document.getElementById('modal-feedback');

        function showScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            screen.classList.add('active-screen');
        }

        function startGame() {
            showScreen(screenGame);
            score = 0;
            level = 1;
            uiScore.innerText = score;
            uiLevel.innerText = level;
            gameActive = true;
            nextWord();
        }

        function nextWord() {
            currentWord = WORDS[Math.floor(Math.random() * WORDS.length)];
            typedIndex = 0;
            renderWord();
            resetTimer();
            monsterSvg.classList.remove('shake-ui');
        }

        function renderWord() {
            wordContainer.innerHTML = '';
            for (let i = 0; i < currentWord.length; i++) {
                const span = document.createElement('span');
                span.innerText = currentWord[i];
                span.className = `letter-slot ${i < typedIndex ? 'letter-correct' : 'letter-pending'}`;
                wordContainer.appendChild(span);
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = 100;
            updateTimerUI();
            
            // Dificuldade baseada no nÃ­vel: tempo diminui mais rÃ¡pido
            const speed = 100 + (level * 2); 
            
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeLeft -= 0.5;
                updateTimerUI();
                
                if (timeLeft <= 0) {
                    handleTimeOut();
                }
            }, 100);
        }

        function updateTimerUI() {
            timerFill.style.height = timeLeft + '%';
            if (timeLeft < 30) {
                timerFill.style.background = 'linear-gradient(to top, #ef4444, #f87171)';
            } else {
                timerFill.style.background = 'linear-gradient(to top, #facc15, #fbbf24)';
            }
        }

        function handleTimeOut() {
            clearInterval(timerInterval);
            monsterSvg.classList.add('shake-ui');
            // Pequena penalidade ou apenas reiniciar a palavra
            setTimeout(nextWord, 500);
        }

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            
            const key = e.key.toUpperCase();
            
            // Ignorar teclas que nÃ£o sÃ£o letras
            if (!/^[A-Z]$/.test(key)) return;

            if (key === currentWord[typedIndex]) {
                typedIndex++;
                renderWord();
                
                // Feedback visual no monstro
                monsterSvg.style.transform = "scale(1.1)";
                setTimeout(() => monsterSvg.style.transform = "scale(1)", 100);

                if (typedIndex === currentWord.length) {
                    wordComplete();
                }
            } else {
                // Errou a tecla
                wordContainer.classList.add('shake-ui');
                setTimeout(() => wordContainer.classList.remove('shake-ui'), 300);
                
                // Feedback visual "triste" nos olhos do monstro
                document.getElementById('eye-l').style.fill = "#ef4444";
                document.getElementById('eye-r').style.fill = "#ef4444";
                setTimeout(() => {
                    document.getElementById('eye-l').style.fill = "#2563eb";
                    document.getElementById('eye-r').style.fill = "#2563eb";
                }, 400);
            }
        });

        function wordComplete() {
            clearInterval(timerInterval);
            score += 10;
            uiScore.innerText = score;
            
            // Progresso do nÃ­vel
            const progress = (score % 50) * 2;
            scoreBar.style.width = progress + "%";

            if (score > 0 && score % 50 === 0) {
                showVictory();
            } else {
                setTimeout(nextWord, 300);
            }
        }

        function showVictory() {
            gameActive = false;
            modalFeedback.classList.remove('hidden');
            modalFeedback.classList.add('flex');
        }

        function nextLevel() {
            level++;
            uiLevel.innerText = level;
            modalFeedback.classList.add('hidden');
            modalFeedback.classList.remove('flex');
            gameActive = true;
            scoreBar.style.width = "0%";
            nextWord();
        }

        function pauseGame() {
            gameActive = !gameActive;
            if (!gameActive) {
                clearInterval(timerInterval);
            } else {
                resetTimer(); // Simplificado para este exemplo
            }
        }

    </script>
</body>
</html>
