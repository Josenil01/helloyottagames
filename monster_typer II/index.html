<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
    <title>Monster Typer - Teclado Monstros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html { overflow-x: hidden; max-width: 100vw; }
        :root {
            --forest-green: #4ade80;
            --monster-yellow: #facc15;
            --ui-brown: #5d4037;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #1e293b;
            margin: 0;
            overflow: hidden;
            user-select: none;
            max-width: 100vw;
        }
        .font-game {
            font-family: 'Luckiest Guy', cursive;
        }
        
        /* Cenário de Fundo */
        .game-bg {
            background: linear-gradient(to bottom, #7dd3fc 0%, #7dd3fc 60%, #4ade80 60%, #22c55e 100%);
            position: relative;
            overflow: hidden;
        }

        /* Elementos UI Estilizados */
        .wood-panel {
            background: #8b4513;
            border: 4px solid #5d4037;
            border-radius: 15px;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3);
        }

        /* Barra de Tempo Vertical (Inspirada na Imagem) */
        .vertical-timer-container {
            width: 30px;
            height: 300px;
            background: #3e2723;
            border-radius: 20px;
            padding: 4px;
            position: relative;
            border: 3px solid #5d4037;
        }
        .timer-fill {
            width: 100%;
            background: linear-gradient(to top, #facc15, #fbbf24);
            border-radius: 15px;
            transition: height 0.1s linear;
            position: absolute;
            bottom: 4px;
            left: 0;
            right: 0;
            margin: 0 4px;
        }

        /* Word Box */
        .word-display-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 40px;
            padding: 20px 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
        }

        .letter-slot {
            display: inline-block;
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0 5px;
            color: #fff;
            text-shadow: 3px 3px 0px #000;
            transition: all 0.2s;
        }
        .letter-correct { color: #ef4444; } /* Cor vermelha conforme a imagem */
        .letter-pending { color: #ffffff; }

        /* Animações */
        @keyframes monster-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }
        .monster-anim { animation: monster-bounce 2s infinite ease-in-out; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake-ui { animation: shake 0.3s ease-in-out; }

        .star-marker {
            position: absolute;
            left: -40px;
            width: 35px;
            height: 35px;
            background: #facc15;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            border: 2px solid #854d0e;
        }

        .screen { display: none; }
        .active-screen { display: flex; }

        @media (max-width: 640px) {
            .vertical-timer-container { height: 180px; width: 22px; }
            .word-display-box { padding: 12px 20px; }
            #monster-svg { width: 180px; height: 180px; }
        }
    </style>
</head>
<body class="h-screen h-dvh flex items-center justify-center overflow-hidden">

    <!-- TELA DE INÍCIO -->
    <div id="screen-start" class="screen active-screen flex-col items-center justify-center w-full h-full bg-teal-600">
            <a href="../../index.html" class="absolute top-4 left-4 text-teal-100 hover:text-teal-300 font-bold bg-teal-700/80 hover:bg-teal-800 px-4 py-2 rounded-full transition-colors z-20 border-2 border-teal-300">◀ Voltar</a>
        <h1 class="text-7xl font-game text-white mb-12 drop-shadow-lg text-center">MONSTER TYPER<br><span class="text-yellow-300">TECLADO MONSTROS</span></h1>
        
        <div class="mb-12 monster-anim">
            <!-- SVG do Monstro Tartaruga (Simulado) -->
            <svg width="200" height="200" viewBox="0 0 200 200">
                <circle cx="100" cy="120" r="70" fill="#15803d" />
                <path d="M40 120 Q100 20 160 120" fill="#166534" />
                <circle cx="70" cy="110" r="15" fill="white" />
                <circle cx="70" cy="110" r="7" fill="#3b82f6" />
                <circle cx="130" cy="110" r="15" fill="white" />
                <circle cx="130" cy="110" r="7" fill="#3b82f6" />
                <rect x="80" y="30" width="40" height="30" rx="10" fill="#ef4444" />
                <circle cx="90" cy="40" r="4" fill="white" opacity="0.6" />
            </svg>
        </div>

        <button onclick="startGame()" class="bg-yellow-400 hover:bg-yellow-500 text-teal-900 font-game text-5xl px-16 py-6 rounded-full shadow-[0_10px_0_#a16207] transform transition active:translate-y-2 active:shadow-none">
            JOGAR!
        </button>
    </div>

    <!-- TELA DE SELEÇÃO DE TRILHA -->
    <div id="screen-tracks" class="screen flex-col items-center w-full h-full bg-teal-900 p-6 pt-12 overflow-y-auto">
        <a href="../index.html" class="self-start mb-6 font-bold bg-teal-700 text-teal-100 px-4 py-2 rounded-full border-2 border-teal-400">◀ Voltar</a>
        <h2 class="font-game text-4xl text-yellow-300 mb-8 uppercase">Escolha a Trilha</h2>
        <div id="track-grid" style="width:100%;max-width:720px"></div>
    </div>

    <!-- TELA DO JOGO -->
    <div id="screen-game" class="screen w-full h-full game-bg flex-col items-center justify-between p-8">
        
        <!-- Header -->
        <div class="w-full flex justify-between items-start">

            <button onclick="pauseGame()" class="wood-panel p-3 text-yellow-400 hover:scale-110 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>

        <!-- Centro: Monstro -->
        <div id="monster-container" class="monster-anim relative">
            <svg id="monster-svg" width="320" height="320" viewBox="0 0 200 200">
                <!-- Sombra -->
                <ellipse cx="100" cy="170" rx="80" ry="20" fill="rgba(0,0,0,0.2)" />
                <!-- Corpo -->
                <path d="M30 140 C 30 60, 170 60, 170 140 L 160 160 L 40 160 Z" fill="#16a34a" stroke="#14532d" stroke-width="4"/>
                <path d="M50 140 Q 100 80 150 140" fill="#15803d" />
                <!-- Olhos -->
                <g id="monster-eyes">
                    <circle cx="75" cy="115" r="18" fill="white" />
                    <circle cx="75" cy="115" r="8" fill="#2563eb" id="eye-l" />
                    <circle cx="125" cy="115" r="18" fill="white" />
                    <circle cx="125" cy="115" r="8" fill="#2563eb" id="eye-r" />
                </g>
                <!-- Cogumelo -->
                <path d="M85 70 Q 100 30 115 70" fill="#ef4444" stroke="#991b1b" stroke-width="2" />
                <circle cx="95" cy="55" r="4" fill="white" opacity="0.5" />
                <circle cx="108" cy="62" r="3" fill="white" opacity="0.5" />
                <!-- Pés -->
                <rect x="50" y="155" width="25" height="15" rx="5" fill="#16a34a" />
                <rect x="125" y="155" width="25" height="15" rx="5" fill="#16a34a" />
            </svg>
        </div>

        <!-- Barra Lateral de Tempo -->
        <div class="absolute right-10 top-1/2 -translate-y-1/2 flex flex-col items-center">
            <div class="vertical-timer-container">
                <div id="timer-fill" class="timer-fill" style="height: 100%;"></div>
                <!-- Marcadores de Estrela -->
                <div class="star-marker" style="top: 10%;"></div>
                <div class="star-marker" style="top: 50%;"></div>
                <div class="star-marker" style="top: 85%;"></div>
            </div>
        </div>

        <!-- Bottom: Word Area -->
        <div class="mb-12">
            <div id="word-container" class="word-display-box font-game">
                <!-- Letras serão inseridas aqui via JS -->
            </div>
        </div>

    </div>

    <!-- MODAL FEEDBACK -->
    <div id="modal-feedback" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="wood-panel p-12 text-center max-w-sm border-yellow-500 border-8">
            <h2 id="feedback-title" class="text-5xl font-game text-yellow-400 mb-4">MUITO BEM!</h2>
            <div class="text-7xl mb-6">🌟🌟🌟</div>
            <p id="feedback-msg" class="text-white text-xl font-bold mb-8">Você é um mestre dos monstros!</p>
            <button onclick="nextLevel()" class="bg-green-500 text-white font-game text-3xl px-12 py-4 rounded-full border-b-8 border-green-700 active:border-0 transform active:translate-y-2">
                PRÓXIMO
            </button>
        </div>
    </div>

    <script src="../utils/audio.js"></script>
    <script src="../utils/score.js"></script>
    <script src="../utils/elapsed.js"></script>
    <script src="../utils/progress.js"></script>
    <script src="../utils/stars.js"></script>
    <script src="main.js"></script>
</body>
</html>
