<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
  <title>GalÃ¡xia dos Opostos</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fontes Divertidas -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  
  <!-- React e ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      user-select: none;
      background-color: #1e1b4b; /* indigo-950 */
    }
    
    /* AnimaÃ§Ãµes */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px) rotate(-3deg); }
      75% { transform: translateX(8px) rotate(3deg); }
    }
    .shake-anim { animation: shake 0.4s ease-in-out; }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop-anim { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    @keyframes lineDraw {
      0% { stroke-dasharray: 0, 1000; }
      100% { stroke-dasharray: 1000, 0; }
    }
    .line-anim { animation: lineDraw 0.5s ease-out forwards; }

    @keyframes starFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
      50% { transform: translateY(-20px) scale(1.2); opacity: 1; }
    }
    .star-anim { animation: starFloat 4s ease-in-out infinite; }

    /* Fundo Espacial */
    .galaxy-bg {
      background: linear-gradient(180deg, #1e1b4b 0%, #4c1d95 100%);
      position: relative;
    }
  </style>
</head>
<body class="selection:bg-none overflow-x-hidden text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- DADOS DO JOGO: GALÃXIA DOS OPOSTOS (ANTÃ”NIMOS) ---
    const LEVELS = [
      // MECÃ‚NICA 1: AssociaÃ§Ã£o (Arrastar o antÃ´nimo)
      { id: 1, type: 'match', target: 'QUENTE', answer: 'FRIO', options: ['FRIO', 'GELADO', 'MÃ“RNO'], emoji: 'ðŸ”¥', instruction: 'Encontre a palavra com o sentido OPOSTO (contrÃ¡rio)!' },
      { id: 2, type: 'match', target: 'DIA', answer: 'NOITE', options: ['NOITE', 'TARDE', 'MANHÃƒ'], emoji: 'â˜€ï¸', instruction: 'O que Ã© o exato contrÃ¡rio dessa palavra?' },
      { id: 3, type: 'match', target: 'CHORAR', answer: 'SORRIR', options: ['GRITAR', 'SORRIR', 'FALAR'], emoji: 'ðŸ˜­', instruction: 'Arraste o oposto dessa aÃ§Ã£o!' },
      
      // MECÃ‚NICA 2: Ligar os Pontos
      { id: 4, type: 'connect', leftWords: ['GRANDE', 'CLARO', 'CHEIO'], rightWords: ['ESCURO', 'VAZIO', 'PEQUENO'], matches: { 'GRANDE': 'PEQUENO', 'CLARO': 'ESCURO', 'CHEIO': 'VAZIO' }, emoji: 'ðŸ”—', instruction: 'Toque em uma palavra e depois no seu OPOSTO para ligÃ¡-las!' },
      { id: 5, type: 'connect', leftWords: ['FORTE', 'ABERTO', 'LIMPO'], rightWords: ['SUJO', 'FRACO', 'FECHADO'], matches: { 'FORTE': 'FRACO', 'ABERTO': 'FECHADO', 'LIMPO': 'SUJO' }, emoji: 'ðŸ§©', instruction: 'Ligue os pares que sÃ£o o contrÃ¡rio um do outro!' },
      { id: 6, type: 'connect', leftWords: ['ALTO', 'DENTRO', 'PERTO'], rightWords: ['LONGE', 'BAIXO', 'FORA'], matches: { 'ALTO': 'BAIXO', 'DENTRO': 'FORA', 'PERTO': 'LONGE' }, emoji: 'ðŸŽ¯', instruction: 'Encontre os 3 pares opostos!' },

      // MECÃ‚NICA 3: O Intruso (Descobrir o Ãºnico antÃ´nimo no meio de sinÃ´nimos)
      { id: 7, type: 'intruder', words: ['CHEIO', 'LOTADO', 'REPLETO', 'VAZIO'], answer: 'VAZIO', emoji: 'ðŸ“¦', instruction: 'AtenÃ§Ã£o! TrÃªs palavras significam a mesma coisa. Qual Ã© a INTRUSA (oposta)?' },
      { id: 8, type: 'intruder', words: ['RÃPIDO', 'VELOZ', 'LIGEIRO', 'LENTO'], answer: 'LENTO', emoji: 'ðŸ†', instruction: 'Ache o intruso! Qual destas tem o sentido contrÃ¡rio das outras?' },
      { id: 9, type: 'intruder', words: ['BARULHO', 'RUÃDO', 'SOM', 'SILÃŠNCIO'], answer: 'SILÃŠNCIO', emoji: 'ðŸ”Š', instruction: 'TrÃªs palavras combinam. Qual Ã© a intrusa (oposta)?' },

      // MECÃ‚NICA 4: Construtor de Frases (Substituir pela palavra que faÃ§a sentido)
      { id: 10, type: 'sentence', preText: 'O elefante Ã© um animal muito ', boldText: 'PEQUENO', postText: '.', answer: 'GRANDE', options: ['GRANDE', 'MINÃšSCULO', 'LEVE'], emoji: 'ðŸ˜', instruction: 'Troque a palavra errada pelo seu OPOSTO para a frase fazer sentido!' },
      { id: 11, type: 'sentence', preText: 'O sorvete de morango Ã© bem ', boldText: 'QUENTE', postText: '!', answer: 'FRIO', options: ['QUENTE', 'FRIO', 'SALGADO'], emoji: 'ðŸ¦', instruction: 'Troque a palavra errada pelo seu OPOSTO para a frase fazer sentido!' },
      { id: 12, type: 'sentence', preText: 'A tartaruga caminha de forma ', boldText: 'RÃPIDA', postText: '.', answer: 'LENTA', options: ['LENTA', 'VELOZ', 'APRESSADA'], emoji: 'ðŸ¢', instruction: 'Troque a palavra errada pelo seu OPOSTO para a frase fazer sentido!' },
    ];

    function App() {
      // Estados globais
      const [gameState, setGameState] = useState('cover'); 
      const [currentPhaseIndex, setCurrentPhaseIndex] = useState(0);
      const [stars, setStars] = useState(0);
      
      // Estados interativos
      const [draggedOption, setDraggedOption] = useState(null);
      const [isSuccess, setIsSuccess] = useState(false);
      const [shakeWrong, setShakeWrong] = useState(null); 
      const [wrongAnswers, setWrongAnswers] = useState([]);

      // Estados para a mecÃ¢nica de "Ligar Pontos"
      const [selectedLeft, setSelectedLeft] = useState(null);
      const [solvedPairs, setSolvedPairs] = useState([]);

      const level = LEVELS[currentPhaseIndex];

      const startGame = () => {
        setGameState('playing');
        setCurrentPhaseIndex(0);
        setStars(0);
        resetTurn();
      };

      const resetTurn = () => {
        setIsSuccess(false);
        setWrongAnswers([]);
        setDraggedOption(null);
        setSelectedLeft(null);
        setSolvedPairs([]);
        setShakeWrong(null);
      };

      // FunÃ§Ã£o genÃ©rica de vitÃ³ria
      const handleWin = () => {
        setIsSuccess(true);
        setStars(prev => prev + 1);
        setTimeout(() => {
          if (currentPhaseIndex + 1 < LEVELS.length) {
            setCurrentPhaseIndex(prev => prev + 1);
            resetTurn();
          } else {
            setGameState('complete');
          }
        }, 2500);
      };

      // LÃ³gica de ValidaÃ§Ã£o: Match, Intruder, Sentence
      const checkAnswer = (value) => {
        if (isSuccess || wrongAnswers.includes(value)) return;

        if (value === level.answer) {
          handleWin();
        } else {
          setWrongAnswers(prev => [...prev, value]);
          setShakeWrong(value);
          setTimeout(() => setShakeWrong(null), 400);
        }
      };

      // LÃ³gica de ValidaÃ§Ã£o: Ligar Pontos
      const handleConnectRight = (rightWord) => {
        if (!selectedLeft) {
          alert("Escolha primeiro uma palavra da coluna da esquerda!");
          return;
        }
        
        if (level.matches[selectedLeft] === rightWord) {
          const newSolved = [...solvedPairs, selectedLeft];
          setSolvedPairs(newSolved);
          setSelectedLeft(null);
          
          if (newSolved.length === level.leftWords.length) {
            handleWin();
          }
        } else {
          setShakeWrong(rightWord);
          setTimeout(() => setShakeWrong(null), 400);
          setSelectedLeft(null); 
        }
      };

      // --- Drag & Drop Handlers ---
      const handleDragStart = (e, value) => {
        setDraggedOption(value);
        e.dataTransfer.setData('text/plain', value);
      };
      const handleDragOver = (e) => e.preventDefault();
      const handleDrop = (e) => {
        e.preventDefault();
        const value = e.dataTransfer.getData('text/plain');
        if (value) checkAnswer(value);
      };

      // ------------------------------------------------------------------------
      // TELA 1: CAPA
      // ------------------------------------------------------------------------
      if (gameState === 'cover') {
        return (
          <div className="min-h-screen galaxy-bg flex flex-col items-center justify-center p-4 relative overflow-hidden">
            <a href="../../index.html" className="absolute top-4 left-4 text-violet-200 hover:text-violet-400 font-bold bg-violet-900/80 hover:bg-violet-800 px-4 py-2 rounded-full transition-colors z-20 border-2 border-violet-400">â—€ Voltar</a>
            {/* DecoraÃ§Ã£o Estelar */}
            <div className="absolute top-10 left-10 text-6xl opacity-40 star-anim">â­</div>
            <div className="absolute top-32 right-10 text-7xl opacity-40 star-anim" style={{animationDelay: '1s'}}>ðŸª</div>
            <div className="absolute bottom-10 left-20 text-6xl opacity-40 star-anim" style={{animationDelay: '2s'}}>ðŸš€</div>
            <div className="absolute bottom-32 right-32 text-4xl opacity-40 star-anim" style={{animationDelay: '0.5s'}}>âœ¨</div>

            <div className="bg-white/10 backdrop-blur-md p-10 rounded-[3rem] shadow-[0_0_50px_rgba(124,58,237,0.5)] flex flex-col items-center text-center z-10 max-w-xl w-full border-4 border-violet-400 mb-10">
              <div className="text-8xl mb-4">ðŸŒŒ</div>
              <h1 className="text-5xl font-black text-white mb-2 tracking-tight uppercase drop-shadow-lg">
                GalÃ¡xia dos<br/><span className="text-5xl text-violet-300">Opostos</span>
              </h1>
              <p className="text-violet-100 mb-8 text-xl font-bold px-4 drop-shadow-md">
                Prepare-se para uma viagem espacial descobrindo as palavras que significam o contrÃ¡rio (antÃ´nimos)!
              </p>
              
              <button 
                onClick={startGame}
                className="w-full py-5 px-8 bg-pink-500 hover:bg-pink-600 text-white rounded-3xl text-3xl font-black transition-all transform hover:scale-105 shadow-[0_8px_0_rgb(190,24,93)] hover:translate-y-1 active:shadow-none active:translate-y-2 uppercase"
              >
                Decolar!
              </button>
            </div>
          </div>
        );
      }

      // ------------------------------------------------------------------------
      // TELA 3: FINAL
      // ------------------------------------------------------------------------
      if (gameState === 'complete') {
        return (
          <div className="min-h-screen galaxy-bg flex flex-col items-center justify-center p-4 relative overflow-hidden">
            <div className="bg-white/10 backdrop-blur-md p-10 rounded-[3rem] shadow-[0_0_50px_rgba(124,58,237,0.5)] flex flex-col items-center text-center z-10 max-w-lg w-full border-4 border-violet-400">
              <div className="text-8xl mb-4 pop-anim">ðŸ†</div>
              <h1 className="text-5xl font-black text-white mb-2 uppercase drop-shadow-lg">
                VocÃª Ã© um Mestre!
              </h1>
              <p className="text-violet-200 mb-6 text-xl font-bold">VocÃª descobriu todos os antÃ´nimos!</p>
              
              <div className="bg-violet-900/50 border-4 border-violet-400 rounded-3xl p-6 mb-8 w-full flex flex-col items-center">
                <span className="text-violet-200 font-bold uppercase mb-2">Estrelas Espaciais</span>
                <div className="flex items-center text-6xl font-black text-yellow-300">
                  <span className="mr-4">â­</span> x{stars}
                </div>
              </div>

              <button 
                onClick={startGame}
                className="w-full py-5 px-8 bg-violet-600 hover:bg-violet-700 text-white rounded-3xl text-2xl font-black transition-all transform hover:scale-105 shadow-[0_8px_0_rgb(76,29,149)] hover:translate-y-1 active:shadow-none active:translate-y-2 uppercase"
              >
                Jogar Novamente
              </button>
            </div>
          </div>
        );
      }

      // ------------------------------------------------------------------------
      // TELA 2: JOGABILIDADE (MÃºltiplas MecÃ¢nicas)
      // ------------------------------------------------------------------------
      return (
        <div className="min-h-screen w-full flex flex-col relative galaxy-bg text-white">
          
          {/* CABEÃ‡ALHO */}
          <div className="w-full flex justify-between items-center p-6 z-10 bg-black/20 backdrop-blur-sm shadow-lg rounded-b-3xl border-b border-violet-500/30">
            <div className="flex flex-col">
              <h2 className="text-2xl md:text-3xl font-black uppercase text-violet-200 drop-shadow-md">
                Fase {level.id} de {LEVELS.length}
              </h2>
              <span className="text-sm font-bold text-violet-300">{level.instruction}</span>
            </div>
            
            <div className="flex items-center text-3xl font-black text-yellow-300 drop-shadow-md">
              <span className="mr-2">x{stars}</span>
              <span>â­</span>
            </div>
          </div>

          <div className="flex-1 flex flex-col items-center justify-center p-4 z-10 w-full max-w-5xl mx-auto">
            
            {/* ------------------------------------------------------------ */}
            {/* MECÃ‚NICA 1: MATCH (Arrastar e Largar)                          */}
            {/* ------------------------------------------------------------ */}
            {level.type === 'match' && (
              <div className="flex flex-col items-center w-full">
                <div className="flex flex-col items-center mb-12">
                  <div className="text-6xl mb-4 pop-anim">{level.emoji}</div>
                  
                  {/* Palavra Alvo (Design Espacial) */}
                  <div className="bg-violet-900/60 backdrop-blur-md rounded-[2rem] border-4 border-violet-400 p-8 shadow-[0_0_30px_rgba(139,92,246,0.5)] text-center mb-4">
                    <span className="text-4xl md:text-6xl font-black text-white tracking-wider">
                      {level.target}
                    </span>
                  </div>
                  
                  <div className="text-5xl font-black text-violet-400 mb-4">â‰ </div>
                  
                  {/* Dropzone */}
                  <div 
                    className={`rounded-[2rem] border-4 w-64 md:w-80 h-32 md:h-40 shadow-xl flex items-center justify-center transition-all ${
                      isSuccess ? 'bg-pink-500 border-pink-300 pop-anim shadow-[0_0_40px_rgba(236,72,153,0.8)]' : 'bg-black/20 border-violet-400 border-dashed backdrop-blur-sm'
                    } ${shakeWrong ? 'shake-anim border-red-500 bg-red-900/50' : ''}`}
                    onDragOver={handleDragOver}
                    onDrop={handleDrop}
                  >
                    {isSuccess ? (
                      <span className="text-3xl md:text-5xl font-black text-white drop-shadow-md">
                        {level.answer}
                      </span>
                    ) : (
                      <span className="text-violet-300/60 text-2xl font-black animate-pulse uppercase text-center px-4">
                        Arraste o<br/>oposto aqui!
                      </span>
                    )}
                  </div>
                </div>

                <div className="flex flex-wrap justify-center gap-4 md:gap-8 w-full">
                  {level.options.map((opt, i) => {
                    const isWrong = wrongAnswers.includes(opt);
                    let btnClass = "bg-violet-600 hover:bg-violet-500 border-b-8 border-violet-900 text-white cursor-grab active:cursor-grabbing hover:-translate-y-2";
                    
                    if (isWrong) {
                      btnClass = "bg-gray-600 border-b-8 border-gray-800 text-gray-400 opacity-50 cursor-not-allowed transform translate-y-2";
                    } else if (isSuccess) {
                      btnClass = "bg-violet-600 opacity-0 pointer-events-none"; 
                    }

                    return (
                      <button
                        key={i}
                        draggable={!isWrong && !isSuccess}
                        onDragStart={(e) => handleDragStart(e, opt)}
                        onClick={() => checkAnswer(opt)} 
                        disabled={isWrong || isSuccess}
                        className={`px-6 py-4 md:px-10 md:py-6 rounded-2xl md:rounded-[2rem] flex items-center justify-center transition-all duration-300 shadow-xl ${btnClass} ${shakeWrong === opt ? 'shake-anim' : ''}`}
                      >
                        <span className="text-2xl md:text-4xl font-black tracking-widest uppercase">
                          {opt}
                        </span>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ------------------------------------------------------------ */}
            {/* MECÃ‚NICA 2: CONNECT (Ligar os Pontos)                          */}
            {/* ------------------------------------------------------------ */}
            {level.type === 'connect' && (
              <div className="flex flex-col items-center w-full">
                <div className="text-[5rem] mb-4 pop-anim">{level.emoji}</div>
                
                <div className="bg-black/30 backdrop-blur-md p-4 md:p-8 rounded-[3rem] border-4 border-violet-500 shadow-[0_0_40px_rgba(139,92,246,0.3)] w-full max-w-4xl relative">
                  
                  <div className="flex justify-between h-[360px] md:h-[420px] relative w-full">
                    
                    {/* Coluna da Esquerda */}
                    <div className="flex flex-col justify-around w-[35%] z-10">
                      {level.leftWords.map((word) => {
                        const isSolved = solvedPairs.includes(word);
                        const isSelected = selectedLeft === word;
                        
                        let btnClass = "bg-indigo-900/80 hover:bg-indigo-800 border-b-4 border-indigo-500 text-indigo-100 transition-all hover:-translate-y-1 shadow-md";
                        if (isSolved) {
                          btnClass = "bg-pink-500 border-b-4 border-pink-700 text-white opacity-90 cursor-default scale-105 shadow-[0_0_20px_rgba(236,72,153,0.6)]";
                        } else if (isSelected) {
                          btnClass = "bg-violet-500 border-b-4 border-violet-300 text-white ring-4 ring-violet-400 scale-105 shadow-[0_0_20px_rgba(167,139,250,0.8)]";
                        }

                        return (
                          <button
                            key={`L-${word}`}
                            onClick={() => !isSolved && setSelectedLeft(word)}
                            className={`h-20 md:h-24 rounded-2xl flex items-center justify-center px-2 md:px-6 ${btnClass}`}
                          >
                            <span className="text-lg md:text-3xl font-black uppercase tracking-wider">{word}</span>
                          </button>
                        );
                      })}
                    </div>

                    {/* Canvas do SVG para desenhar as linhas no meio */}
                    <svg className="absolute top-0 bottom-0 left-[35%] w-[30%] h-full pointer-events-none z-0">
                      {solvedPairs.map((leftWord) => {
                        const rightWord = level.matches[leftWord];
                        const leftIndex = level.leftWords.indexOf(leftWord);
                        const rightIndex = level.rightWords.indexOf(rightWord);
                        
                        const y1 = ['16.66%', '50%', '83.33%'][leftIndex];
                        const y2 = ['16.66%', '50%', '83.33%'][rightIndex];
                        
                        return (
                          <g key={`line-${leftWord}`}>
                            <line x1="0%" y1={y1} x2="100%" y2={y2} stroke="#ec4899" strokeWidth="6" strokeLinecap="round" className="line-anim" />
                            <circle cx="0%" cy={y1} r="8" fill="#be185d" className="pop-anim" />
                            <circle cx="100%" cy={y2} r="8" fill="#be185d" className="pop-anim" />
                          </g>
                        );
                      })}
                    </svg>

                    {/* Coluna da Direita */}
                    <div className="flex flex-col justify-around w-[35%] z-10">
                      {level.rightWords.map((word) => {
                        const isSolved = Object.keys(level.matches).find(l => level.matches[l] === word && solvedPairs.includes(l));
                        const isShaking = shakeWrong === word;

                        let btnClass = "bg-violet-800/80 hover:bg-violet-700 border-b-4 border-violet-400 text-violet-100 transition-all hover:-translate-y-1 shadow-md";
                        if (isSolved) {
                          btnClass = "bg-pink-500 border-b-4 border-pink-700 text-white opacity-90 cursor-default scale-105 shadow-[0_0_20px_rgba(236,72,153,0.6)]";
                        } else if (isShaking) {
                          btnClass = "bg-red-500 border-b-4 border-red-700 text-white";
                        }

                        return (
                          <button
                            key={`R-${word}`}
                            onClick={() => !isSolved && handleConnectRight(word)}
                            className={`h-20 md:h-24 rounded-2xl flex items-center justify-center px-2 md:px-6 ${btnClass} ${isShaking ? 'shake-anim' : ''}`}
                          >
                            <span className="text-lg md:text-3xl font-black uppercase tracking-wider">{word}</span>
                          </button>
                        );
                      })}
                    </div>

                  </div>
                </div>
              </div>
            )}

            {/* ------------------------------------------------------------ */}
            {/* MECÃ‚NICA 3: INTRUDER (Encontrar a palavra diferente)           */}
            {/* ------------------------------------------------------------ */}
            {level.type === 'intruder' && (
              <div className="flex flex-col items-center w-full">
                <div className="text-[6rem] md:text-[8rem] mb-8 pop-anim drop-shadow-xl">{level.emoji}</div>
                
                <div className="bg-black/30 backdrop-blur-md p-6 md:p-10 rounded-[3rem] border-4 border-violet-500 shadow-[0_0_40px_rgba(139,92,246,0.3)] w-full max-w-3xl">
                  <div className="grid grid-cols-2 gap-4 md:gap-6">
                    {level.words.map((word, i) => {
                      const isCorrectAnswer = word === level.answer; 
                      const isClickedAndNotIntruder = wrongAnswers.includes(word);
                      const isShaking = shakeWrong === word;
                      
                      let btnClass = "bg-violet-700 hover:bg-violet-600 border-b-8 border-violet-900 text-white hover:-translate-y-2";
                      
                      if (isSuccess && isCorrectAnswer) {
                        btnClass = "bg-pink-500 border-b-8 border-pink-700 text-white pop-anim ring-8 ring-pink-300 shadow-[0_0_30px_rgba(236,72,153,0.8)]";
                      } else if (isSuccess && !isCorrectAnswer) {
                        btnClass = "bg-gray-700 border-b-8 border-gray-900 text-gray-500 opacity-50";
                      } else if (isClickedAndNotIntruder) {
                        btnClass = "bg-red-500 border-b-8 border-red-800 text-white opacity-80 cursor-not-allowed";
                      }

                      return (
                        <button
                          key={i}
                          onClick={() => checkAnswer(word)}
                          disabled={isClickedAndNotIntruder || isSuccess}
                          className={`h-24 md:h-36 rounded-2xl md:rounded-[2rem] flex items-center justify-center transition-all duration-300 shadow-lg ${btnClass} ${isShaking ? 'shake-anim' : ''}`}
                        >
                          <span className="text-2xl md:text-4xl font-black tracking-widest">
                            {word}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* ------------------------------------------------------------ */}
            {/* MECÃ‚NICA 4: SENTENCE (Substituir a palavra na frase)           */}
            {/* ------------------------------------------------------------ */}
            {level.type === 'sentence' && (
              <div className="flex flex-col items-center w-full">
                <div className="text-[5rem] mb-4 pop-anim">{level.emoji}</div>
                
                <div className="bg-black/40 backdrop-blur-md rounded-[2rem] border-4 border-violet-500 p-8 md:p-12 shadow-[0_0_30px_rgba(139,92,246,0.4)] text-center mb-12 max-w-4xl w-full leading-relaxed">
                  <span className="text-3xl md:text-5xl font-bold text-violet-100">
                    {level.preText}
                  </span>
                  
                  <span 
                    className={`inline-block mx-2 px-6 py-2 rounded-2xl border-4 align-middle transition-all ${
                      isSuccess 
                        ? 'bg-pink-500 border-pink-300 text-white pop-anim shadow-[0_0_20px_rgba(236,72,153,0.8)]' 
                        : 'bg-black/50 border-violet-400 border-dashed text-violet-300'
                    } ${shakeWrong ? 'shake-anim border-red-500 bg-red-900/50 text-red-200' : ''}`}
                    onDragOver={handleDragOver}
                    onDrop={handleDrop}
                    onClick={() => {
                       if(!isSuccess) alert("Toque ou arraste uma das opÃ§Ãµes de baixo aqui para dentro!");
                    }}
                  >
                    {isSuccess ? (
                      <span className="font-black text-3xl md:text-5xl uppercase">{level.answer}</span>
                    ) : (
                      <span className="font-black text-3xl md:text-5xl uppercase line-through opacity-60">
                        {level.boldText}
                      </span>
                    )}
                  </span>
                  
                  <span className="text-3xl md:text-5xl font-bold text-violet-100">
                    {level.postText}
                  </span>
                </div>

                <div className="flex flex-wrap justify-center gap-4 md:gap-8 w-full">
                  {level.options.map((opt, i) => {
                    const isWrong = wrongAnswers.includes(opt);
                    let btnClass = "bg-violet-600 hover:bg-violet-500 border-b-8 border-violet-900 text-white cursor-grab active:cursor-grabbing hover:-translate-y-2 shadow-lg";
                    
                    if (isWrong) {
                      btnClass = "bg-gray-600 border-b-8 border-gray-800 text-gray-400 opacity-50 cursor-not-allowed transform translate-y-2";
                    } else if (isSuccess) {
                      btnClass = "bg-violet-600 opacity-0 pointer-events-none";
                    }

                    return (
                      <button
                        key={i}
                        draggable={!isWrong && !isSuccess}
                        onDragStart={(e) => handleDragStart(e, opt)}
                        onClick={() => checkAnswer(opt)} 
                        disabled={isWrong || isSuccess}
                        className={`px-6 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-[2rem] flex items-center justify-center transition-all duration-300 ${btnClass} ${shakeWrong === opt ? 'shake-anim' : ''}`}
                      >
                        <span className="text-xl md:text-3xl font-black uppercase tracking-wider">
                          {opt}
                        </span>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
