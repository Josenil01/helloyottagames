<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
    <title>Matemática Divertida - Adição e Subtração</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fdf2f8;
            touch-action: manipulation;
            overflow-x: hidden;
            margin: 0;
        }
        .font-game {
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 2px;
        }
        .screen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .active-screen {
            display: flex;
        }
        .math-display {
            font-size: clamp(3rem, 12vw, 7rem);
            line-height: 1;
            transition: all 0.3s;
            user-select: none;
        }
        
        /* Animações */
        @keyframes success-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #22c55e; }
            100% { transform: scale(1); }
        }
        .correct-anim {
            animation: success-pop 0.5s ease;
        }

        @keyframes result-bounce {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-icons-anim {
            animation: result-bounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); color: #ef4444; }
            75% { transform: translateX(15px); }
        }
        .shake-anim {
            animation: shake 0.4s ease;
        }

        .level-card, .mode-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .level-card:not(.locked):hover, .mode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .locked {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Interface do Temporizador */
        .timer-container {
            width: 100%;
            height: 12px;
            background-color: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        #timer-bar {
            height: 100%;
            width: 100%;
            background-color: #f43f5e;
            transition: width 0.1s linear;
        }

        .counter-icon {
            font-size: 2rem;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
            display: inline-block;
        }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="screen-start" class="screen active-screen justify-center bg-gradient-to-b from-rose-400 to-orange-500 text-white text-center">
        <h1 class="text-6xl md:text-8xl font-game mb-8 drop-shadow-xl leading-tight">MATEMÁTICA<br>DIVERTIDA</h1>
        <div class="w-64 h-64 bg-white rounded-full flex items-center justify-center border-8 border-yellow-300 shadow-2xl mb-12 overflow-hidden rotate-3">
            <span class="text-rose-500 font-game text-8xl">2+3</span>
        </div>
        <button onclick="showScreen('screen-mode')" class="bg-yellow-400 hover:bg-yellow-500 text-rose-900 font-game text-4xl px-12 py-4 rounded-full shadow-lg transform transition hover:scale-110 active:scale-95 border-b-8 border-yellow-600">
            VAMOS CONTAR!
        </button>
    </div>

    <!-- SELEÇÃO DE MODO -->
    <div id="screen-mode" class="screen bg-rose-50 justify-center">
        <h2 class="text-4xl font-game text-rose-600 mb-12 text-center">QUAL O DESAFIO?</h2>
        <div class="flex flex-col md:flex-row gap-8 w-full max-w-4xl px-4">
            <button onclick="setMode('infantil')" class="mode-card flex-1 bg-white p-8 rounded-[3rem] border-4 border-rose-200 text-center shadow-xl">
                <div class="text-6xl mb-4">🍎</div>
                <div class="text-3xl font-game text-rose-600 mb-2">INFANTIL</div>
                <p class="text-rose-400 font-bold">Adição simples<br>Com ajuda para contar!</p>
            </button>

            <button onclick="setMode('fundamental')" class="mode-card flex-1 bg-white p-8 rounded-[3rem] border-4 border-orange-200 text-center shadow-xl">
                <div class="text-6xl mb-4">🚀</div>
                <div class="text-3xl font-game text-orange-600 mb-2">FUNDAMENTAL I</div>
                <p class="text-orange-400 font-bold">Adição e Subtração<br>Desafios até 100!</p>
            </button>
        </div>
        <button onclick="showScreen('screen-start')" class="mt-12 text-rose-600 font-bold underline">Voltar ao início</button>
    </div>

    <!-- SELEÇÃO DE NÍVEIS -->
    <div id="screen-levels" class="screen bg-rose-50 overflow-y-auto">
        <div class="max-w-4xl w-full">
            <div class="flex justify-between items-center mb-8">
                <button onclick="showScreen('screen-mode')" class="bg-white text-rose-600 font-bold px-4 py-2 rounded-xl shadow-sm border-2 border-rose-100">← VOLTAR</button>
                <h2 class="text-4xl font-game text-rose-600">ESCOLHA O NÍVEL</h2>
                <div class="w-20"></div>
            </div>
            <div id="levels-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 md:gap-8 pb-10">
                <!-- Níveis gerados via JS -->
            </div>
        </div>
    </div>

    <!-- TELA DO JOGO -->
    <div id="screen-game" class="screen">
        <div class="w-full max-w-5xl">
            <div class="flex justify-between items-center mb-4">
                <button onclick="quitGame()" class="bg-white px-6 py-2 rounded-xl font-bold border-2 border-rose-200 text-rose-600 shadow-sm hover:bg-rose-50 transition-colors">SAIR</button>
                <div class="flex flex-col items-end">
                    <div class="text-xl font-game text-rose-600" id="level-title">NÍVEL 1</div>
                    <div class="text-sm font-bold text-teal-500" id="phase-counter">FASE 1 / 10</div>
                </div>
            </div>

            <!-- Temporizador -->
            <div class="timer-container">
                <div id="timer-bar"></div>
            </div>

            <div class="flex flex-col items-center justify-center bg-white p-6 md:p-12 rounded-[4rem] shadow-2xl border-b-8 border-rose-100 relative min-h-[500px] gap-8">
                
                <!-- Ajuda Visual (Modo Infantil) -->
                <div id="visual-aid" class="flex flex-wrap justify-center items-center gap-4 min-h-[100px] w-full">
                    <!-- Ícones aparecem aqui -->
                </div>

                <!-- Operação Matemática -->
                <div class="flex flex-col items-center text-center">
                    <div id="math-op-display" class="math-display font-game text-rose-500 drop-shadow-lg flex items-center gap-4">
                        <span>5</span>
                        <span>+</span>
                        <span>2</span>
                        <span>=</span>
                        <span class="text-rose-200" id="answer-slot">?</span>
                    </div>
                </div>
            </div>

            <div class="text-center mt-10">
                <div class="inline-flex items-center gap-3 bg-rose-100 text-rose-800 px-8 py-4 rounded-full shadow-sm">
                    <span class="text-3xl">⌨️</span>
                    <p class="text-xl font-bold">Digite o número no teclado!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE VITÓRIA -->
    <div id="win-modal" class="fixed inset-0 bg-rose-900/90 flex items-center justify-center hidden z-50 backdrop-blur-sm">
        <div class="bg-white p-12 rounded-[3rem] text-center shadow-2xl border-8 border-yellow-400 max-w-sm mx-4 transform scale-105">
            <h2 class="text-5xl font-game text-rose-600 mb-4" id="modal-title">CONCLUÍDO!</h2>
            <div class="text-8xl mb-6">🏆</div>
            <p class="text-xl font-bold text-gray-600 mb-8" id="modal-msg">Você é fera na matemática!</p>
            <button onclick="showScreen('screen-levels')" class="bg-green-500 hover:bg-green-600 text-white font-game text-3xl py-4 px-12 rounded-full shadow-lg border-b-8 border-green-700 active:translate-y-1 active:border-b-0 transition-all">
                CONTINUAR
            </button>
        </div>
    </div>

    <script>
        const gameLevels = [
            { name: "Nível 1", count: 8, maxVal: 5, ops: ['+'], time: 15000 },
            { name: "Nível 2", count: 8, maxVal: 10, ops: ['+'], time: 15000 },
            { name: "Nível 3", count: 10, maxVal: 10, ops: ['-'], time: 15000 },
            { name: "Nível 4", count: 10, maxVal: 15, ops: ['+'], time: 15000 },
            { name: "Nível 5", count: 10, maxVal: 15, ops: ['-'], time: 12000 },
            { name: "Nível 6", count: 12, maxVal: 20, ops: ['+'], time: 12000 },
            { name: "Nível 7", count: 12, maxVal: 20, ops: ['-'], time: 12000 },
            { name: "Nível 8", count: 12, maxVal: 20, ops: ['+', '-'], time: 10000 },
            { name: "Nível 9", count: 15, maxVal: 30, ops: ['+', '-'], time: 10000 },
            { name: "Nível 10", count: 15, maxVal: 50, ops: ['+', '-'], time: 10000 },
            { name: "Nível 11", count: 15, maxVal: 75, ops: ['+', '-'], time: 8000 },
            { name: "Nível 12", count: 20, maxVal: 100, ops: ['+', '-'], time: 8000 }
        ];

        let unlockedLevels = 1;
        let activeLevelIdx = 0;
        let activePhaseIdx = 0;
        let canType = false;
        let gameMode = 'infantil';
        let currentOperation = null;
        let typedInput = "";
        let currentIcon = '🍎';

        let timeLeft = 100;
        let timerInterval = null;

        function showScreen(screenId) {
            stopTimer();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            document.getElementById('win-modal').classList.add('hidden');
            if (screenId === 'screen-levels') renderLevelsGrid();
        }

        function setMode(mode) {
            gameMode = mode;
            showScreen('screen-levels');
        }

        function renderLevelsGrid() {
            const grid = document.getElementById('levels-grid');
            grid.innerHTML = '';
            gameLevels.forEach((level, index) => {
                const isLocked = index + 1 > unlockedLevels;
                const card = document.createElement('div');
                card.className = `level-card bg-white p-4 md:p-6 rounded-[2rem] flex flex-col items-center justify-center text-center border-4 ${isLocked ? 'locked border-gray-200' : 'border-rose-100 cursor-pointer shadow-md'}`;
                card.innerHTML = `
                    <div class="text-2xl md:text-3xl mb-1">${isLocked ? '🔒' : '🌟'}</div>
                    <div class="text-lg md:text-xl font-game text-rose-600">${level.name}</div>
                    <div class="text-xs font-bold text-rose-300">${isLocked ? 'Bloqueado' : level.count + ' Fases'}</div>
                `;
                if (!isLocked) card.onclick = () => startLevel(index);
                grid.appendChild(card);
            });
        }

        function startLevel(index) {
            activeLevelIdx = index;
            activePhaseIdx = 0;
            showScreen('screen-game');
            generateNewOperation();
        }

        function generateNewOperation() {
            const config = gameLevels[activeLevelIdx];
            const op = config.ops[Math.floor(Math.random() * config.ops.length)];
            let n1, n2, result;

            if (op === '+') {
                // n1 entre 1 e maxVal-1
                n1 = Math.floor(Math.random() * (config.maxVal - 1)) + 1;
                // n2 entre 1 e maxVal-n1
                n2 = Math.floor(Math.random() * (config.maxVal - n1)) + 1;
                result = n1 + n2;
            } else {
                // Subtração: n1 entre 2 e maxVal, n2 entre 1 e n1-1 (evita zero e resultado zero)
                n1 = Math.floor(Math.random() * (config.maxVal - 1)) + 2;
                n2 = Math.floor(Math.random() * (n1 - 1)) + 1;
                result = n1 - n2;
            }

            currentOperation = { n1, n2, op, result };
            typedInput = "";
            
            const iconSet = ['🍎', '⭐️', '🐶', '🍕', '⚽️', '🧸', '🍭', '🍓', '🐝', '🍦'];
            currentIcon = iconSet[Math.floor(Math.random() * iconSet.length)];
            
            renderPhase();
        }

        function createIconGroup(num, colorClass) {
            const group = document.createElement('div');
            group.className = `flex flex-wrap gap-1 border-2 border-dashed ${colorClass} p-2 rounded-xl min-w-[40px] justify-center transition-all duration-500`;
            for(let i=0; i<num; i++) {
                const span = document.createElement('span');
                span.className = "counter-icon";
                span.innerText = currentIcon;
                group.appendChild(span);
            }
            return group;
        }

        function renderPhase() {
            canType = true;
            const opDisplay = document.getElementById('math-op-display');
            const aid = document.getElementById('visual-aid');
            const slot = document.getElementById('answer-slot');
            
            document.getElementById('level-title').innerText = gameLevels[activeLevelIdx].name;
            document.getElementById('phase-counter').innerText = `FASE ${activePhaseIdx + 1} / ${gameLevels[activeLevelIdx].count}`;
            
            opDisplay.children[0].innerText = currentOperation.n1;
            opDisplay.children[1].innerText = currentOperation.op;
            opDisplay.children[2].innerText = currentOperation.n2;
            slot.innerText = "?";
            slot.className = "text-rose-200";
            opDisplay.className = "math-display font-game text-rose-500 drop-shadow-lg flex items-center gap-4";

            aid.innerHTML = '';
            if (gameMode === 'infantil' && currentOperation.n1 + currentOperation.n2 <= 20) {
                aid.appendChild(createIconGroup(currentOperation.n1, 'border-rose-200'));
                const sign = document.createElement('span');
                sign.className = "text-3xl font-game text-rose-300 mx-2 self-center";
                sign.innerText = currentOperation.op;
                aid.appendChild(sign);
                aid.appendChild(createIconGroup(currentOperation.n2, 'border-orange-200'));
            }

            resetTimer();
        }

        function resetTimer() {
            stopTimer();
            timeLeft = 100;
            updateTimerUI();
            const step = 100;
            const config = gameLevels[activeLevelIdx];
            const decrement = (step / config.time) * 100;
            
            timerInterval = setInterval(() => {
                timeLeft -= decrement;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    handleTimeOut();
                }
                updateTimerUI();
            }, step);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
        }

        function updateTimerUI() {
            const bar = document.getElementById('timer-bar');
            bar.style.width = `${timeLeft}%`;
            if (timeLeft > 50) bar.style.backgroundColor = '#10b981';
            else if (timeLeft > 20) bar.style.backgroundColor = '#facc15';
            else bar.style.backgroundColor = '#f43f5e';
        }

        function handleTimeOut() {
            stopTimer();
            const display = document.getElementById('math-op-display');
            display.classList.add('shake-anim');
            setTimeout(() => {
                display.classList.remove('shake-anim');
                resetTimer();
            }, 500);
        }

        function quitGame() {
            stopTimer();
            showScreen('screen-levels');
        }

        window.addEventListener('keydown', (e) => {
            if (!document.getElementById('screen-game').classList.contains('active-screen') || !canType) return;

            if (e.key >= '0' && e.key <= '9') {
                typedInput += e.key;
                const slot = document.getElementById('answer-slot');
                slot.innerText = typedInput;
                slot.className = "text-rose-600";

                const targetStr = currentOperation.result.toString();
                
                if (typedInput === targetStr) {
                    canType = false;
                    stopTimer();
                    
                    const display = document.getElementById('math-op-display');
                    display.classList.add('correct-anim');

                    // Animação dos ícones de resultado no modo Infantil
                    if (gameMode === 'infantil' && currentOperation.n1 + currentOperation.n2 <= 20) {
                        const aid = document.getElementById('visual-aid');
                        aid.innerHTML = '';
                        const resultContainer = document.createElement('div');
                        resultContainer.className = "flex flex-col items-center gap-2 result-icons-anim";
                        
                        const label = document.createElement('span');
                        label.className = "text-xl font-game text-green-500 uppercase";
                        label.innerText = "Total!";
                        
                        const iconsGroup = createIconGroup(currentOperation.result, 'border-green-400 bg-green-50');
                        
                        resultContainer.appendChild(label);
                        resultContainer.appendChild(iconsGroup);
                        aid.appendChild(resultContainer);
                    }

                    setTimeout(nextPhase, 1500);
                } else if (typedInput.length >= targetStr.length) {
                    const display = document.getElementById('math-op-display');
                    display.classList.add('shake-anim');
                    setTimeout(() => {
                        display.classList.remove('shake-anim');
                        typedInput = "";
                        slot.innerText = "?";
                        slot.className = "text-rose-200";
                    }, 500);
                }
            } else if (e.key === "Backspace") {
                typedInput = "";
                document.getElementById('answer-slot').innerText = "?";
                document.getElementById('answer-slot').className = "text-rose-200";
            }
        });

        function nextPhase() {
            activePhaseIdx++;
            const level = gameLevels[activeLevelIdx];
            if (activePhaseIdx < level.count) {
                generateNewOperation();
            } else {
                if (activeLevelIdx + 1 === unlockedLevels && unlockedLevels < gameLevels.length) {
                    unlockedLevels++;
                }
                const isFinal = activeLevelIdx + 1 === gameLevels.length;
                document.getElementById('modal-title').innerText = isFinal ? "MESTRE!" : "NÍVEL CONCLUÍDO!";
                document.getElementById('win-modal').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
