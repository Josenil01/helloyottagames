<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
    <title>Matemática Divertida - Adição e Subtração</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fdf2f8;
            touch-action: manipulation;
            overflow-x: hidden;
            margin: 0;
        }
        .font-game {
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 2px;
        }
        .screen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .active-screen {
            display: flex;
        }
        .math-display {
            font-size: clamp(3rem, 12vw, 7rem);
            line-height: 1;
            transition: all 0.3s;
            user-select: none;
        }
        
        /* Animações */
        @keyframes success-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #22c55e; }
            100% { transform: scale(1); }
        }
        .correct-anim {
            animation: success-pop 0.5s ease;
        }

        @keyframes result-bounce {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-icons-anim {
            animation: result-bounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); color: #ef4444; }
            75% { transform: translateX(15px); }
        }
        .shake-anim {
            animation: shake 0.4s ease;
        }

        .level-card, .mode-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .level-card:not(.locked):hover, .mode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .locked {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Interface do Temporizador */
        .timer-container {
            width: 100%;
            height: 12px;
            background-color: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        #timer-bar {
            height: 100%;
            width: 100%;
            background-color: #f43f5e;
            transition: width 0.1s linear;
        }

        .counter-icon {
            font-size: 2rem;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
            display: inline-block;
        }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="screen-start" class="screen active-screen justify-center bg-gradient-to-b from-rose-400 to-orange-500 text-white text-center">
        <h1 class="text-6xl md:text-8xl font-game mb-8 drop-shadow-xl leading-tight">MATEMÁTICA<br>DIVERTIDA</h1>
        <div class="w-64 h-64 bg-white rounded-full flex items-center justify-center border-8 border-yellow-300 shadow-2xl mb-12 overflow-hidden rotate-3">
            <span class="text-rose-500 font-game text-8xl">2+3</span>
        </div>
        <button onclick="showScreen('screen-mode')" class="bg-yellow-400 hover:bg-yellow-500 text-rose-900 font-game text-4xl px-12 py-4 rounded-full shadow-lg transform transition hover:scale-110 active:scale-95 border-b-8 border-yellow-600">
            VAMOS CONTAR!
        </button>
    </div>

    <!-- SELEÇÃO DE MODO -->
    <div id="screen-mode" class="screen bg-rose-50 justify-center">
        <h2 class="text-4xl font-game text-rose-600 mb-12 text-center">QUAL O DESAFIO?</h2>
        <div class="flex flex-col md:flex-row gap-8 w-full max-w-4xl px-4">
            <button onclick="setMode('infantil')" class="mode-card flex-1 bg-white p-8 rounded-[3rem] border-4 border-rose-200 text-center shadow-xl">
                <div class="text-6xl mb-4">🍎</div>
                <div class="text-3xl font-game text-rose-600 mb-2">INFANTIL</div>
                <p class="text-rose-400 font-bold">Adição simples<br>Com ajuda para contar!</p>
            </button>

            <button onclick="setMode('fundamental')" class="mode-card flex-1 bg-white p-8 rounded-[3rem] border-4 border-orange-200 text-center shadow-xl">
                <div class="text-6xl mb-4">🚀</div>
                <div class="text-3xl font-game text-orange-600 mb-2">FUNDAMENTAL I</div>
                <p class="text-orange-400 font-bold">Adição e Subtração<br>Desafios até 100!</p>
            </button>
        </div>
        <button onclick="showScreen('screen-start')" class="mt-12 text-rose-600 font-bold underline">Voltar ao início</button>
    </div>

    <!-- SELEÇÃO DE NÍVEIS -->
    <div id="screen-levels" class="screen bg-rose-50 overflow-y-auto">
        <div class="max-w-4xl w-full">
            <div class="flex justify-between items-center mb-8">
                <button onclick="showScreen('screen-mode')" class="bg-white text-rose-600 font-bold px-4 py-2 rounded-xl shadow-sm border-2 border-rose-100">← VOLTAR</button>
                <h2 class="text-4xl font-game text-rose-600">ESCOLHA O NÍVEL</h2>
                <div class="w-20"></div>
            </div>
            <div id="levels-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 md:gap-8 pb-10">
                <!-- Níveis gerados via JS -->
            </div>
        </div>
    </div>

    <!-- TELA DO JOGO -->
    <div id="screen-game" class="screen">
        <div class="w-full max-w-5xl">
            <div class="flex justify-between items-center mb-4">
                <button onclick="quitGame()" class="bg-white px-6 py-2 rounded-xl font-bold border-2 border-rose-200 text-rose-600 shadow-sm hover:bg-rose-50 transition-colors">SAIR</button>
            </div>

            <!-- Temporizador -->
            <div class="timer-container">
                <div id="timer-bar"></div>
            </div>

            <div class="flex flex-col items-center justify-center bg-white p-6 md:p-12 rounded-[4rem] shadow-2xl border-b-8 border-rose-100 relative min-h-[500px] gap-8">
                
                <!-- Ajuda Visual (Modo Infantil) -->
                <div id="visual-aid" class="flex flex-wrap justify-center items-center gap-4 min-h-[100px] w-full">
                    <!-- Ícones aparecem aqui -->
                </div>

                <!-- Operação Matemática -->
                <div class="flex flex-col items-center text-center">
                    <div id="math-op-display" class="math-display font-game text-rose-500 drop-shadow-lg flex items-center gap-4">
                        <span>5</span>
                        <span>+</span>
                        <span>2</span>
                        <span>=</span>
                        <span class="text-rose-200" id="answer-slot">?</span>
                    </div>
                </div>
            </div>

            <div class="text-center mt-10">
                <div class="inline-flex items-center gap-3 bg-rose-100 text-rose-800 px-8 py-4 rounded-full shadow-sm">
                    <span class="text-3xl">⌨️</span>
                    <p class="text-xl font-bold">Digite o número no teclado!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE VITÓRIA -->
    <div id="win-modal" class="fixed inset-0 bg-rose-900/90 flex items-center justify-center hidden z-50 backdrop-blur-sm">
        <div class="bg-white p-12 rounded-[3rem] text-center shadow-2xl border-8 border-yellow-400 max-w-sm mx-4 transform scale-105">
            <h2 class="text-5xl font-game text-rose-600 mb-4" id="modal-title">CONCLUÍDO!</h2>
            <div class="text-8xl mb-6">🏆</div>
            <p class="text-xl font-bold text-gray-600 mb-8" id="modal-msg">Você é fera na matemática!</p>
            <button onclick="showScreen('screen-levels')" class="bg-green-500 hover:bg-green-600 text-white font-game text-3xl py-4 px-12 rounded-full shadow-lg border-b-8 border-green-700 active:translate-y-1 active:border-b-0 transition-all">
                CONTINUAR
            </button>
        </div>
    </div>

    <script src="../utils/audio.js"></script>
    <script src="../utils/score.js"></script>
    <script src="../utils/elapsed.js"></script>
    <script src="../utils/progress.js"></script>
    <script src="../utils/stars.js"></script>
    <script src="main.js"></script>
</body>
</html>
