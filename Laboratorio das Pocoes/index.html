<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
    <title>Laboratorio das Pocoes Misticas</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --magic-purple: #6d28d9;
            --magic-cyan: #22d3ee;
            --magic-pink: #db2777;
            --gold: #fbbf24;
            --night: #0f172a;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: "Baloo 2", cursive;
            background: var(--night);
            overflow: hidden;
            color: #f8fafc;
            user-select: none;
        }

        /* Cenario Mistico */
        .scenery {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
        }

        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 0.7; }
        }

        /* Layout Principal */
        .container {
            max-width: 900px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* HUD */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            color: white;
            padding: 5px 15px;
            border-radius: 999px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Area do Laboratorio */
        .lab-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .potion-shelf {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            border-bottom: 8px solid #000;
        }

        .flask {
            width: 80px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px 15px 40% 40%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            box-shadow: inset 0 -20px 20px rgba(0,0,0,0.2);
            animation: float 4s infinite ease-in-out;
        }

        .flask::before {
            content: "";
            position: absolute;
            top: -10px;
            width: 40px;
            height: 10px;
            background: #475569;
            border-radius: 4px;
        }

        .flask.num-1 { background: linear-gradient(to top, var(--magic-purple), transparent); }
        .flask.num-2 { background: linear-gradient(to top, var(--magic-pink), transparent); }
        .flask.op { background: transparent; border: none; font-size: 1.5rem; width: 40px; animation-delay: 0.5s; box-shadow: none; }

        .flask.target {
            background: rgba(255, 255, 255, 0.05);
            border: 3px dashed rgba(255, 255, 255, 0.3);
            color: transparent;
        }

        .flask.filled {
            background: linear-gradient(to top, var(--magic-cyan), transparent);
            border-style: solid;
            border-color: var(--magic-cyan);
            color: white;
            transition: all 0.5s;
            text-shadow: 0 0 10px var(--magic-cyan);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Ingredientes (Opcoes) */
        .ingredients-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .ingredient-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid var(--magic-cyan);
            border-radius: 25px;
            padding: 15px;
            font-size: 2.2rem;
            font-family: inherit;
            cursor: pointer;
            color: var(--magic-cyan);
            box-shadow: 0 8px 0 #155e75, 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
            transition: transform 0.1s;
        }

        .ingredient-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #155e75; }

        /* Item Magico Voando */
        .flying-ingredient {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            font-size: 2.2rem;
            color: var(--magic-cyan);
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            width: 80px;
            height: 80px;
            box-shadow: 0 0 20px var(--magic-cyan);
            border: 3px solid var(--magic-cyan);
        }

        /* Telas */
        .screen { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .screen.active { display: flex; }

        .btn-large {
            background: var(--magic-purple);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 8px 0 #4c1d95;
            font-weight: 800;
            margin-top: 20px;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }

        .lvl-btn {
            aspect-ratio: 1;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .lvl-btn.unlocked { border-color: var(--magic-cyan); background: rgba(34, 211, 238, 0.1); color: var(--magic-cyan); }
        .lvl-btn:disabled { opacity: 0.4; }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: #1e1b4b;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            border: 4px solid var(--magic-cyan);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.3);
        }
    </style>
</head>
<body>

    <div class="scenery" id="scenery"></div>

    <div class="container">
        <!-- HOME -->
        <div id="screen-home" class="screen active">
            <h1 style="font-size: 3.5rem; margin: 0; text-shadow: 0 0 20px var(--magic-purple);">🧪 Laboratorio</h1>
            <h2 style="margin: 0; color: var(--magic-cyan); text-shadow: 0 0 10px var(--magic-cyan);">das Pocoes</h2>
            <div class="flask num-1" style="margin: 40px 0; width: 100px; height: 120px; font-size: 3rem;">✨</div>
            <button class="btn-large" onclick="changeScreen('levels')">ENTRAR</button>
            <p id="total-stars">⭐ 0/36</p>
        </div>

        <!-- NIVEIS -->
        <div id="screen-levels" class="screen" style="justify-content: flex-start; padding-top: 40px;">
            <div class="hud" style="width: 100%;">
                <button class="stat-badge" onclick="changeScreen('home')" style="cursor:pointer; border:none">🏠 Inicio</button>
                <div class="stat-badge" id="lvl-star-count">⭐ 0</div>
            </div>
            <h2 style="margin: 20px 0;">Mapa das Pocoes</h2>
            <div class="level-grid" id="level-grid"></div>
        </div>

        <!-- JOGO -->
        <div id="screen-game" class="screen">
            <div class="hud" style="width: 100%;">
                <button class="stat-badge" onclick="changeScreen('levels')" style="cursor:pointer; border:none">✖</button>
            </div>

            <div class="lab-area">
                <div class="potion-shelf" id="active-shelf">
                    <!-- Gerado via JS: Flasks -->
                </div>

                <div class="ingredients-grid" id="options">
                    <!-- Ingredientes de resposta -->
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 id="result-title" style="color: var(--magic-cyan)">Pocao Estabilizada!</h2>
            <div id="result-stars" style="font-size: 2.5rem; margin: 15px 0;">⭐⭐⭐</div>
            <p id="result-msg">Voce e um grande alquimista!</p>
            <button id="modal-next-btn" class="btn-large" onclick="handleModalAction()">PROXIMO</button>
        </div>
    </div>

    <script src="../utils/audio.js"></script>
    <script src="../utils/score.js"></script>
    <script src="../utils/elapsed.js"></script>
    <script src="../utils/progress.js"></script>
    <script src="../utils/stars.js"></script>
    <script src="main.js"></script>
</body>
</html>
