<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
    <title>Aprenda a Digitar - Letra Inicial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            max-width: 100%;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0fdfa;
            touch-action: manipulation;
        }
        .font-game {
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 2px;
        }
        .screen {
            display: none;
            min-height: 100vh;
            min-height: 100dvh;
            flex-direction: column;
            align-items: center;
            padding: clamp(1rem, 4vw, 2rem);
            width: 100%;
        }
        .active-screen {
            display: flex;
        }
        .letter-big {
            font-size: clamp(3.5rem, 14vw, 10rem);
            line-height: 1;
            transition: all 0.3s;
            user-select: none;
            white-space: nowrap;
            max-width: 100%;
        }
        
        /* Animações */
        @keyframes success-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #22c55e; }
            100% { transform: scale(1); }
        }
        .correct-anim {
            animation: success-pop 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); color: #ef4444; }
            75% { transform: translateX(15px); }
        }
        .shake-anim {
            animation: shake 0.4s ease;
        }

        .level-card, .mode-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .level-card:not(.locked):hover, .mode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .locked {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Timer UI */
        .timer-container {
            width: 100%;
            height: 12px;
            background-color: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        #timer-bar {
            height: 100%;
            width: 100%;
            background-color: #14b8a6;
            transition: width 0.1s linear, background-color 0.3s;
        }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="screen-start" class="screen active-screen justify-center bg-gradient-to-b from-teal-400 to-blue-500 text-white text-center">
            <a href="../../index.html" class="absolute top-4 left-4 text-teal-100 hover:text-teal-300 font-bold bg-teal-700/80 hover:bg-teal-800 px-4 py-2 rounded-full transition-colors z-20 border-2 border-teal-300">◀ Voltar</a>
        <h1 class="text-6xl md:text-8xl font-game mb-8 drop-shadow-xl leading-tight">QUAL É A<br>LETRA?</h1>
        <div class="w-64 h-64 bg-white rounded-full flex items-center justify-center border-8 border-yellow-300 shadow-2xl mb-12 overflow-hidden rotate-3">
            <span class="text-teal-500 font-game text-8xl">A a</span>
        </div>
        <button onclick="showScreen('screen-mode')" class="bg-yellow-400 hover:bg-yellow-500 text-teal-900 font-game text-4xl px-12 py-4 rounded-full shadow-lg transform transition hover:scale-110 active:scale-95 border-b-8 border-yellow-600">
            COMEÇAR!
        </button>
    </div>

    <!-- TELA DE SELEÇÃO DE MODO -->
    <div id="screen-mode" class="screen bg-teal-50 justify-center">
        <h2 class="text-4xl font-game text-teal-600 mb-12 text-center">QUEM VAI JOGAR?</h2>
        <div class="flex flex-col md:flex-row gap-8 w-full max-w-4xl px-4">
            <button onclick="setMode('infantil')" class="mode-card flex-1 bg-white p-8 rounded-[3rem] border-4 border-teal-200 text-center shadow-xl">
                <div class="text-6xl mb-4">👶</div>
                <div class="text-3xl font-game text-teal-600 mb-2">INFANTIL</div>
                <p class="text-teal-400 font-bold">Letras Grandes<br>(MAIÚSCULAS)</p>
            </button>

            <button onclick="setMode('fundamental')" class="mode-card flex-1 bg-white p-8 rounded-[3rem] border-4 border-purple-200 text-center shadow-xl">
                <div class="text-6xl mb-4">🎒</div>
                <div class="text-3xl font-game text-purple-600 mb-2">FUNDAMENTAL I</div>
                <p class="text-purple-400 font-bold">Maiúsculas e Minúsculas<br>(A a - abelha)</p>
            </button>
        </div>
        <button onclick="showScreen('screen-start')" class="mt-12 text-teal-600 font-bold underline">Voltar ao início</button>
    </div>

    <!-- TELA DE SELEÇÃO DE NÍVEIS -->
    <div id="screen-levels" class="screen bg-teal-50">
        <div class="max-w-4xl w-full">
            <div class="flex justify-between items-center mb-8">
                <button onclick="showScreen('screen-mode')" class="bg-white text-teal-600 font-bold px-4 py-2 rounded-xl shadow-sm border-2 border-teal-100">← VOLTAR</button>
                <h2 class="text-4xl font-game text-teal-600">ESCOLHA O NÍVEL</h2>
                <div class="w-20"></div>
            </div>
            <div id="levels-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8"></div>
        </div>
    </div>

    <!-- TELA DO JOGO -->
    <div id="screen-game" class="screen">
        <div class="w-full max-w-5xl">
            <div class="flex justify-between items-center mb-4">
                <button onclick="quitGame()" class="bg-white px-6 py-2 rounded-xl font-bold border-2 border-teal-200 text-teal-600 shadow-sm hover:bg-teal-50 transition-colors">SAIR</button>
            </div>

            <!-- Timer Bar -->
            <div class="timer-container">
                <div id="timer-bar"></div>
            </div>

            <div class="flex flex-col md:flex-row items-center justify-around bg-white p-6 md:p-12 rounded-[4rem] shadow-2xl border-b-8 border-teal-100 relative min-h-[500px] gap-4">
                <div class="w-64 h-64 md:w-80 md:h-80 bg-teal-50 rounded-[3rem] border-4 border-dashed border-teal-200 flex items-center justify-center shrink-0">
                    <span id="display-emoji" class="text-8xl md:text-9xl select-none">🎯</span>
                </div>

                <div class="flex flex-col items-center mt-4 md:mt-0 text-center">
                    <div id="big-letter-display" class="letter-big font-game text-teal-500 drop-shadow-lg">?</div>
                    <p class="text-teal-300 font-bold text-3xl mt-4 uppercase tracking-widest" id="word-name">------</p>
                </div>
            </div>

            <div class="text-center mt-10">
                <div class="inline-flex items-center gap-3 bg-teal-100 text-teal-800 px-8 py-4 rounded-full shadow-sm">
                    <span class="text-3xl">⌨️</span>
                    <p class="text-xl font-bold" id="instruction-text">Carregue na tecla correta!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE VITÓRIA -->
    <div id="win-modal" class="fixed inset-0 bg-teal-900/90 flex items-center justify-center hidden z-50 backdrop-blur-sm">
        <div class="bg-white p-12 rounded-[3rem] text-center shadow-2xl border-8 border-yellow-400 max-w-sm mx-4 transform scale-105">
            <h2 class="text-5xl font-game text-teal-600 mb-4" id="modal-title">NÍVEL CONCLUÍDO!</h2>
            <div class="text-8xl mb-6">🌟</div>
            <p class="text-xl font-bold text-gray-600 mb-8" id="modal-msg">Muito bem!</p>
            <button onclick="showScreen('screen-levels')" class="bg-green-500 hover:bg-green-600 text-white font-game text-3xl py-4 px-12 rounded-full shadow-lg border-b-8 border-green-700 active:translate-y-1 active:border-b-0 transition-all">
                CONTINUAR
            </button>
        </div>
    </div>

    <script src="../utils/audio.js"></script>
    <script src="../utils/score.js"></script>
    <script src="../utils/elapsed.js"></script>
    <script src="../utils/progress.js"></script>
    <script src="../utils/stars.js"></script>
    <script src="main.js"></script>
</body>
</html>
