<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprenda a Digitar - Letra Inicial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0fdfa;
            touch-action: manipulation;
            overflow-x: hidden;
            margin: 0;
        }
        .font-game {
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 2px;
        }
        .screen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        .active-screen {
            display: flex;
        }
        .letter-big {
            font-size: clamp(5rem, 18vw, 10rem);
            line-height: 1;
            transition: all 0.3s;
            user-select: none;
            white-space: nowrap;
        }
        
        /* Animações */
        @keyframes success-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #22c55e; }
            100% { transform: scale(1); }
        }
        .correct-anim {
            animation: success-pop 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); color: #ef4444; }
            75% { transform: translateX(15px); }
        }
        .shake-anim {
            animation: shake 0.4s ease;
        }

        .level-card, .mode-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .level-card:not(.locked):hover, .mode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .locked {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Timer UI */
        .timer-container {
            width: 100%;
            height: 12px;
            background-color: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        #timer-bar {
            height: 100%;
            width: 100%;
            background-color: #14b8a6;
            transition: width 0.1s linear, background-color 0.3s;
        }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="screen-start" class="screen active-screen justify-center bg-gradient-to-b from-teal-400 to-blue-500 text-white text-center">
        <h1 class="text-6xl md:text-8xl font-game mb-8 drop-shadow-xl leading-tight">QUAL É A<br>LETRA?</h1>
        <div class="w-64 h-64 bg-white rounded-full flex items-center justify-center border-8 border-yellow-300 shadow-2xl mb-12 overflow-hidden rotate-3">
            <span class="text-teal-500 font-game text-8xl">A a</span>
        </div>
        <button onclick="showScreen('screen-mode')" class="bg-yellow-400 hover:bg-yellow-500 text-teal-900 font-game text-4xl px-12 py-4 rounded-full shadow-lg transform transition hover:scale-110 active:scale-95 border-b-8 border-yellow-600">
            COMEÇAR!
        </button>
    </div>

    <!-- TELA DE SELEÇÃO DE MODO -->
    <div id="screen-mode" class="screen bg-teal-50 justify-center">
        <h2 class="text-4xl font-game text-teal-600 mb-12 text-center">QUEM VAI JOGAR?</h2>
        <div class="flex flex-col md:flex-row gap-8 w-full max-w-4xl px-4">
            <button onclick="setMode('infantil')" class="mode-card flex-1 bg-white p-8 rounded-[3rem] border-4 border-teal-200 text-center shadow-xl">
                <div class="text-6xl mb-4">👶</div>
                <div class="text-3xl font-game text-teal-600 mb-2">INFANTIL</div>
                <p class="text-teal-400 font-bold">Letras Grandes<br>(MAIÚSCULAS)</p>
            </button>

            <button onclick="setMode('fundamental')" class="mode-card flex-1 bg-white p-8 rounded-[3rem] border-4 border-purple-200 text-center shadow-xl">
                <div class="text-6xl mb-4">🎒</div>
                <div class="text-3xl font-game text-purple-600 mb-2">FUNDAMENTAL I</div>
                <p class="text-purple-400 font-bold">Maiúsculas e Minúsculas<br>(A a - abelha)</p>
            </button>
        </div>
        <button onclick="showScreen('screen-start')" class="mt-12 text-teal-600 font-bold underline">Voltar ao início</button>
    </div>

    <!-- TELA DE SELEÇÃO DE NÍVEIS -->
    <div id="screen-levels" class="screen bg-teal-50">
        <div class="max-w-4xl w-full">
            <div class="flex justify-between items-center mb-8">
                <button onclick="showScreen('screen-mode')" class="bg-white text-teal-600 font-bold px-4 py-2 rounded-xl shadow-sm border-2 border-teal-100">← VOLTAR</button>
                <h2 class="text-4xl font-game text-teal-600">ESCOLHA O NÍVEL</h2>
                <div class="w-20"></div>
            </div>
            <div id="levels-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8"></div>
        </div>
    </div>

    <!-- TELA DO JOGO -->
    <div id="screen-game" class="screen">
        <div class="w-full max-w-5xl">
            <div class="flex justify-between items-center mb-4">
                <button onclick="quitGame()" class="bg-white px-6 py-2 rounded-xl font-bold border-2 border-teal-200 text-teal-600 shadow-sm hover:bg-teal-50 transition-colors">SAIR</button>
                <div class="flex flex-col items-end">
                    <div class="text-xl font-game text-teal-600" id="level-title">NÍVEL 1</div>
                    <div class="text-sm font-bold text-teal-400" id="phase-counter">FASE 1 / 8</div>
                </div>
            </div>

            <!-- Timer Bar -->
            <div class="timer-container">
                <div id="timer-bar"></div>
            </div>

            <div class="flex flex-col md:flex-row items-center justify-around bg-white p-6 md:p-12 rounded-[4rem] shadow-2xl border-b-8 border-teal-100 relative min-h-[500px] gap-4">
                <div class="w-64 h-64 md:w-80 md:h-80 bg-teal-50 rounded-[3rem] border-4 border-dashed border-teal-200 flex items-center justify-center overflow-hidden shrink-0">
                    <img id="display-image" src="" alt="Objeto" class="w-full h-full object-cover">
                </div>

                <div class="flex flex-col items-center mt-4 md:mt-0 text-center">
                    <div id="big-letter-display" class="letter-big font-game text-teal-500 drop-shadow-lg">?</div>
                    <p class="text-teal-300 font-bold text-3xl mt-4 uppercase tracking-widest" id="word-name">------</p>
                </div>
            </div>

            <div class="text-center mt-10">
                <div class="inline-flex items-center gap-3 bg-teal-100 text-teal-800 px-8 py-4 rounded-full shadow-sm">
                    <span class="text-3xl">⌨️</span>
                    <p class="text-xl font-bold" id="instruction-text">Carregue na tecla correta!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE VITÓRIA -->
    <div id="win-modal" class="fixed inset-0 bg-teal-900/90 flex items-center justify-center hidden z-50 backdrop-blur-sm">
        <div class="bg-white p-12 rounded-[3rem] text-center shadow-2xl border-8 border-yellow-400 max-w-sm mx-4 transform scale-105">
            <h2 class="text-5xl font-game text-teal-600 mb-4" id="modal-title">NÍVEL CONCLUÍDO!</h2>
            <div class="text-8xl mb-6">🌟</div>
            <p class="text-xl font-bold text-gray-600 mb-8" id="modal-msg">Muito bem!</p>
            <button onclick="showScreen('screen-levels')" class="bg-green-500 hover:bg-green-600 text-white font-game text-3xl py-4 px-12 rounded-full shadow-lg border-b-8 border-green-700 active:translate-y-1 active:border-b-0 transition-all">
                CONTINUAR
            </button>
        </div>
    </div>

        let unlockedLevels = 1;
        let activeLevelIdx = 0;
        let activePhaseIdx = 0;
        let canType = false;
        let gameMode = 'infantil';
        let currentPhases = []; // Armazena a lista embaralhada do nível atual
        
        let timeLeft = 100;
        let timerInterval = null;
        const PHASE_TIME = 10000;

        function showScreen(screenId) {
            stopTimer();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            document.getElementById('win-modal').classList.add('hidden');
            
            if (screenId === 'screen-levels') {
                renderLevelsGrid();
            }
        }

        function setMode(mode) {
            gameMode = mode;
            showScreen('screen-levels');
        }

        // Função para embaralhar array (Fisher-Yates)
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function renderLevelsGrid() {
            const grid = document.getElementById('levels-grid');
            grid.innerHTML = '';
            
            gameData.forEach((level, index) => {
                const isLocked = index + 1 > unlockedLevels;
                const card = document.createElement('div');
                card.className = `level-card bg-white p-6 rounded-[2.5rem] flex flex-col items-center justify-center text-center border-4 ${isLocked ? 'locked border-gray-200' : 'border-teal-100 cursor-pointer shadow-md'}`;
                
                card.innerHTML = `
                    <div class="text-4xl mb-2">${isLocked ? '🔒' : '⭐'}</div>
                    <div class="text-2xl font-game text-teal-600">${level.name}</div>
                    <div class="text-sm font-bold text-teal-300">${isLocked ? 'Bloqueado' : level.phases.length + ' Fases'}</div>
                `;
                
                if (!isLocked) card.onclick = () => startLevel(index);
                grid.appendChild(card);
            });
        }

        function startLevel(index) {
            activeLevelIdx = index;
            activePhaseIdx = 0;
            // Embaralha as fases do nível selecionado dinamicamente
            currentPhases = shuffleArray(gameData[index].phases);
            showScreen('screen-game');
            initPhase();
        }

        function initPhase() {
            const data = currentPhases[activePhaseIdx];
            const bigLetter = document.getElementById('big-letter-display');
            const wordName = document.getElementById('word-name');
            const displayImg = document.getElementById('display-image');
            
            canType = true;
            document.getElementById('level-title').innerText = gameData[activeLevelIdx].name;
            // Contador dinâmico baseado no total de fases do nível atual
            document.getElementById('phase-counter').innerText = `FASE ${activePhaseIdx + 1} / ${currentPhases.length}`;
            displayImg.src = data.img;

            if (gameMode === 'infantil') {
                bigLetter.innerText = data.letter.toUpperCase();
                bigLetter.classList.add('font-game');
                wordName.innerText = data.word.toUpperCase();
                wordName.classList.remove('tracking-normal');
                wordName.classList.add('tracking-widest');
            } else {
                bigLetter.innerText = data.letter.toUpperCase() + " " + data.letter.toLowerCase();
                bigLetter.classList.remove('font-game');
                
                const wordLower = data.word.charAt(0).toUpperCase() + data.word.slice(1).toLowerCase();
                wordName.innerText = wordLower;
                wordName.classList.remove('tracking-widest');
                wordName.classList.add('tracking-normal');
            }
            
            bigLetter.className = 'letter-big text-teal-500 drop-shadow-lg';
            if(gameMode === 'infantil') bigLetter.classList.add('font-game');
            
            bigLetter.style.color = '';
            resetTimer();
        }

        function resetTimer() {
            stopTimer();
            timeLeft = 100;
            updateTimerUI();
            
            const step = 100;
            const decrement = (step / PHASE_TIME) * 100;
            
            timerInterval = setInterval(() => {
                timeLeft -= decrement;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    handleTimeOut();
                }
                updateTimerUI();
            }, step);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
        }

        function updateTimerUI() {
            const bar = document.getElementById('timer-bar');
            bar.style.width = `${timeLeft}%`;
            
            if (timeLeft > 50) bar.style.backgroundColor = '#14b8a6';
            else if (timeLeft > 20) bar.style.backgroundColor = '#facc15';
            else bar.style.backgroundColor = '#ef4444';
        }

        function handleTimeOut() {
            stopTimer();
            const bigLetter = document.getElementById('big-letter-display');
            bigLetter.classList.remove('shake-anim');
            void bigLetter.offsetWidth;
            bigLetter.classList.add('shake-anim');
            
            setTimeout(() => {
                if (document.getElementById('screen-game').classList.contains('active-screen')) {
                    resetTimer();
                }
            }, 500);
        }

        function quitGame() {
            stopTimer();
            showScreen('screen-levels');
        }

        window.addEventListener('keydown', (e) => {
            if (!document.getElementById('screen-game').classList.contains('active-screen') || !canType) return;
            
            const typedKey = e.key.toUpperCase();
            // Compara com a letra correta da fase embaralhada
            const targetKey = currentPhases[activePhaseIdx].letter.toUpperCase();
            const bigLetter = document.getElementById('big-letter-display');

            if (typedKey === targetKey) {
                canType = false;
                stopTimer();
                bigLetter.classList.remove('shake-anim');
                bigLetter.classList.add('correct-anim');
                bigLetter.style.color = '#22c55e';
                setTimeout(nextPhase, 1100);
            } else {
                if (e.key.length === 1 && /[a-zA-Záàâãéèêíïóôõúüç]/.test(e.key)) {
                    bigLetter.classList.remove('shake-anim');
                    void bigLetter.offsetWidth;
                    bigLetter.classList.add('shake-anim');
                }
            }
        });

        function nextPhase() {
            activePhaseIdx++;
            // Verifica se ainda há fases no nível atual usando a lista dinâmica
            if (activePhaseIdx < currentPhases.length) {
                initPhase();
            } else {
                stopTimer();
                if (activeLevelIdx + 1 === unlockedLevels && unlockedLevels < gameData.length) {
                    unlockedLevels++;
                }
                const isFinalLevel = activeLevelIdx + 1 === gameData.length;
                document.getElementById('modal-title').innerText = isFinalLevel ? "JOGO CONCLUÍDO!" : "NÍVEL CONCLUÍDO!";
                document.getElementById('win-modal').classList.remove('hidden');
            }
        }
    </script>
