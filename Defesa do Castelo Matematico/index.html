<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
    <title>Defesa do Castelo Matematico</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --stone: #64748b;
            --stone-dark: #334155;
            --gold: #f59e0b;
            --sky: #bae6fd;
            --grass: #4ade80;
            --success: #22c55e;
            --danger: #ef4444;
            --wood: #78350f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: "Baloo 2", cursive;
            background: var(--sky);
            overflow: hidden;
            color: #1e293b;
            user-select: none;
        }

        /* Cenario Animado */
        .scenery {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(to bottom, #bae6fd 0%, #e0f2fe 100%);
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: move linear infinite;
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: var(--grass);
            border-top: 8px solid #22c55e;
            z-index: 5;
        }

        @keyframes move {
            from { transform: translateX(110vw); }
            to { transform: translateX(-20vw); }
        }

        /* Elementos da Batalha */
        #castle-container {
            position: absolute;
            bottom: 110px;
            left: 20px;
            z-index: 10;
            transition: transform 0.5s;
        }

        .castle-svg { width: 180px; height: 180px; }

        .cannon {
            position: absolute;
            bottom: 50px;
            right: 15px;
            width: 60px;
            height: 35px;
            background: #1e293b;
            border-radius: 5px 25px 25px 5px;
            transform-origin: left center;
            border: 3px solid #000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .muzzle-flash {
            position: absolute;
            right: -50px;
            top: -15px;
            font-size: 3.5rem;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        .cannon-ball {
            position: fixed;
            width: 25px;
            height: 25px;
            background: radial-gradient(circle at 30% 30%, #4b5563, #000);
            border-radius: 50%;
            z-index: 100;
            pointer-events: none;
            display: none;
        }

        #wolf-pack {
            position: absolute;
            bottom: 110px;
            right: 0%;
            z-index: 10;
            display: flex;
            gap: 5px;
            transition: right 0.1s linear, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .wolf-img {
            width: 70px;
            height: 70px;
            object-fit: contain;
        }

        /* Layout Principal */
        .container {
            max-width: 900px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            z-index: 20;
        }

        /* HUD */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .stat-badge {
            background: rgba(15, 23, 42, 0.8);
            color: white;
            padding: 5px 15px;
            border-radius: 999px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Area de Defesa */
        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 20px;
            align-items: center;
            gap: 30px;
        }

        .wall-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: rgba(255,255,255,0.4);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .stone {
            width: 70px;
            height: 70px;
            background: var(--stone);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 800;
            border-bottom: 6px solid var(--stone-dark);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: relative;
        }

        .stone.op { background: var(--stone-dark); width: 50px; height: 50px; font-size: 1.4rem; border-bottom-width: 4px; }

        .stone.target {
            background: rgba(255,255,255,0.5);
            border: 3px dashed var(--stone);
            color: transparent;
        }

        .stone.filled {
            background: var(--success);
            border: none;
            border-bottom: 6px solid #16a34a;
            color: white;
        }

        /* Alternativas */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .shield-btn {
            background: white;
            border: 4px solid var(--gold);
            border-radius: 15px 15px 50% 50%;
            padding: 15px;
            font-size: 2.2rem;
            font-family: inherit;
            cursor: pointer;
            color: var(--stone-dark);
            box-shadow: 0 8px 0 #b45309;
            transition: transform 0.1s;
        }

        .shield-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b45309; }

        /* Timer Bar */
        .timer-container {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.1);
            border-radius: 6px;
            overflow: hidden;
            margin: 10px 0;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--success), var(--gold), var(--danger));
        }

        /* Animacoes de Batalha */
        @keyframes fire-recoil {
            0% { margin-left: 0; }
            50% { margin-left: -15px; }
            100% { margin-left: 0; }
        }

        @keyframes explode-wolves {
            0% { transform: translate(0, 0) rotate(0deg) scale(1.5); opacity: 1; }
            100% { transform: translate(600px, -400px) rotate(1080deg) scale(0.5); opacity: 0; }
        }

        @keyframes shake-destroy {
            0% { transform: translate(0,0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-5px, 0); }
            20%, 40%, 60%, 80% { transform: translate(5px, 0); }
            100% { transform: translateY(300px) rotate(15deg); opacity: 0; }
        }

        .firing-recoil { animation: fire-recoil 0.3s; }
        .defeated { animation: explode-wolves 1.5s forwards !important; }
        .destroyed { animation: shake-destroy 1s forwards; }

        /* Telas */
        .screen { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .screen.active { display: flex; }

        .btn-large {
            background: #ea580c;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 8px 0 #9a3412;
            font-weight: 800;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }

        .lvl-btn {
            aspect-ratio: 1;
            border-radius: 15px;
            border: 3px solid rgba(0,0,0,0.1);
            background: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .lvl-btn.unlocked { border-color: #ea580c; color: #ea580c; font-weight: 800; }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            border: 6px solid #ea580c;
        }
    </style>
</head>
<body>

    <div class="scenery" id="scenery"></div>
    <div class="ground"></div>

    <!-- Bala de Canhao Oculta -->
    <div id="cannon-ball" class="cannon-ball"></div>

    <!-- Elementos Visuais do Jogo -->
    <div id="castle-container">
        <svg class="castle-svg" viewBox="0 0 100 100">
            <rect x="20" y="40" width="60" height="40" fill="#94a3b8"/>
            <rect x="20" y="30" width="15" height="15" fill="#64748b"/>
            <rect x="65" y="30" width="15" height="15" fill="#64748b"/>
            <rect x="40" y="35" width="20" height="10" fill="#64748b"/>
            <rect x="45" y="60" width="10" height="20" fill="#451a03"/>
            <path d="M20 30 L27.5 20 L35 30 Z" fill="#ef4444"/>
            <path d="M65 30 L72.5 20 L80 30 Z" fill="#ef4444"/>
        </svg>
        <div class="cannon" id="cannon">
            <div class="muzzle-flash" id="flash">??</div>
        </div>
    </div>

    <div id="wolf-pack">
        <img class="wolf-img" src="https://emojipedia-us.s3.dualstack.us-west-2.amazonaws.com/content/2023/11/17/grumpy-wolf-sticker.webp" alt="Lobo" onerror="this.src='https://openmoji.org/data/color/svg/1F43A.svg'">
        <img class="wolf-img" src="https://emojipedia-us.s3.dualstack.us-west-2.amazonaws.com/content/2023/11/17/grumpy-wolf-sticker.webp" alt="Lobo" onerror="this.src='https://openmoji.org/data/color/svg/1F43A.svg'">
        <img class="wolf-img" src="https://emojipedia-us.s3.dualstack.us-west-2.amazonaws.com/content/2023/11/17/grumpy-wolf-sticker.webp" alt="Lobo" onerror="this.src='https://openmoji.org/data/color/svg/1F43A.svg'">
    </div>

    <div class="container">
        <!-- HOME -->
        <div id="screen-home" class="screen active">
            <h1 style="font-size: 3rem; margin: 0; text-shadow: 2px 2px white;">🏰 Defesa do</h1>
            <h2 style="margin: 0; color: #ea580c; text-shadow: 1px 1px white;">Castelo</h2>
            <div style="margin: 40px 0; font-size: 4rem;">⚔️</div>
            <button class="btn-large" onclick="changeScreen('levels')">DEFENDER!</button>
            <p id="total-stars">⭐ 0/36</p>
        </div>

        <!-- NIVEIS -->
        <div id="screen-levels" class="screen" style="justify-content: flex-start; padding-top: 40px;">
            <div class="hud" style="width: 100%;">
                <button class="stat-badge" onclick="changeScreen('home')" style="cursor:pointer; border:none">🏠 Inicio</button>
                <div class="stat-badge" id="lvl-star-count">⭐ 0</div>
            </div>
            <h2 style="margin: 20px 0;">Selecione a Torre</h2>
            <div class="level-grid" id="level-grid"></div>
        </div>

        <!-- JOGO -->
        <div id="screen-game" class="screen">
            <div class="hud" style="width: 100%;">
                <button class="stat-badge" onclick="changeScreen('levels')" style="cursor:pointer; border:none">✖</button>
            </div>

            <div class="timer-container">
                <div class="timer-bar" id="timer-bar"></div>
            </div>

            <div class="game-area">
                <div class="wall-row" id="active-wall"></div>
                <div class="options-grid" id="options"></div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 id="result-title">Vitoria!</h2>
            <div id="result-stars" style="font-size: 2.5rem; margin: 15px 0;">⭐⭐⭐</div>
            <p id="result-msg">Os lobos foram expulsos!</p>
            <button id="modal-next-btn" class="btn-large" onclick="handleModalAction()">PROXIMO</button>
        </div>
    </div>

    <script src="../utils/audio.js"></script>
    <script src="../utils/score.js"></script>
    <script src="../utils/elapsed.js"></script>
    <script src="../utils/progress.js"></script>
    <script src="../utils/stars.js"></script>
    <script src="main.js"></script>
</body>
</html>
