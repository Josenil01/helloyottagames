<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duelo dos Monstros - Maior ou Menor</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --monster-purple: #a855f7;
            --monster-green: #22c55e;
            --monster-orange: #f97316;
            --bg-cave: #1e1b4b;
            --gold: #fbbf24;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: "Baloo 2", cursive;
            background: var(--bg-cave);
            overflow: hidden;
            color: #f8fafc;
            user-select: none;
        }

        /* Cenário de Caverna */
        .scenery {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #312e81 0%, #1e1b4b 100%);
        }

        .stalactite {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 60px solid #1e293b;
            opacity: 0.5;
        }

        /* Container Principal */
        .container {
            max-width: 900px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* HUD */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 5px 15px;
            border-radius: 999px;
            font-size: 1.1rem;
            border: 2px solid var(--monster-purple);
            font-weight: 800;
        }

        /* Área de Jogo */
        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .battle-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            width: 100%;
        }

        .monster-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 30px;
            width: 180px;
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }

        .monster-number {
            font-size: 3rem;
            font-weight: 800;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
        }

        .symbol-slot {
            width: 100px;
            height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border: 4px dashed var(--monster-purple);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 800;
            color: var(--monster-green);
        }

        .symbol-slot.filled {
            border-style: solid;
            background: rgba(255, 255, 255, 0.1);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Botões de Símbolos */
        .options-row {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .symbol-btn {
            width: 100px;
            height: 110px;
            background: white;
            border: none;
            border-radius: 20px;
            font-family: inherit;
            cursor: pointer;
            color: var(--bg-cave);
            box-shadow: 0 8px 0 #cbd5e1;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .symbol-btn span.icon {
            font-size: 3rem;
            line-height: 1;
            font-weight: 800;
        }

        .symbol-btn span.label {
            font-size: 0.9rem;
            font-weight: 700;
            margin-top: 5px;
            color: var(--monster-purple);
        }

        .symbol-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #cbd5e1; }
        .symbol-btn:hover { background: #f1f5f9; }

        /* Telas */
        .screen { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .screen.active { display: flex; }

        .btn-large {
            background: var(--monster-purple);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 8px 0 #7e22ce;
            font-weight: 800;
            margin-top: 20px;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .lvl-btn {
            aspect-ratio: 1;
            border-radius: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .lvl-btn.unlocked { border-color: var(--monster-purple); color: var(--monster-purple); }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: #1e1b4b;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            border: 4px solid var(--monster-purple);
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Estilo dos Monstros SVG */
        .monster-svg { width: 100px; height: 100px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
    </style>
</head>
<body>

    <div class="scenery" id="scenery"></div>

    <div class="container">
        <!-- HOME -->
        <div id="screen-home" class="screen active">
            <h1 style="font-size: 3rem; margin: 0; text-shadow: 0 0 20px var(--monster-purple);">👾 Duelo dos</h1>
            <h2 style="margin: 0; color: var(--monster-purple);">Monstrinhos</h2>
            <div style="margin: 30px 0; font-size: 4rem;">&gt; &lt; =</div>
            <button class="btn-large" onclick="changeScreen('levels')">DESAFIAR!</button>
            <p id="total-stars">⭐ 0/12</p>
        </div>

        <!-- NÍVEIS -->
        <div id="screen-levels" class="screen" style="justify-content: flex-start; padding-top: 40px;">
            <div class="hud" style="width: 100%;">
                <button class="stat-badge" onclick="changeScreen('home')" style="cursor:pointer; border:none">🏠 Início</button>
                <div class="stat-badge" id="lvl-star-count">⭐ 0</div>
            </div>
            <h2 style="margin: 20px 0;">Escolha uma Caverna</h2>
            <div class="level-grid" id="level-grid"></div>
        </div>

        <!-- JOGO -->
        <div id="screen-game" class="screen">
            <div class="hud" style="width: 100%;">
                <button class="stat-badge" onclick="changeScreen('levels')" style="cursor:pointer; border:none">✕</button>
            </div>

            <div class="game-area">
                <p style="font-size: 1.5rem; font-weight: 800;">Qual é o símbolo certo?</p>
                <div class="battle-display">
                    <div class="monster-card" id="monster-left"></div>
                    <div class="symbol-slot" id="slot">?</div>
                    <div class="monster-card" id="monster-right"></div>
                </div>

                <div class="options-row">
                    <button class="symbol-btn" onclick="checkChoice('<')">
                        <span class="icon">&lt;</span>
                        <span class="label">Menor que</span>
                    </button>
                    <button class="symbol-btn" onclick="checkChoice('=')">
                        <span class="icon">=</span>
                        <span class="label">Igual a</span>
                    </button>
                    <button class="symbol-btn" onclick="checkChoice('>')">
                        <span class="icon">&gt;</span>
                        <span class="label">Maior que</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 style="color: var(--monster-purple)">Incrível!</h2>
            <div style="font-size: 4rem; margin: 15px 0;">✨</div>
            <p id="result-msg">Acertaste a comparação!</p>
            <button id="modal-next-btn" class="btn-large" onclick="handleModalAction()">PRÓXIMO</button>
        </div>
    </div>

    <script src="../utils/audio.js"></script>
    <script src="../utils/score.js"></script>
    <script src="../utils/elapsed.js"></script>
    <script src="../utils/progress.js"></script>
    <script src="../utils/stars.js"></script>
    <script src="main.js"></script>
</body>
</html>
