<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado dos Gigantes - Comparação</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #fbbf24;
            --giant-skin: #fde68a;
            --success: #22c55e;
            --danger: #ef4444;
            --sky: #bae6fd;
            --wood: #78350f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: "Baloo 2", cursive;
            background: var(--sky);
            overflow: hidden;
            color: #1e293b;
            user-select: none;
        }

        /* Cenário de Cozinha de Gigante */
        .scenery {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(to bottom, #bae6fd 0%, #e0f2fe 100%);
        }

        .shelf {
            position: absolute;
            bottom: 150px;
            width: 120%;
            left: -10%;
            height: 40px;
            background: var(--wood);
            border-bottom: 8px solid #451a03;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 1;
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* HUD */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 15px;
            border-radius: 999px;
            font-size: 1.1rem;
            border: 2px solid var(--primary);
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Pedido do Gigante */
        .instruction-card {
            background: white;
            border-radius: 25px;
            padding: 15px 25px;
            text-align: center;
            border: 4px solid var(--primary);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .instruction-text {
            font-size: 1.5rem;
            margin: 0;
            color: var(--primary);
            font-weight: 800;
        }

        /* Área de Comparação */
        .market-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            padding-bottom: 80px; /* Acima da prateleira */
        }

        .item-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            min-width: 150px;
        }

        .item-box:hover { transform: scale(1.1); background: rgba(255, 255, 255, 0.3); }

        .item-visual {
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
            transition: all 0.5s;
        }

        /* Telas */
        .screen { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .screen.active { display: flex; }

        .btn-large {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 8px 0 #6d28d9;
            font-weight: 800;
            margin-top: 20px;
        }

        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .lvl-btn {
            aspect-ratio: 1;
            border-radius: 20px;
            border: 3px solid #e2e8f0;
            background: white;
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .lvl-btn.unlocked { border-color: var(--primary); color: var(--primary); }
        .lvl-btn:disabled { opacity: 0.5; }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            border: 6px solid var(--primary);
        }

        /* Itens SVG */
        .svg-icon { width: 100%; height: auto; }
    </style>
</head>
<body>

    <div class="scenery">
        <div class="shelf"></div>
    </div>

    <div class="container">
        <!-- HOME -->
        <div id="screen-home" class="screen active">
            <h1 style="font-size: 3rem; margin: 0; text-shadow: 2px 2px white;">🍎 Mercado</h1>
            <h2 style="margin: 0; color: var(--primary); text-shadow: 1px 1px white;">dos Gigantes</h2>
            <div style="margin: 30px 0; font-size: 5rem;">⚖️</div>
            <button class="btn-large" onclick="changeScreen('levels')">AJUDAR!</button>
            <p id="total-stars">⭐ 0/12</p>
        </div>

        <!-- NÍVEIS -->
        <div id="screen-levels" class="screen" style="justify-content: flex-start; padding-top: 40px;">
            <div class="hud" style="width: 100%;">
                <button class="stat-badge" onclick="changeScreen('home')" style="cursor:pointer; border:none">🏠 Início</button>
                <div class="stat-badge" id="lvl-star-count">⭐ 0</div>
            </div>
            <h2 style="margin: 20px 0;">Lista de Compras</h2>
            <div class="level-grid" id="level-grid"></div>
        </div>

        <!-- JOGO -->
        <div id="screen-game" class="screen">
            <div class="hud" style="width: 100%;">
                <button class="stat-badge" onclick="changeScreen('levels')" style="cursor:pointer; border:none">✕</button>
                <div class="stat-badge" id="game-info">Pedido 1 — 1/5</div>
            </div>

            <div class="instruction-card">
                <p class="instruction-text" id="instruction">Escolha o MAIOR!</p>
            </div>

            <div class="market-area" id="market-area">
                <!-- Itens para comparar aqui -->
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 style="color: var(--primary)" id="result-title">Muito bem!</h2>
            <div style="font-size: 4rem; margin: 15px 0;">😋</div>
            <p id="result-msg">O gigante adorou a sua escolha!</p>
            <button id="modal-next-btn" class="btn-large" onclick="handleModalAction()">PRÓXIMO</button>
        </div>
    </div>

    <script src="../utils/audio.js"></script>
    <script src="../utils/score.js"></script>
    <script src="../utils/elapsed.js"></script>
    <script src="../utils/progress.js"></script>
    <script src="../utils/stars.js"></script>
    <script src="main.js"></script>
</body>
</html>
