<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete a Palavra - Vogais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            max-width: 100%;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #e0f2fe;
            background-image: radial-gradient(circle at 50% 50%, #f0f9ff 0%, #bae6fd 100%);
            touch-action: manipulation;
            min-height: 100vh;
        }
        .font-game {
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 2px;
        }
        .screen {
            display: none;
            min-height: 100vh;
            min-height: 100dvh;
            flex-direction: column;
            align-items: center;
            padding: clamp(1rem, 4vw, 2rem);
            position: relative;
            z-index: 10;
            width: 100%;
        }
        .active-screen {
            display: flex;
        }
        
        /* Animações */
        @keyframes success-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #22c55e; }
            100% { transform: scale(1); }
        }
        .correct-anim {
            animation: success-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-5deg); color: #ef4444; }
            75% { transform: translateX(10px) rotate(5deg); }
        }
        .shake-anim {
            animation: shake 0.4s ease;
        }

        /* Cartões de Nível */
        .level-card, .mode-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .level-card:not(.locked):hover, .mode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .locked {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Estilo dos Botões de Vogais */
        .vowel-btn {
            transition: all 0.1s ease;
            position: relative;
            min-width: 0;
            touch-action: manipulation;
        }
        .vowel-btn:active, .vowel-btn.active-press {
            transform: translateY(6px);
            box-shadow: 0 0px 0 rgba(0,0,0,0) !important;
        }

        /* Bandeirolas de Score */
        .flag {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 50px;
            color: white;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.5rem;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 80%, 0 100%);
        }
        .flag-pole {
            width: 4px;
            height: 70px;
            background-color: #334155;
            position: absolute;
            left: 0;
            top: -10px;
            border-radius: 2px;
        }

        /* Silhueta de Fundo Estilo Parque (Opcional) */
        .bg-silhouette {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40vh;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23bae6fd" fill-opacity="0.5" d="M0,256L48,245.3C96,235,192,213,288,218.7C384,224,480,256,576,261.3C672,267,768,245,864,224C960,203,1056,181,1152,186.7C1248,192,1344,224,1392,240L1440,256L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path><circle cx="300" cy="150" r="100" stroke="%23bae6fd" stroke-width="8" fill="none" opacity="0.5"/><line x1="300" y1="50" x2="300" y2="250" stroke="%23bae6fd" stroke-width="8" opacity="0.5"/><line x1="200" y1="150" x2="400" y2="150" stroke="%23bae6fd" stroke-width="8" opacity="0.5"/><line x1="229" y1="79" x2="371" y2="221" stroke="%23bae6fd" stroke-width="8" opacity="0.5"/><line x1="229" y1="221" x2="371" y2="79" stroke="%23bae6fd" stroke-width="8" opacity="0.5"/></svg>');
            background-size: cover;
            background-position: bottom;
            z-index: 1;
            pointer-events: none;
        }

        #word-gap {
            border-bottom: 6px solid #94a3b8;
            min-width: clamp(35px, 8vw, 50px);
            display: inline-block;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="bg-silhouette"></div>

    <!-- TELA INICIAL -->
    <div id="screen-start" class="screen active-screen justify-center text-center">
        <h1 class="text-6xl md:text-8xl font-game text-blue-600 mb-4 drop-shadow-md leading-tight" style="-webkit-text-stroke: 2px white;">COMPLETE A<br>PALAVRA</h1>
        <div class="w-64 h-64 bg-white rounded-[3rem] flex items-center justify-center border-8 border-yellow-400 shadow-2xl mb-12 rotate-3 relative">
            <div class="absolute inset-0 bg-blue-50 opacity-50 rounded-[2.5rem]"></div>
            <span class="text-9xl relative z-10">🎹</span>
        </div>
        <button onclick="showScreen('screen-mode')" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-game text-4xl px-16 py-5 rounded-full shadow-[0_8px_0_#ca8a04] transform transition active:translate-y-2 active:shadow-none">
            JOGAR!
        </button>
    </div>

    <!-- TELA DE SELEÇÃO DE MODO -->
    <div id="screen-mode" class="screen justify-center">
        <h2 class="text-5xl font-game text-blue-600 mb-12 text-center drop-shadow-sm" style="-webkit-text-stroke: 1px white;">COMO VAMOS JOGAR?</h2>
        <div class="flex flex-col md:flex-row gap-8 w-full max-w-4xl px-4">
            <button onclick="setMode('infantil')" class="mode-card flex-1 bg-white p-10 rounded-[3rem] border-4 border-blue-200 text-center shadow-xl">
                <div class="text-7xl mb-6">👶</div>
                <div class="text-4xl font-game text-blue-600 mb-3">INFANTIL</div>
                <p class="text-gray-500 font-bold text-lg">Letras Grandes<br>(MAIÚSCULAS)</p>
            </button>

            <button onclick="setMode('fundamental')" class="mode-card flex-1 bg-white p-10 rounded-[3rem] border-4 border-purple-200 text-center shadow-xl">
                <div class="text-7xl mb-6">🎒</div>
                <div class="text-4xl font-game text-purple-600 mb-3">ESCOLA</div>
                <p class="text-gray-500 font-bold text-lg">Maiúsculas e Minúsculas<br>(Pian _)</p>
            </button>
        </div>
        <button onclick="showScreen('screen-start')" class="mt-12 text-blue-600 font-bold text-xl hover:text-blue-800 transition">Voltar ao início</button>
    </div>

    <!-- TELA DE SELEÇÃO DE NÍVEIS -->
    <div id="screen-levels" class="screen">
        <div class="max-w-4xl w-full">
            <div class="flex justify-between items-center mb-10">
                <button onclick="showScreen('screen-mode')" class="bg-white text-blue-600 font-bold px-6 py-3 rounded-2xl shadow-sm border-2 border-blue-100 hover:bg-blue-50">← VOLTAR</button>
                <h2 class="text-5xl font-game text-blue-600 drop-shadow-sm" style="-webkit-text-stroke: 1px white;">NÍVEIS</h2>
                <div class="w-24"></div>
            </div>
            <div id="levels-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8"></div>
        </div>
    </div>

    <!-- TELA DO JOGO -->
    <div id="screen-game" class="screen w-full">
        <!-- Bandeirinhas de Score no Topo -->
        <div class="absolute top-0 left-0 w-full flex justify-center gap-12 pt-4">
            <div class="relative">
                <div class="flag-pole"></div>
                <div class="flag bg-blue-600 shadow-md">
                    <span id="score-points">0</span>
                </div>
            </div>
            <div class="relative">
                <div class="flag-pole"></div>
                <div class="flag bg-red-500 shadow-md">
                    <span id="score-phase">1</span>
                </div>
            </div>
        </div>

        <div class="w-full max-w-5xl mt-16 flex flex-col h-full justify-between items-center pb-8">
            <div class="w-full flex justify-between items-center mb-8 px-4">
                <button onclick="quitGame()" class="bg-white px-6 py-2 rounded-xl font-bold border-2 border-blue-200 text-blue-600 shadow-sm hover:bg-blue-50 transition-colors">SAIR</button>
                <div class="flex flex-col items-end">
                    <div class="text-2xl font-game text-blue-600" id="level-title">NÍVEL 1</div>
                </div>
            </div>

            <!-- Área Principal: Imagem + Palavra -->
            <div class="flex flex-col md:flex-row items-center justify-center w-full gap-8 md:gap-16 my-auto">
                <!-- Imagem -->
                <div class="w-56 h-56 md:w-80 md:h-80 shrink-0 bg-white p-4 md:p-6 rounded-[2rem] border-4 border-blue-200 shadow-xl flex items-center justify-center">
                    <span id="display-emoji" class="text-8xl md:text-9xl select-none transition hover:scale-105">🎹</span>
                </div>

                <!-- Palavra incompleta -->
                <div class="text-6xl md:text-[6rem] font-bold text-gray-800 flex items-baseline tracking-widest mt-8 md:mt-0">
                    <span id="word-prefix"></span>
                    <span id="word-gap" class="text-transparent mx-2 relative top-[-5px]">_</span>
                    <span id="word-suffix"></span>
                </div>
            </div>

            <!-- Botões das Vogais (Teclado Virtual) -->
            <div class="w-full max-w-3xl mt-12">
                <div class="flex justify-center gap-3 md:gap-6 px-4">
                    <button id="btn-A" onclick="checkVowel('A')" class="vowel-btn flex-1 aspect-square max-w-[110px] bg-[#9333ea] text-white font-game text-5xl md:text-6xl rounded-2xl shadow-[0_8px_0_#5b21b6]">A</button>
                    <button id="btn-E" onclick="checkVowel('E')" class="vowel-btn flex-1 aspect-square max-w-[110px] bg-[#ef4444] text-white font-game text-5xl md:text-6xl rounded-2xl shadow-[0_8px_0_#b91c1c]">E</button>
                    <button id="btn-I" onclick="checkVowel('I')" class="vowel-btn flex-1 aspect-square max-w-[110px] bg-[#84cc16] text-white font-game text-5xl md:text-6xl rounded-2xl shadow-[0_8px_0_#4d7c0f]">I</button>
                    <button id="btn-O" onclick="checkVowel('O')" class="vowel-btn flex-1 aspect-square max-w-[110px] bg-[#3b82f6] text-white font-game text-5xl md:text-6xl rounded-2xl shadow-[0_8px_0_#1d4ed8]">O</button>
                    <button id="btn-U" onclick="checkVowel('U')" class="vowel-btn flex-1 aspect-square max-w-[110px] bg-[#ec4899] text-white font-game text-5xl md:text-6xl rounded-2xl shadow-[0_8px_0_#be185d]">U</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE VITÓRIA -->
    <div id="win-modal" class="fixed inset-0 bg-blue-900/80 flex items-center justify-center hidden z-50 backdrop-blur-sm">
        <div class="bg-white p-12 rounded-[3rem] text-center shadow-2xl border-8 border-yellow-400 max-w-sm mx-4 transform scale-105">
            <h2 class="text-5xl font-game text-blue-600 mb-4 drop-shadow-sm" id="modal-title">NÍVEL CONCLUÍDO!</h2>
            <div class="text-8xl mb-6">🏆</div>
            <p class="text-xl font-bold text-gray-600 mb-8" id="modal-msg">Você foi incrível!</p>
            <button onclick="showScreen('screen-levels')" class="bg-green-500 hover:bg-green-600 text-white font-game text-4xl py-4 px-12 rounded-full shadow-[0_8px_0_#166534] active:translate-y-2 active:shadow-none transition-all w-full">
                CONTINUAR
            </button>
        </div>
    </div>

    <script>
        /**
 * gameData: Daataa taphaa sadarkaa sadiitti qoodame.
 * Sadarkaa 1: Dubbachiiftuu dhuma irratti.
 * Sadarkaa 2: Dubbachiiftuu gidduu irratti.
 * Sadarkaa 3: Qormaata makame.
 */
const gameData = [
    {
        name: "Nivel 1",
        desc: "Fácil",
        phases: [
            { prefix: 'PIAN', vowel: 'O', suffix: '', emoji: '🎹' },
            { prefix: 'GAT', vowel: 'O', suffix: '', emoji: '🐱' },
            { prefix: 'BÔL', vowel: 'O', suffix: '', emoji: '🎂' },
            { prefix: 'SAP', vowel: 'O', suffix: '', emoji: '🐸' },
            { prefix: 'UV', vowel: 'A', suffix: '', emoji: '🍇' },
            { prefix: 'RAT', vowel: 'O', suffix: '', emoji: '🐭' },
            { prefix: 'MES', vowel: 'A', suffix: '', emoji: '🪑' },
            { prefix: 'CAS', vowel: 'A', suffix: '', emoji: '🏠' },
            { prefix: 'BOL', vowel: 'A', suffix: '', emoji: '⚽' },
            { prefix: 'DAD', vowel: 'O', suffix: '', emoji: '🎲' },
            { prefix: 'FOG', vowel: 'O', suffix: '', emoji: '🔥' },
            { prefix: 'LAG', vowel: 'O', suffix: '', emoji: '🏞️' },
            { prefix: 'URS', vowel: 'O', suffix: '', emoji: '🐻' },
            { prefix: 'NAVI', vowel: 'O', suffix: '', emoji: '🚢' },
            { prefix: 'FRUT', vowel: 'A', suffix: '', emoji: '🍓' },
            { prefix: 'HORT', vowel: 'A', suffix: '', emoji: '🥦' },
            { prefix: 'BANC', vowel: 'O', suffix: '', emoji: '🏦' },
            { prefix: 'CARR', vowel: 'O', suffix: '', emoji: '🚗' },
            { prefix: 'DENT', vowel: 'E', suffix: '', emoji: '🦷' },
            { prefix: 'ESCOL', vowel: 'A', suffix: '', emoji: '🏫' }
        ]
    },
    {
        name: "Nivel 2",
        desc: "Médio",
        phases: [
            { prefix: 'B', vowel: 'O', suffix: 'LA', emoji: '⚽' },
            { prefix: 'P', vowel: 'A', suffix: 'TO', emoji: '🦆' },
            { prefix: 'D', vowel: 'A', suffix: 'DO', emoji: '🎲' },
            { prefix: 'L', vowel: 'U', suffix: 'A', emoji: '🌙' },
            { prefix: 'F', vowel: 'O', suffix: 'CA', emoji: '🦭' },
            { prefix: 'M', vowel: 'A', suffix: 'LA', emoji: '💼' },
            { prefix: 'V', vowel: 'E', suffix: 'LA', emoji: '🕯️' },
            { prefix: 'S', vowel: 'E', suffix: 'TA', emoji: '➡️' },
            { prefix: 'C', vowel: 'O', suffix: 'PO', emoji: '🥛' },
            { prefix: 'T', vowel: 'E', suffix: 'LA', emoji: '📺' },
            { prefix: 'L', vowel: 'A', suffix: 'TA', emoji: '🥫' },
            { prefix: 'R', vowel: 'O', suffix: 'DA', emoji: '⚙️' },
            { prefix: 'B', vowel: 'O', suffix: 'TA', emoji: '👢' },
            { prefix: 'F', vowel: 'A', suffix: 'CA', emoji: '🔪' },
            { prefix: 'L', vowel: 'U', suffix: 'VA', emoji: '🧤' },
            { prefix: 'D', vowel: 'O', suffix: 'CE', emoji: '🍬' },
            { prefix: 'N', vowel: 'O', suffix: 'ITE', emoji: '🌙' },
            { prefix: 'P', vowel: 'O', suffix: 'NTE', emoji: '🌉' },
            { prefix: 'T', vowel: 'O', suffix: 'RRE', emoji: '🗼' },
            { prefix: 'M', vowel: 'U', suffix: 'RO', emoji: '🧱' }
        ]
    },
    {
        name: "Nivel 3",
        desc: "Dificil",
        phases: [
            { prefix: 'P', vowel: 'E', suffix: 'IXE', emoji: '🐟' },
            { prefix: 'URS', vowel: 'O', suffix: '', emoji: '🐻' },
            { prefix: 'L', vowel: 'E', suffix: 'ÃO', emoji: '🦁' },
            { prefix: 'Z', vowel: 'E', suffix: 'BRA', emoji: '🦓' },
            { prefix: 'T', vowel: 'A', suffix: 'TU', emoji: '🐾' },
            { prefix: 'A', vowel: 'G', suffix: 'UA', emoji: '💧' },
            { prefix: 'C', vowel: 'A', suffix: 'IXA', emoji: '📦' },
            { prefix: 'I', vowel: 'N', suffix: 'DIO', emoji: '🪶' },
            { prefix: 'O', vowel: 'L', suffix: 'HO', emoji: '👁️' },
            { prefix: 'S', vowel: 'O', suffix: 'NO', emoji: '😴' },
            { prefix: 'V', vowel: 'I', suffix: 'DA', emoji: '🌱' },
            { prefix: 'A', vowel: 'R', suffix: 'ROZ', emoji: '🍚' },
            { prefix: 'J', vowel: 'O', suffix: 'IA', emoji: '💎' },
            { prefix: 'L', vowel: 'E', suffix: 'ITE', emoji: '🥛' },
            { prefix: 'N', vowel: 'O', suffix: 'ME', emoji: '📛' },
            { prefix: 'O', vowel: 'L', suffix: 'EO', emoji: '🪴' },
            { prefix: 'R', vowel: 'U', suffix: 'A', emoji: '🛣️' },
            { prefix: 'V', vowel: 'A', suffix: 'LE', emoji: '🏞️' },
            { prefix: 'G', vowel: 'O', suffix: 'TA', emoji: '💧' },
            { prefix: 'H', vowel: 'I', suffix: 'NO', emoji: '🎵' }
        ]
    }
];

        let unlockedLevels = 1;
        let activeLevelIdx = 0;
        let activePhaseIdx = 0;
        let canType = false;
        let gameMode = 'infantil';
        let score = 0;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            document.getElementById('win-modal').classList.add('hidden');
            
            if (screenId === 'screen-levels') {
                renderLevelsGrid();
            }
        }

        function setMode(mode) {
            gameMode = mode;
            showScreen('screen-levels');
        }

        function renderLevelsGrid() {
            const grid = document.getElementById('levels-grid');
            grid.innerHTML = '';
            
            gameData.forEach((level, index) => {
                const isLocked = index + 1 > unlockedLevels;
                const card = document.createElement('div');
                card.className = `level-card bg-white p-8 rounded-[2.5rem] flex flex-col items-center justify-center text-center border-4 ${isLocked ? 'locked border-gray-200' : 'border-blue-200 cursor-pointer shadow-lg'}`;
                
                card.innerHTML = `
                    <div class="text-5xl mb-4">${isLocked ? '🔒' : '⭐'}</div>
                    <div class="text-3xl font-game text-blue-600 mb-1">${level.name}</div>
                    <div class="text-lg font-bold text-gray-400">${isLocked ? 'Bloqueado' : level.desc}</div>
                `;
                
                if (!isLocked) card.onclick = () => startLevel(index);
                grid.appendChild(card);
            });
        }

        function startLevel(index) {
            activeLevelIdx = index;
            activePhaseIdx = 0;
            score = 0;
            updateScores();
            showScreen('screen-game');
            initPhase();
        }

        function formatText(text) {
            if (!text) return "";
            if (gameMode === 'infantil') {
                return text.toUpperCase();
            } else {
                return text.toLowerCase();
            }
        }

        function initPhase() {
            const data = gameData[activeLevelIdx].phases[activePhaseIdx];
            const prefixEl = document.getElementById('word-prefix');
            const suffixEl = document.getElementById('word-suffix');
            const gapEl = document.getElementById('word-gap');
            
            canType = true;
            document.getElementById('level-title').innerText = gameData[activeLevelIdx].name;
            updateScores();
            document.getElementById('display-emoji').innerText = data.emoji;

            // Formatação baseada no modo
            let displayPrefix = data.prefix;
            let displaySuffix = data.suffix;

            if (gameMode === 'fundamental') {
                // Capitaliza apenas a primeira letra da palavra real
                if (displayPrefix.length > 0) {
                    displayPrefix = displayPrefix.charAt(0).toUpperCase() + displayPrefix.slice(1).toLowerCase();
                    displaySuffix = displaySuffix.toLowerCase();
                } else if (displaySuffix.length > 0) {
                    // O gap é a primeira letra (raro neste jogo, mas tratando)
                    displaySuffix = displaySuffix.toLowerCase(); 
                }
            }

            prefixEl.innerText = displayPrefix;
            suffixEl.innerText = displaySuffix;
            
            // Estilos iniciais do Gap
            gapEl.innerText = '_';
            gapEl.className = 'text-transparent mx-2 relative top-[-5px] border-b-8 border-gray-400 min-w-[50px] md:min-w-[80px] inline-block text-center transition-all duration-200';
            
            if(gameMode === 'infantil') {
                prefixEl.classList.add('uppercase');
                suffixEl.classList.add('uppercase');
            } else {
                prefixEl.classList.remove('uppercase');
                suffixEl.classList.remove('uppercase');
            }
        }

        function updateScores() {
            document.getElementById('score-points').innerText = score * 10;
            document.getElementById('score-phase').innerText = activePhaseIdx + 1;
        }

        function quitGame() {
            showScreen('screen-levels');
        }

        // Suporte para clique nos botões virtuais
        function checkVowel(vowel) {
            if (!canType) return;
            
            // Efeito visual no botão pressionado
            const btn = document.getElementById(`btn-${vowel}`);
            if(btn) {
                btn.classList.add('active-press');
                setTimeout(() => btn.classList.remove('active-press'), 150);
            }

            const data = gameData[activeLevelIdx].phases[activePhaseIdx];
            const gapEl = document.getElementById('word-gap');

            if (vowel === data.vowel) {
                // ACERTOU
                canType = false;
                score++;
                updateScores();
                
                // Formatação do acerto dependendo do modo
                let displayVowel = vowel;
                if(gameMode === 'fundamental' && data.prefix.length > 0) {
                    displayVowel = vowel.toLowerCase();
                } else if (gameMode === 'fundamental' && data.prefix.length === 0) {
                     displayVowel = vowel.toUpperCase();
                }

                gapEl.innerText = displayVowel;
                gapEl.classList.remove('text-transparent', 'border-gray-400', 'border-b-8', 'shake-anim', 'top-[-5px]');
                gapEl.classList.add('text-green-500', 'border-transparent', 'correct-anim');
                
                setTimeout(nextPhase, 1200);
            } else {
                // ERROU
                gapEl.classList.remove('shake-anim');
                void gapEl.offsetWidth; // Reflow
                gapEl.classList.add('shake-anim');
            }
        }

        // Suporte para teclado físico
        window.addEventListener('keydown', (e) => {
            if (!document.getElementById('screen-game').classList.contains('active-screen') || !canType) return;
            
            const typedKey = e.key.toUpperCase();
            if (['A', 'E', 'I', 'O', 'U'].includes(typedKey)) {
                checkVowel(typedKey);
            }
        });

        function nextPhase() {
            activePhaseIdx++;
            if (activePhaseIdx < gameData[activeLevelIdx].phases.length) {
                initPhase();
            } else {
                // Fim de nível
                if (activeLevelIdx + 1 === unlockedLevels && unlockedLevels < gameData.length) {
                    unlockedLevels++;
                }
                const isFinalLevel = activeLevelIdx + 1 === gameData.length;
                document.getElementById('modal-title').innerText = isFinalLevel ? "JOGO CONCLUÍDO!" : "NÍVEL CONCLUÍDO!";
                document.getElementById('win-modal').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
