<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caçadores de Coletivos</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fontes Divertidas -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  
  <!-- React e ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      user-select: none;
      background-color: #fef3c7; /* amber-50 */
    }
    
    /* Animações */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px) rotate(-3deg); }
      75% { transform: translateX(8px) rotate(3deg); }
    }
    .shake-anim { animation: shake 0.4s ease-in-out; }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop-anim { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    @keyframes lineDraw {
      0% { stroke-dasharray: 0, 1000; }
      100% { stroke-dasharray: 1000, 0; }
    }
    .line-anim { animation: lineDraw 0.5s ease-out forwards; }

    @keyframes floatAround {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }
    .float-anim { animation: floatAround 5s ease-in-out infinite; }

    /* Fundo Safári / Aventura */
    .safari-bg {
      background: linear-gradient(180deg, #fef3c7 0%, #fde68a 100%);
      position: relative;
    }
  </style>
</head>
<body class="selection:bg-none overflow-x-hidden text-stone-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- DADOS DO JOGO: CAÇADORES DE COLETIVOS ---
    const LEVELS = [
      // MECÂNICA 1: Associação (Arrastar o coletivo)
      { id: 1, type: 'match', target: 'LOBOS', answer: 'ALCATEIA', options: ['ALCATEIA', 'MATILHA', 'REBANHO'], emoji: '🐺', instruction: 'Como chamamos um grupo de LOBOS? Arraste a palavra certa!' },
      { id: 2, type: 'match', target: 'PEIXES', answer: 'CARDUME', options: ['BANDO', 'CARDUME', 'ENXAME'], emoji: '🐟', instruction: 'Qual é a palavra mágica para um grupo de PEIXES?' },
      { id: 3, type: 'match', target: 'ABELHAS', answer: 'ENXAME', options: ['ENXAME', 'CACHO', 'BANDO'], emoji: '🐝', instruction: 'Muitas ABELHAS juntas formam um...' },
      
      // MECÂNICA 2: Ligar os Pontos (Ligar o item ao seu coletivo)
      { id: 4, type: 'connect', leftWords: ['ESTRELAS', 'ILHAS', 'PÁSSAROS'], rightWords: ['BANDO', 'CONSTELAÇÃO', 'ARQUIPÉLAGO'], matches: { 'ESTRELAS': 'CONSTELAÇÃO', 'ILHAS': 'ARQUIPÉLAGO', 'PÁSSAROS': 'BANDO' }, emoji: '🔭', instruction: 'Ligue o elemento ao seu Substantivo Coletivo!' },
      { id: 5, type: 'connect', leftWords: ['CÃES', 'OVELHAS', 'PORCOS'], rightWords: ['REBANHO', 'VARA', 'MATILHA'], matches: { 'CÃES': 'MATILHA', 'OVELHAS': 'REBANHO', 'PORCOS': 'VARA' }, emoji: '🐕', instruction: 'Ligue os animais aos seus grupos corretos!' },
      { id: 6, type: 'connect', leftWords: ['AVIÕES', 'MAPAS', 'FLORES'], rightWords: ['ATLAS', 'RAMALHETE', 'ESQUADRILHA'], matches: { 'AVIÕES': 'ESQUADRILHA', 'MAPAS': 'ATLAS', 'FLORES': 'RAMALHETE' }, emoji: '✈️', instruction: 'Encontre os 3 pares escondidos no mapa!' },

      // MECÂNICA 3: O Intruso (Descobrir a palavra que NÃO é um coletivo)
      { id: 7, type: 'intruder', words: ['ALCATEIA', 'CARDUME', 'CACHORRO', 'MANADA'], answer: 'CACHORRO', emoji: '🐾', instruction: 'Atenção, caçador! Qual dessas palavras NÃO é um coletivo?' },
      { id: 8, type: 'intruder', words: ['CONSTELAÇÃO', 'ESTRELA', 'ARQUIPÉLAGO', 'FLORESTA'], answer: 'ESTRELA', emoji: '✨', instruction: 'Encontre a palavra intrusa que indica apenas UMA coisa!' },
      { id: 9, type: 'intruder', words: ['TURMA', 'ELENCO', 'BANDA', 'CANTOR'], answer: 'CANTOR', emoji: '🎤', instruction: 'Três palavras indicam grupos. Qual é a intrusa?' },

      // MECÂNICA 4: Construtor de Frases (Substituir pela palavra coletiva)
      { id: 10, type: 'sentence', preText: 'Vimos um lindo ', boldText: 'GRUPO DE PEIXES', postText: ' no oceano.', answer: 'CARDUME', options: ['CARDUME', 'BANDO', 'REBANHO'], emoji: '🌊', instruction: 'Substitua a expressão destacada pelo seu Coletivo correspondente!' },
      { id: 11, type: 'sentence', preText: 'Eles fugiram da ', boldText: 'GRUPO DE LOBOS', postText: ' assustadora.', answer: 'ALCATEIA', options: ['MATILHA', 'ALCATEIA', 'MANADA'], emoji: '🌕', instruction: 'Troque as palavras pelo Coletivo correto!' },
      { id: 12, type: 'sentence', preText: 'Ganhei um ', boldText: 'CONJUNTO DE FLORES', postText: ' no meu aniversário.', answer: 'RAMALHETE', options: ['CACHO', 'RAMALHETE', 'ARQUIPÉLAGO'], emoji: '💐', instruction: 'Qual palavra resume a parte destacada? Arraste para a frase!' },
    ];

    function App() {
      // Estados globais
      const [gameState, setGameState] = useState('cover'); 
      const [currentPhaseIndex, setCurrentPhaseIndex] = useState(0);
      const [stars, setStars] = useState(0);
      
      // Estados interativos
      const [draggedOption, setDraggedOption] = useState(null);
      const [isSuccess, setIsSuccess] = useState(false);
      const [shakeWrong, setShakeWrong] = useState(null); 
      const [wrongAnswers, setWrongAnswers] = useState([]);

      // Estados para a mecânica de "Ligar Pontos"
      const [selectedLeft, setSelectedLeft] = useState(null);
      const [solvedPairs, setSolvedPairs] = useState([]);

      const level = LEVELS[currentPhaseIndex];

      const startGame = () => {
        setGameState('playing');
        setCurrentPhaseIndex(0);
        setStars(0);
        resetTurn();
      };

      const resetTurn = () => {
        setIsSuccess(false);
        setWrongAnswers([]);
        setDraggedOption(null);
        setSelectedLeft(null);
        setSolvedPairs([]);
        setShakeWrong(null);
      };

      // Função genérica de vitória
      const handleWin = () => {
        setIsSuccess(true);
        setStars(prev => prev + 1);
        setTimeout(() => {
          if (currentPhaseIndex + 1 < LEVELS.length) {
            setCurrentPhaseIndex(prev => prev + 1);
            resetTurn();
          } else {
            setGameState('complete');
          }
        }, 2500);
      };

      // Lógica de Validação: Match, Intruder, Sentence
      const checkAnswer = (value) => {
        if (isSuccess || wrongAnswers.includes(value)) return;

        if (value === level.answer) {
          handleWin();
        } else {
          setWrongAnswers(prev => [...prev, value]);
          setShakeWrong(value);
          setTimeout(() => setShakeWrong(null), 400);
        }
      };

      // Lógica de Validação: Ligar Pontos
      const handleConnectRight = (rightWord) => {
        if (!selectedLeft) {
          alert("Caçador, escolha primeiro uma palavra da coluna da esquerda!");
          return;
        }
        
        if (level.matches[selectedLeft] === rightWord) {
          const newSolved = [...solvedPairs, selectedLeft];
          setSolvedPairs(newSolved);
          setSelectedLeft(null);
          
          if (newSolved.length === level.leftWords.length) {
            handleWin();
          }
        } else {
          setShakeWrong(rightWord);
          setTimeout(() => setShakeWrong(null), 400);
          setSelectedLeft(null); 
        }
      };

      // --- Drag & Drop Handlers ---
      const handleDragStart = (e, value) => {
        setDraggedOption(value);
        e.dataTransfer.setData('text/plain', value);
      };
      const handleDragOver = (e) => e.preventDefault();
      const handleDrop = (e) => {
        e.preventDefault();
        const value = e.dataTransfer.getData('text/plain');
        if (value) checkAnswer(value);
      };

      // ------------------------------------------------------------------------
      // TELA 1: CAPA
      // ------------------------------------------------------------------------
      if (gameState === 'cover') {
        return (
          <div className="min-h-screen safari-bg flex flex-col items-center justify-center p-4 relative overflow-hidden">
            {/* Decoração Aventureira */}
            <div className="absolute top-10 left-10 text-6xl opacity-40 float-anim">🗺️</div>
            <div className="absolute top-32 right-10 text-7xl opacity-40 float-anim" style={{animationDelay: '1s'}}>🦁</div>
            <div className="absolute bottom-10 left-20 text-6xl opacity-40 float-anim" style={{animationDelay: '2s'}}>🧭</div>
            <div className="absolute bottom-32 right-32 text-6xl opacity-40 float-anim" style={{animationDelay: '0.5s'}}>🚙</div>

            <div className="bg-white/90 backdrop-blur-sm p-10 rounded-[3rem] shadow-[0_20px_50px_rgba(217,119,6,0.2)] flex flex-col items-center text-center z-10 max-w-xl w-full border-8 border-orange-500 mb-10">
              <div className="text-8xl mb-4">🔦</div>
              <h1 className="text-5xl font-black text-stone-800 mb-2 tracking-tight uppercase">
                Caçadores de<br/><span className="text-5xl text-orange-600">Coletivos</span>
              </h1>
              <p className="text-stone-600 mb-8 text-xl font-bold px-4">
                Pegue sua lupa e seu mapa! Vamos descobrir a palavra secreta que representa grupos inteiros!
              </p>
              
              <button 
                onClick={startGame}
                className="w-full py-5 px-8 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl text-3xl font-black transition-all transform hover:scale-105 shadow-[0_8px_0_rgb(5,150,105)] hover:translate-y-1 active:shadow-none active:translate-y-2 uppercase"
              >
                Iniciar Expedição!
              </button>
            </div>
          </div>
        );
      }

      // ------------------------------------------------------------------------
      // TELA 3: FINAL
      // ------------------------------------------------------------------------
      if (gameState === 'complete') {
        return (
          <div className="min-h-screen safari-bg flex flex-col items-center justify-center p-4 relative overflow-hidden">
            <div className="bg-white/90 backdrop-blur-sm p-10 rounded-[3rem] shadow-[0_20px_50px_rgba(217,119,6,0.2)] flex flex-col items-center text-center z-10 max-w-lg w-full border-8 border-orange-500">
              <div className="text-8xl mb-4 pop-anim">🎖️</div>
              <h1 className="text-5xl font-black text-stone-800 mb-2 uppercase">
                Grande Explorador!
              </h1>
              <p className="text-stone-600 mb-6 text-xl font-bold">Você encontrou todos os coletivos raros!</p>
              
              <div className="bg-amber-100 border-4 border-amber-400 rounded-3xl p-6 mb-8 w-full flex flex-col items-center">
                <span className="text-amber-800 font-bold uppercase mb-2">Insígnias de Caçador</span>
                <div className="flex items-center text-6xl font-black text-orange-500">
                  <span className="mr-4">⭐</span> x{stars}
                </div>
              </div>

              <button 
                onClick={startGame}
                className="w-full py-5 px-8 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl text-2xl font-black transition-all transform hover:scale-105 shadow-[0_8px_0_rgb(5,150,105)] hover:translate-y-1 active:shadow-none active:translate-y-2 uppercase"
              >
                Nova Aventura
              </button>
            </div>
          </div>
        );
      }

      // ------------------------------------------------------------------------
      // TELA 2: JOGABILIDADE (Múltiplas Mecânicas)
      // ------------------------------------------------------------------------
      return (
        <div className="min-h-screen w-full flex flex-col relative safari-bg text-stone-800">
          
          {/* CABEÇALHO */}
          <div className="w-full flex justify-between items-center p-6 z-10 bg-stone-900/80 backdrop-blur-sm shadow-lg rounded-b-3xl border-b-4 border-stone-700">
            <div className="flex flex-col">
              <h2 className="text-2xl md:text-3xl font-black uppercase text-amber-100 drop-shadow-md">
                Mapa {level.id} de {LEVELS.length}
              </h2>
              <span className="text-sm font-bold text-amber-300">{level.instruction}</span>
            </div>
            
            <div className="flex items-center text-3xl font-black text-orange-400 drop-shadow-md">
              <span className="mr-2">x{stars}</span>
              <span className="pop-anim">⭐</span>
            </div>
          </div>

          <div className="flex-1 flex flex-col items-center justify-center p-4 z-10 w-full max-w-5xl mx-auto">
            
            {/* ------------------------------------------------------------ */}
            {/* MECÂNICA 1: MATCH (Arrastar e Largar)                          */}
            {/* ------------------------------------------------------------ */}
            {level.type === 'match' && (
              <div className="flex flex-col items-center w-full">
                <div className="flex flex-col items-center mb-12">
                  <div className="text-6xl mb-4 pop-anim drop-shadow-xl">{level.emoji}</div>
                  
                  {/* Palavra Alvo (Design Aventura) */}
                  <div className="bg-stone-800 rounded-[2rem] border-4 border-stone-600 p-8 shadow-xl text-center mb-4 relative">
                    <span className="text-4xl md:text-6xl font-black text-white tracking-wider relative z-10">
                      VÁRIOS {level.target}
                    </span>
                  </div>
                  
                  <div className="text-5xl font-black text-stone-700 mb-4">=</div>
                  
                  {/* Dropzone */}
                  <div 
                    className={`rounded-[2rem] border-4 w-64 md:w-80 h-32 md:h-40 shadow-xl flex items-center justify-center transition-all ${
                      isSuccess ? 'bg-emerald-500 border-emerald-400 pop-anim shadow-[0_0_30px_rgba(16,185,129,0.5)] text-white' : 'bg-white/50 border-orange-500 border-dashed backdrop-blur-sm text-orange-600'
                    } ${shakeWrong ? 'shake-anim border-red-500 bg-red-100' : ''}`}
                    onDragOver={handleDragOver}
                    onDrop={handleDrop}
                  >
                    {isSuccess ? (
                      <span className="text-3xl md:text-5xl font-black drop-shadow-md">
                        {level.answer}
                      </span>
                    ) : (
                      <span className="opacity-60 text-2xl font-black animate-pulse uppercase text-center px-4">
                        Arraste o<br/>coletivo aqui!
                      </span>
                    )}
                  </div>
                </div>

                <div className="flex flex-wrap justify-center gap-4 md:gap-8 w-full">
                  {level.options.map((opt, i) => {
                    const isWrong = wrongAnswers.includes(opt);
                    let btnClass = "bg-orange-500 hover:bg-orange-400 border-b-8 border-orange-700 text-white cursor-grab active:cursor-grabbing hover:-translate-y-2";
                    
                    if (isWrong) {
                      btnClass = "bg-stone-400 border-b-8 border-stone-500 text-stone-200 opacity-50 cursor-not-allowed transform translate-y-2";
                    } else if (isSuccess) {
                      btnClass = "bg-orange-500 opacity-0 pointer-events-none"; 
                    }

                    return (
                      <button
                        key={i}
                        draggable={!isWrong && !isSuccess}
                        onDragStart={(e) => handleDragStart(e, opt)}
                        onClick={() => checkAnswer(opt)} 
                        disabled={isWrong || isSuccess}
                        className={`px-6 py-4 md:px-10 md:py-6 rounded-2xl md:rounded-[2rem] flex items-center justify-center transition-all duration-300 shadow-xl ${btnClass} ${shakeWrong === opt ? 'shake-anim' : ''}`}
                      >
                        <span className="text-2xl md:text-4xl font-black tracking-widest uppercase">
                          {opt}
                        </span>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ------------------------------------------------------------ */}
            {/* MECÂNICA 2: CONNECT (Ligar os Pontos)                          */}
            {/* ------------------------------------------------------------ */}
            {level.type === 'connect' && (
              <div className="flex flex-col items-center w-full">
                <div className="text-[5rem] mb-4 pop-anim">{level.emoji}</div>
                
                <div className="bg-white/90 p-4 md:p-8 rounded-[3rem] border-8 border-orange-400 shadow-2xl w-full max-w-4xl relative">
                  
                  <div className="flex justify-between h-[360px] md:h-[420px] relative w-full">
                    
                    {/* Coluna da Esquerda */}
                    <div className="flex flex-col justify-around w-[35%] z-10">
                      {level.leftWords.map((word) => {
                        const isSolved = solvedPairs.includes(word);
                        const isSelected = selectedLeft === word;
                        
                        let btnClass = "bg-stone-200 hover:bg-stone-300 border-b-4 border-stone-400 text-stone-800 transition-all hover:-translate-y-1 shadow-md";
                        if (isSolved) {
                          btnClass = "bg-emerald-500 border-b-4 border-emerald-700 text-white opacity-90 cursor-default scale-105";
                        } else if (isSelected) {
                          btnClass = "bg-amber-400 border-b-4 border-amber-600 text-stone-900 ring-4 ring-amber-300 scale-105";
                        }

                        return (
                          <button
                            key={`L-${word}`}
                            onClick={() => !isSolved && setSelectedLeft(word)}
                            className={`h-20 md:h-24 rounded-2xl flex items-center justify-center px-2 md:px-6 ${btnClass}`}
                          >
                            <span className="text-lg md:text-2xl lg:text-3xl font-black uppercase tracking-wider">{word}</span>
                          </button>
                        );
                      })}
                    </div>

                    {/* Canvas do SVG para desenhar as linhas no meio */}
                    <svg className="absolute top-0 bottom-0 left-[35%] w-[30%] h-full pointer-events-none z-0">
                      {solvedPairs.map((leftWord) => {
                        const rightWord = level.matches[leftWord];
                        const leftIndex = level.leftWords.indexOf(leftWord);
                        const rightIndex = level.rightWords.indexOf(rightWord);
                        
                        const y1 = ['16.66%', '50%', '83.33%'][leftIndex];
                        const y2 = ['16.66%', '50%', '83.33%'][rightIndex];
                        
                        return (
                          <g key={`line-${leftWord}`}>
                            <line x1="0%" y1={y1} x2="100%" y2={y2} stroke="#ea580c" strokeWidth="6" strokeLinecap="round" className="line-anim" />
                            <circle cx="0%" cy={y1} r="8" fill="#9a3412" className="pop-anim" />
                            <circle cx="100%" cy={y2} r="8" fill="#9a3412" className="pop-anim" />
                          </g>
                        );
                      })}
                    </svg>

                    {/* Coluna da Direita */}
                    <div className="flex flex-col justify-around w-[35%] z-10">
                      {level.rightWords.map((word) => {
                        const isSolved = Object.keys(level.matches).find(l => level.matches[l] === word && solvedPairs.includes(l));
                        const isShaking = shakeWrong === word;

                        let btnClass = "bg-orange-500 hover:bg-orange-400 border-b-4 border-orange-700 text-white transition-all hover:-translate-y-1 shadow-md";
                        if (isSolved) {
                          btnClass = "bg-emerald-500 border-b-4 border-emerald-700 text-white opacity-90 cursor-default scale-105";
                        } else if (isShaking) {
                          btnClass = "bg-red-500 border-b-4 border-red-700 text-white";
                        }

                        return (
                          <button
                            key={`R-${word}`}
                            onClick={() => !isSolved && handleConnectRight(word)}
                            className={`h-20 md:h-24 rounded-2xl flex items-center justify-center px-1 md:px-4 ${btnClass} ${isShaking ? 'shake-anim' : ''}`}
                          >
                            <span className="text-base md:text-xl lg:text-3xl font-black uppercase tracking-wider">{word}</span>
                          </button>
                        );
                      })}
                    </div>

                  </div>
                </div>
              </div>
            )}

            {/* ------------------------------------------------------------ */}
            {/* MECÂNICA 3: INTRUDER (Encontrar a palavra diferente)           */}
            {/* ------------------------------------------------------------ */}
            {level.type === 'intruder' && (
              <div className="flex flex-col items-center w-full">
                <div className="text-[6rem] md:text-[8rem] mb-8 pop-anim drop-shadow-xl">{level.emoji}</div>
                
                <div className="bg-white/90 p-6 md:p-10 rounded-[3rem] border-8 border-orange-400 shadow-2xl w-full max-w-3xl relative overflow-hidden">
                  <div className="grid grid-cols-2 gap-4 md:gap-6 relative z-10">
                    {level.words.map((word, i) => {
                      const isCorrectAnswer = word === level.answer; 
                      const isClickedAndNotIntruder = wrongAnswers.includes(word);
                      const isShaking = shakeWrong === word;
                      
                      let btnClass = "bg-stone-800 hover:bg-stone-700 border-b-8 border-stone-900 text-amber-400 hover:-translate-y-2";
                      
                      if (isSuccess && isCorrectAnswer) {
                        btnClass = "bg-emerald-500 border-b-8 border-emerald-700 text-white pop-anim ring-8 ring-emerald-300";
                      } else if (isSuccess && !isCorrectAnswer) {
                        btnClass = "bg-stone-300 border-b-8 border-stone-400 text-stone-500 opacity-50";
                      } else if (isClickedAndNotIntruder) {
                        btnClass = "bg-red-500 border-b-8 border-red-800 text-white opacity-80 cursor-not-allowed";
                      }

                      return (
                        <button
                          key={i}
                          onClick={() => checkAnswer(word)}
                          disabled={isClickedAndNotIntruder || isSuccess}
                          className={`h-24 md:h-36 rounded-2xl md:rounded-[2rem] flex items-center justify-center transition-all duration-300 shadow-lg ${btnClass} ${isShaking ? 'shake-anim' : ''}`}
                        >
                          <span className="text-xl md:text-4xl font-black tracking-widest">
                            {word}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* ------------------------------------------------------------ */}
            {/* MECÂNICA 4: SENTENCE (Substituir a palavra na frase)           */}
            {/* ------------------------------------------------------------ */}
            {level.type === 'sentence' && (
              <div className="flex flex-col items-center w-full">
                <div className="text-[5rem] mb-4 pop-anim">{level.emoji}</div>
                
                <div className="bg-stone-800 rounded-[2rem] border-8 border-stone-600 p-8 md:p-12 shadow-2xl text-center mb-12 max-w-4xl w-full leading-relaxed relative overflow-hidden">
                  <span className="text-3xl md:text-5xl font-bold text-stone-200 relative z-10">
                    {level.preText}
                  </span>
                  
                  <span 
                    className={`inline-block mx-2 px-6 py-2 rounded-2xl border-4 align-middle transition-all relative z-10 ${
                      isSuccess 
                        ? 'bg-emerald-500 border-emerald-400 text-white pop-anim shadow-lg' 
                        : 'bg-stone-900 border-amber-500 border-dashed text-amber-500'
                    } ${shakeWrong ? 'shake-anim border-red-500 bg-red-900/50 text-red-200' : ''}`}
                    onDragOver={handleDragOver}
                    onDrop={handleDrop}
                    onClick={() => {
                       if(!isSuccess) alert("Toque ou arraste uma das opções de baixo aqui para dentro!");
                    }}
                  >
                    {isSuccess ? (
                      <span className="font-black text-2xl md:text-5xl uppercase">{level.answer}</span>
                    ) : (
                      <span className="font-black text-2xl md:text-5xl uppercase line-through opacity-60">
                        {level.boldText}
                      </span>
                    )}
                  </span>
                  
                  <span className="text-3xl md:text-5xl font-bold text-stone-200 relative z-10">
                    {level.postText}
                  </span>
                </div>

                <div className="flex flex-wrap justify-center gap-4 md:gap-8 w-full">
                  {level.options.map((opt, i) => {
                    const isWrong = wrongAnswers.includes(opt);
                    let btnClass = "bg-orange-500 hover:bg-orange-400 border-b-8 border-orange-700 text-white cursor-grab active:cursor-grabbing hover:-translate-y-2 shadow-lg";
                    
                    if (isWrong) {
                      btnClass = "bg-stone-500 border-b-8 border-stone-700 text-stone-300 opacity-50 cursor-not-allowed transform translate-y-2";
                    } else if (isSuccess) {
                      btnClass = "bg-orange-500 opacity-0 pointer-events-none";
                    }

                    return (
                      <button
                        key={i}
                        draggable={!isWrong && !isSuccess}
                        onDragStart={(e) => handleDragStart(e, opt)}
                        onClick={() => checkAnswer(opt)} 
                        disabled={isWrong || isSuccess}
                        className={`px-4 py-4 md:px-8 md:py-5 rounded-2xl md:rounded-[2rem] flex items-center justify-center transition-all duration-300 ${btnClass} ${shakeWrong === opt ? 'shake-anim' : ''}`}
                      >
                        <span className="text-xl md:text-3xl font-black uppercase tracking-wider">
                          {opt}
                        </span>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
