<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
    <title>Separando Sílabas - Níveis de Dificuldade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            max-width: 100%;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fdf4ff;
            touch-action: manipulation;
        }
        .font-game {
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 2px;
        }
        .screen {
            display: none;
            min-height: 100vh;
            min-height: 100dvh;
            flex-direction: column;
            align-items: center;
            padding: clamp(1rem, 4vw, 2rem);
            width: 100%;
        }
        .active-screen {
            display: flex;
        }
        .syllable-card {
            cursor: grab;
            transition: all 0.2s;
            user-select: none;
        }
        .syllable-card:active {
            cursor: grabbing;
            transform: scale(1.1);
        }
        .slot {
            transition: all 0.3s;
            min-width: clamp(55px, 14vw, 80px);
        }
        .correct {
            background-color: #4ade80 !important;
            border-color: #166534 !important;
            color: white;
            animation: bounce 0.5s ease;
        }
        .incorrect {
            background-color: #f87171 !important;
            border-color: #991b1b !important;
            color: white;
            animation: shake 0.4s ease;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .level-card {
            transition: transform 0.2s;
        }
        .level-card:not(.locked):hover {
            transform: translateY(-5px);
        }
        .locked {
            filter: grayscale(1);
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="screen-start" class="screen active-screen justify-center bg-gradient-to-b from-purple-400 to-purple-600 text-white">
            <a href="../../index.html" class="absolute top-4 left-4 text-purple-100 hover:text-purple-300 font-bold bg-purple-700/80 hover:bg-purple-800 px-4 py-2 rounded-full transition-colors z-20 border-2 border-purple-300">◀ Voltar</a>
        <h1 class="text-6xl md:text-8xl font-game mb-8 drop-shadow-xl text-center leading-tight">SEPARANDO<br>SÍLABAS</h1>
        <div class="w-64 h-64 bg-white rounded-3xl flex items-center justify-center border-8 border-yellow-300 shadow-2xl mb-12 rotate-3">
            <span class="text-9xl">📚</span>
        </div>
        <button onclick="showScreen('screen-levels')" class="bg-yellow-400 hover:bg-yellow-500 text-purple-900 font-game text-4xl px-12 py-4 rounded-full shadow-lg transform transition hover:scale-110 active:scale-95 border-b-8 border-yellow-600">
            JOGAR!
        </button>
    </div>

    <!-- TELA DE SELEÇÃO DE NÍVEIS -->
    <div id="screen-levels" class="screen bg-purple-50">
        <div class="max-w-4xl w-full">
            <div class="flex justify-between items-center mb-8">
                <button onclick="showScreen('screen-start')" class="text-purple-600 font-bold bg-white px-4 py-2 rounded-xl shadow-sm border-2 border-purple-100">← VOLTAR</button>
                <h2 class="text-4xl font-game text-purple-600">FASES</h2>
                <div class="w-10"></div>
            </div>
            
            <div id="levels-container" class="space-y-12">
                <!-- Seções geradas por JS (Fácil, Médio, Difícil) -->
            </div>
        </div>
    </div>

    <!-- TELA DO JOGO -->
    <div id="screen-game" class="screen">
        <div class="w-full max-w-5xl">
            <!-- Header do Jogo -->
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <button onclick="showScreen('screen-levels')" class="bg-white hover:bg-gray-100 px-6 py-2 rounded-xl font-bold border-2 border-purple-200 text-purple-600 shadow-sm">MENU</button>
                
            </div>

            <!-- Área de Jogo Principal -->
            <div class="flex flex-col md:flex-row items-center justify-center gap-8 bg-white p-6 md:p-10 rounded-[3rem] shadow-2xl border-b-8 border-purple-100">
                <!-- Imagem -->
                <div class="w-full md:w-2/5 flex flex-col items-center">
                    <div class="bg-purple-50 rounded-[2rem] border-4 border-dashed border-purple-200 w-full aspect-square flex items-center justify-center shadow-inner">
                        <span id="word-emoji" class="text-8xl md:text-9xl select-none">🔤</span>
                    </div>
                    <div id="word-hint" class="mt-4 text-3xl font-game text-purple-300 opacity-50 uppercase tracking-widest"></div>
                </div>

                <!-- Slots de Sílabas -->
                <div class="w-full md:w-3/5 text-center">
                    <div class="mb-6 text-purple-400 font-bold uppercase tracking-wider">Arraste as sílabas na ordem correta:</div>
                    <div class="flex flex-wrap justify-center gap-4" id="slots-container"></div>
                </div>
            </div>

            <!-- Banco de Sílabas -->
            <div id="syllables-bank" class="flex flex-wrap justify-center gap-4 mt-8 p-8 bg-purple-100 rounded-[2rem] border-4 border-white shadow-xl min-h-[120px]"></div>
        </div>
    </div>

    <!-- Modal de Vitória -->
    <div id="win-modal" class="fixed inset-0 bg-purple-900/80 flex items-center justify-center hidden z-50 backdrop-blur-sm">
        <div class="bg-white p-10 rounded-[3rem] text-center shadow-2xl border-8 border-yellow-400 max-w-sm mx-4 transform scale-110">
            <h2 class="text-5xl font-game text-purple-600 mb-2">MUITO BEM!</h2>
            <div class="text-7xl mb-6">🏆</div>
            <p class="text-xl font-bold text-gray-600 mb-8" id="win-message">Sílaba por sílaba, você conseguiu!</p>
            <button onclick="handleNextLevel()" class="bg-green-500 hover:bg-green-600 text-white font-game text-3xl py-4 px-12 rounded-full shadow-lg border-b-8 border-green-700 active:border-b-0 active:translate-y-1 transition-all">
                PRÓXIMO ➔
            </button>
        </div>
    </div>

    <script src="../utils/audio.js"></script>
    <script src="../utils/score.js"></script>
    <script src="../utils/elapsed.js"></script>
    <script src="../utils/progress.js"></script>
    <script src="../utils/stars.js"></script>
    <script src="../utils/words.js"></script>
    <script src="main.js"></script>
</body>
</html>
