<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/game-viewport.css" />
    <title>Digitado - Desafio de Emojis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body {
          margin: 0;
          padding: 0;
          overflow-x: hidden;
          max-width: 100%;
        }
        body {
          font-family: 'Quicksand', sans-serif;
          touch-action: manipulation;
        }
        #root {
          min-height: 100vh;
          min-height: 100dvh;
          width: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useEffect, useRef } = React;

// Agora dividimos o dicionário em 8 Fases, cada uma com 2 palavras.
/**
 * Fases para o desafio de emojis.
 * Total: 30 níveis (60 palavras).
 */
const PHASES = [
  [ { word: 'GATO', emoji: '🐱' }, { word: 'BOLA', emoji: '⚽' } ], // Fase 1
  [ { word: 'CASA', emoji: '🏠' }, { word: 'PATO', emoji: '🦆' } ], // Fase 2
  [ { word: 'SAPO', emoji: '🐸' }, { word: 'DADO', emoji: '🎲' } ], // Fase 3
  [ { word: 'BOLO', emoji: '🎂' }, { word: 'VACA', emoji: '🐮' } ], // Fase 4
  [ { word: 'LEÃO', emoji: '🦁' }, { word: 'FOCA', emoji: '🦭' } ], // Fase 5
  [ { word: 'MAÇÃ', emoji: '🍎' }, { word: 'PERA', emoji: '🍐' } ], // Fase 6
  [ { word: 'RATO', emoji: '🐭' }, { word: 'FLOR', emoji: '🌸' } ], // Fase 7
  [ { word: 'URSO', emoji: '🐻' }, { word: 'TREM', emoji: '🚂' } ], // Fase 8
  [ { word: 'PIANO', emoji: '🎹' }, { word: 'NAVIO', emoji: '🚢' } ], // Fase 9
  [ { word: 'FRUTA', emoji: '🍓' }, { word: 'HORTA', emoji: '🥦' } ], // Fase 10
  [ { word: 'AMIGO', emoji: '🤝' }, { word: 'BANCO', emoji: '🏦' } ], // Fase 11
  [ { word: 'CARRO', emoji: '🚗' }, { word: 'DENTE', emoji: '🦷' } ], // Fase 12
  [ { word: 'FESTA', emoji: '🎉' }, { word: 'GELO', emoji: '🧊' } ], // Fase 13
  [ { word: 'ILHA', emoji: '🏝️' }, { word: 'JOGO', emoji: '🎮' } ], // Fase 14
  [ { word: 'LIVRO', emoji: '📚' }, { word: 'NOITE', emoji: '🌙' } ], // Fase 15
  [ { word: 'OURO', emoji: '💰' }, { word: 'PORTA', emoji: '🚪' } ], // Fase 16
  [ { word: 'ROUPA', emoji: '👕' }, { word: 'TERRA', emoji: '🌍' } ], // Fase 17
  [ { word: 'VENTO', emoji: '💨' }, { word: 'ZERO', emoji: '0️⃣' } ], // Fase 18
  [ { word: 'ALMA', emoji: '👻' }, { word: 'DOCE', emoji: '🍬' } ], // Fase 19
  [ { word: 'FILHO', emoji: '👶' }, { word: 'HORA', emoji: '⏰' } ], // Fase 20
  [ { word: 'LATA', emoji: '🥫' }, { word: 'NUVEM', emoji: '☁️' } ], // Fase 21
  [ { word: 'PEIXE', emoji: '🐟' }, { word: 'VIDA', emoji: '🌱' } ], // Fase 22
  [ { word: 'ARROZ', emoji: '🍚' }, { word: 'COPO', emoji: '🥛' } ], // Fase 23
  [ { word: 'FACA', emoji: '🔪' }, { word: 'HOTEL', emoji: '🏨' } ], // Fase 24
  [ { word: 'JOIA', emoji: '💎' }, { word: 'MALA', emoji: '💼' } ], // Fase 25
  [ { word: 'QUADRO', emoji: '🖼️' }, { word: 'SALTO', emoji: '👠' } ], // Fase 26
  [ { word: 'ÁGUA', emoji: '💧' }, { word: 'CAIXA', emoji: '📦' } ], // Fase 27
  [ { word: 'FORNO', emoji: '🔥' }, { word: 'GOTA', emoji: '💧' } ], // Fase 28
  [ { word: 'NAVE', emoji: '🚀' }, { word: 'PRATO', emoji: '🍽️' } ], // Fase 29
  [ { word: 'MEIA', emoji: '🧦' }, { word: 'TELA', emoji: '🖥️' } ]  // Fase 30
];
function App() {
  // Estados de Navegação do Jogo
  // 'cover' -> 'levelSelect' -> 'phaseSelect' -> 'playing' -> 'phaseComplete'
  const [gameState, setGameState] = useState('cover'); 
  const [level, setLevel] = useState('infantil'); // 'infantil' (MAIÚSCULA) ou 'fundamental' (minúscula)
  
  // Controle de Fases Desbloqueadas (Inicia com a Fase 1 liberada em ambos os níveis)
  const [unlockedPhases, setUnlockedPhases] = useState({
    infantil: 1,
    fundamental: 1
  });
  
  // Estados da Partida Atual
  const [currentPhase, setCurrentPhase] = useState(1);
  const [currentWordIndex, setCurrentWordIndex] = useState(0);
  const [inputValue, setInputValue] = useState('');
  const [startTime, setStartTime] = useState(0);
  const [isError, setIsError] = useState(false);
  const [metrics, setMetrics] = useState([]);
  
  const inputRef = useRef(null);

  // Mantém o foco no campo de digitação sempre que mudar de palavra
  useEffect(() => {
    if (gameState === 'playing' && inputRef.current) {
      inputRef.current.focus();
      setStartTime(Date.now());
    }
  }, [currentWordIndex, gameState]);

  // Função para remover acentos
  const removeAccents = (str) => {
    return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  };

  // Iniciar uma Fase específica
  const startPhase = (phaseNumber) => {
    setCurrentPhase(phaseNumber);
    setCurrentWordIndex(0);
    setMetrics([]);
    setInputValue('');
    setIsError(false);
    setGameState('playing');
    setStartTime(Date.now());
  };

  // Lida com a digitação da criança
  const handleInputChange = (e) => {
    let text = e.target.value;
    
    // Formata o texto de acordo com o nível escolar
    if (level === 'infantil') {
      text = text.toUpperCase();
    } else {
      text = text.toLowerCase();
    }
    
    setInputValue(text);
    setIsError(false);

    const phaseWords = PHASES[currentPhase - 1];
    const currentWord = phaseWords[currentWordIndex].word;
    const targetWord = level === 'infantil' ? currentWord.toUpperCase() : currentWord.toLowerCase();

    // Verifica acerto
    if (removeAccents(text) === removeAccents(targetWord)) {
      handleCorrectWord(targetWord, phaseWords);
    } else if (text.length >= targetWord.length) {
      // Errou mas digitou tudo
      setIsError(true);
    }
  };

  // Quando acerta a palavra
  const handleCorrectWord = (targetWord, phaseWords) => {
    const endTime = Date.now();
    const timeTaken = ((endTime - startTime) / 1000).toFixed(1); 
    
    setMetrics(prev => [...prev, { word: targetWord, time: timeTaken }]);

    if (currentWordIndex + 1 < phaseWords.length) {
      // Próxima Palavra
      setTimeout(() => {
        setInputValue('');
        setIsError(false);
        setCurrentWordIndex(prev => prev + 1);
      }, 300); 
    } else {
      // Terminou a Fase!
      setTimeout(() => {
        // Desbloqueia a próxima fase se for a última desbloqueada e não for a fase 8
        if (currentPhase === unlockedPhases[level] && currentPhase < 8) {
          setUnlockedPhases(prev => ({
            ...prev,
            [level]: prev[level] + 1
          }));
        }
        setGameState('phaseComplete');
      }, 500);
    }
  };

  // ------------------------------------------------------------------------
  // TELA 1: CAPA (SPLASH SCREEN)
  // ------------------------------------------------------------------------
  if (gameState === 'cover') {
    return (
      <div className="min-h-screen bg-sky-400 flex flex-col items-center justify-center p-4 font-sans relative overflow-hidden">
        <a href="../../index.html" className="absolute top-4 left-4 text-sky-100 hover:text-sky-300 font-bold bg-sky-600/80 hover:bg-sky-700 px-4 py-2 rounded-full transition-colors z-20 border-2 border-sky-300">◀ Voltar</a>
        {/* Decoração de Fundo */}
        <div className="absolute top-10 left-10 text-6xl opacity-20 animate-bounce">☁️</div>
        <div className="absolute top-20 right-20 text-8xl opacity-20 animate-pulse">☀️</div>
        <div className="absolute bottom-10 left-20 text-6xl opacity-20">🎈</div>

        <div className="bg-white/90 p-10 rounded-[3rem] shadow-2xl flex flex-col items-center text-center z-10 max-w-lg w-full border-8 border-white">
          <div className="text-8xl mb-4">🚀</div>
          <h1 className="text-5xl font-extrabold text-sky-600 mb-4 tracking-tight leading-tight">
            ABC<br/><span className="text-4xl text-sky-400">Palavras Mágicas</span>
          </h1>
          <p className="text-gray-500 mb-8 text-lg font-medium">Aprender a escrever nunca foi tão divertido!</p>
          
          <button 
            onClick={() => setGameState('levelSelect')}
            className="w-full py-5 px-8 bg-green-400 hover:bg-green-500 text-white rounded-[2rem] text-3xl font-black transition-transform transform hover:scale-105 shadow-[0_8px_0_rgb(34,197,94)] hover:shadow-[0_4px_0_rgb(34,197,94)] hover:translate-y-1 active:shadow-none active:translate-y-2"
          >
            JOGAR
          </button>
        </div>
      </div>
    );
  }

  // ------------------------------------------------------------------------
  // TELA 2: SELEÇÃO DE NÍVEL
  // ------------------------------------------------------------------------
  if (gameState === 'levelSelect') {
    return (
      <div className="min-h-screen bg-blue-100 flex flex-col items-center justify-center p-4 font-sans">
        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center relative">
          <button 
            onClick={() => setGameState('cover')}
            className="absolute top-4 left-4 text-gray-400 hover:text-gray-600 font-bold text-sm bg-gray-100 px-3 py-1 rounded-full"
          >
            ◀ Voltar
          </button>

          <h1 className="text-3xl font-bold text-blue-600 mb-2 mt-4">Escolha o Nível</h1>
          <p className="text-gray-500 mb-8">Qual o seu nível na escola?</p>
          
          <div className="space-y-4">
            <button 
              onClick={() => { setLevel('infantil'); setGameState('phaseSelect'); }}
              className="w-full py-6 px-6 bg-orange-400 hover:bg-orange-500 text-white rounded-2xl text-xl font-bold transition-transform transform hover:scale-105 shadow-md flex flex-col items-center"
            >
              <span>Educação Infantil 🧒</span>
              <span className="text-sm font-normal mt-1 bg-white/20 px-3 py-1 rounded-full">(CAIXA ALTA)</span>
            </button>
            
            <button 
              onClick={() => { setLevel('fundamental'); setGameState('phaseSelect'); }}
              className="w-full py-6 px-6 bg-purple-400 hover:bg-purple-500 text-white rounded-2xl text-xl font-bold transition-transform transform hover:scale-105 shadow-md flex flex-col items-center"
            >
              <span>Ensino Fundamental 🎒</span>
              <span className="text-sm font-normal mt-1 bg-white/20 px-3 py-1 rounded-full">(letras minúsculas)</span>
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ------------------------------------------------------------------------
  // TELA 3: SELEÇÃO DE FASES (MAPA)
  // ------------------------------------------------------------------------
  if (gameState === 'phaseSelect') {
    const maxUnlocked = unlockedPhases[level];

    return (
      <div className="min-h-screen bg-emerald-100 flex flex-col items-center justify-center p-4 font-sans">
        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center relative">
          <button 
            onClick={() => setGameState('levelSelect')}
            className="absolute top-4 left-4 text-gray-400 hover:text-gray-600 font-bold text-sm bg-gray-100 px-3 py-1 rounded-full"
          >
            ◀ Níveis
          </button>

          <h1 className="text-3xl font-bold text-emerald-600 mb-2 mt-4">Mapa de Fases</h1>
          <p className="text-gray-500 mb-6">
            Nível: <span className="font-bold text-emerald-500">{level === 'infantil' ? 'Infantil' : 'Fundamental'}</span>
          </p>

          <div className="grid grid-cols-2 gap-4">
            {PHASES.map((_, index) => {
              const phaseNum = index + 1;
              const isUnlocked = phaseNum <= maxUnlocked;

              return (
                <button
                  key={phaseNum}
                  onClick={() => isUnlocked && startPhase(phaseNum)}
                  className={`py-4 rounded-2xl text-xl font-bold flex flex-col items-center justify-center transition-all ${
                    isUnlocked 
                      ? 'bg-emerald-400 hover:bg-emerald-500 text-white shadow-md transform hover:scale-105' 
                      : 'bg-gray-200 text-gray-400 cursor-not-allowed border-2 border-dashed border-gray-300'
                  }`}
                >
                  <span className="mb-1">{isUnlocked ? `Fase ${phaseNum}` : 'Bloqueado'}</span>
                  <span className="text-2xl">{isUnlocked ? '⭐' : '🔒'}</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ------------------------------------------------------------------------
  // TELA 4: FIM DE FASE (BOLETIM)
  // ------------------------------------------------------------------------
  if (gameState === 'phaseComplete') {
    const totalTime = metrics.reduce((acc, curr) => acc + parseFloat(curr.time), 0).toFixed(1);
    const hasNextPhase = currentPhase < 8;
    
    return (
      <div className="min-h-screen bg-yellow-100 flex flex-col items-center justify-center p-4 font-sans">
        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center">
          <div className="text-6xl mb-4">🏆</div>
          <h1 className="text-4xl font-bold text-yellow-500 mb-2">Fase {currentPhase} Concluída!</h1>
          
          <div className="bg-gray-50 rounded-xl p-4 mb-6 mt-6">
            <h2 className="text-xl font-bold text-gray-700 mb-4 border-b pb-2">Seu Boletim</h2>
            <ul className="space-y-2 text-left">
              {metrics.map((m, i) => (
                <li key={i} className="flex justify-between items-center text-gray-600 text-lg">
                  <span className="font-semibold">{m.word}</span>
                  <span className="bg-blue-100 text-blue-800 py-1 px-3 rounded-full text-sm font-bold">
                    {m.time}s
                  </span>
                </li>
              ))}
            </ul>
            <div className="mt-4 pt-4 border-t flex justify-between items-center font-bold text-gray-800 text-xl">
              <span>Tempo Total:</span>
              <span className="text-green-600">{totalTime}s</span>
            </div>
          </div>

          <div className="space-y-3">
            {hasNextPhase && (
              <button 
                onClick={() => startPhase(currentPhase + 1)}
                className="w-full py-4 px-6 bg-green-500 hover:bg-green-600 text-white rounded-2xl text-xl font-bold shadow-md"
              >
                Próxima Fase ➡️
              </button>
            )}
            <button 
              onClick={() => setGameState('phaseSelect')}
              className="w-full py-3 px-6 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-2xl text-lg font-bold transition-colors"
            >
              Voltar ao Mapa
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ------------------------------------------------------------------------
  // TELA 5: O JOGO (DIGITAÇÃO)
  // ------------------------------------------------------------------------
  const phaseWords = PHASES[currentPhase - 1];
  const currentItem = phaseWords[currentWordIndex];

  return (
    <div className="min-h-screen bg-sky-200 flex flex-col items-center justify-center p-4 font-sans">
      
      <button 
        onClick={() => setGameState('phaseSelect')}
        className="absolute top-4 left-4 text-sky-700 hover:text-sky-900 font-bold bg-white/50 hover:bg-white px-4 py-2 rounded-full transition-colors"
      >
        ⏸ Pausar / Sair
      </button>

      {/* Barra de progresso da Fase */}
      <div className="absolute top-20 w-full max-w-md px-4">
        <div className="flex justify-between text-sky-800 font-bold mb-2">
          <span>Fase {currentPhase}</span>
          <span>Palavra {currentWordIndex + 1} de {phaseWords.length}</span>
        </div>
        <div className="w-full bg-white rounded-full h-4 shadow-inner overflow-hidden">
          <div 
            className="bg-green-400 h-4 transition-all duration-500 rounded-full" 
            style={{ width: `${(currentWordIndex / phaseWords.length) * 100}%` }}
          ></div>
        </div>
      </div>

      <div className="bg-white p-8 rounded-[3rem] shadow-2xl flex flex-col items-center justify-center w-full max-w-md border-8 border-white outline outline-4 outline-sky-300 mt-12">
        
        {/* Imagem (Emoji) */}
        <div className="text-[8rem] leading-none mb-8 filter drop-shadow-lg animate-bounce">
          {currentItem.emoji}
        </div>

        {/* Dica visual de caracteres */}
        <div className="flex space-x-2 mb-6">
          {currentItem.word.split('').map((_, i) => (
            <div key={i} className={`h-3 w-8 rounded-full transition-colors ${i < inputValue.length ? 'bg-blue-500 shadow-sm' : 'bg-gray-200'}`}></div>
          ))}
        </div>

        {/* Campo de Entrada */}
        <input
          ref={inputRef}
          type="text"
          value={inputValue}
          onChange={handleInputChange}
          placeholder={level === 'infantil' ? 'DIGITE AQUI' : 'digite aqui'}
          className={`w-full text-center text-4xl font-bold py-4 px-6 border-4 rounded-2xl focus:outline-none transition-colors ${
            isError 
              ? 'border-red-400 bg-red-50 text-red-500 focus:border-red-500' 
              : 'bg-gray-100 border-gray-200 text-gray-800 focus:border-blue-500 focus:bg-white'
          }`}
          autoComplete="off"
          spellCheck="false"
        />

        {/* Mensagem de Erro */}
        <div className="h-8 mt-4 flex items-center justify-center">
          {isError && (
            <span className="text-red-500 font-bold text-xl animate-bounce">
              {level === 'infantil' ? 'OPS, TENTE NOVAMENTE!' : 'Ops, tente novamente!'}
            </span>
          )}
        </div>
        
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
